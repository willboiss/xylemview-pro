function rtParseDXF(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const attribs = [];
  const texts = [];
  let i = 0;
  while (i < lines.length - 1) {
    const code = lines[i].trim();
    const val = lines[i + 1].trim();
    if (code === '0' && val === 'ATTRIB') {
      let attrValue = null, attrTag = null;
      let j = i + 2;
      while (j < lines.length - 1) {
        const c = lines[j].trim();
        const v = lines[j + 1].trim();
        if (c === '0') break;
        if (c === '1' && attrValue === null) attrValue = lines[j + 1].trimEnd();
        if (c === '2' && attrTag === null) {
          const lookback = lines.slice(Math.max(j - 4, 0), j + 1).join('\n');
          if (lookback.includes('AcDbAttribute')) attrTag = v;
        }
        j += 2;
      }
      if (attrTag) attribs.push({ tag: attrTag, value: (attrValue || '').trim() });
      i = j;
      continue;
    }
    if (code === '0' && val === 'TEXT') {
      let layer = '', textVal = '';
      let j = i + 2;
      while (j < lines.length - 1) {
        const c = lines[j].trim();
        const v = lines[j + 1].trim();
        if (c === '0') break;
        if (c === '1' && !textVal) textVal = lines[j + 1].trimEnd();
        if (c === '8') layer = v;
        j += 2;
      }
      if (textVal.trim()) texts.push({ layer, value: textVal.trim() });
      i = j;
      continue;
    }
    i += 2;
  }
  return { attribs, texts };
}

function rtExtractVariables(parsed) {
  const { attribs, texts } = parsed;
  const vars = {};
  const titleAttr = attribs.find(a => a.tag === 'TITLE');
  const mxpnAttr = attribs.find(a => a.tag === 'MXPN');
  const contractAttr = attribs.find(a => a.tag === 'CONTRACT');
  vars.title = titleAttr?.value || '';
  vars.mxpn = mxpnAttr?.value || '';
  vars.contract = contractAttr?.value || '';

  const titleUpper = vars.title.toUpperCase();
  if (titleUpper.includes('SHELL ASSY')) vars.type = 'shell';
  else if (titleUpper.includes('BUNDLE ASSY')) vars.type = 'bundle';
  else if (titleUpper.includes('EXCHANGER')) vars.type = 'setting';
  else vars.type = 'unknown';

  const mxpn = vars.mxpn;
  if (mxpn.length >= 13) {
    vars.nom_dia = parseInt(mxpn.substring(6, 8), 10);
    vars.nom_length = parseInt(mxpn.substring(9, 12), 10);
  }
  if (titleUpper.includes('QSU') || titleUpper.includes('QSUS') || titleUpper.includes('B300S')) {
    vars.unit_type = 'SU';
  } else if (titleUpper.includes('QWU') || titleUpper.includes('QWUS') || titleUpper.includes('B300W')) {
    vars.unit_type = 'WU';
  }
  if (vars.type === 'setting') {
    const passMatch = vars.title.match(/[-\u2013](\d)\s*['\u2018\u2019"]?\s*EXCHANGER/i);
    if (passMatch) vars.passes = parseInt(passMatch[1]);
  }
  if (!vars.passes) vars.passes = 2;

  const bomItems = [];
  let current = {};
  for (const a of attribs) {
    if (a.tag === 'ITEM') {
      if (current.ITEM) bomItems.push(current);
      current = { ITEM: a.value };
    } else if (['QTY', 'DESC', 'MATL', 'SPEC', 'PATT', 'PN'].includes(a.tag)) {
      current[a.tag] = a.value;
    }
  }
  if (current.ITEM) bomItems.push(current);
  vars.bom = bomItems;

  if (vars.type === 'shell') {
    vars.connections = [];
    vars.shell_material = 'STEEL';
    for (const item of bomItems) {
      const desc = (item.DESC || '').toUpperCase();
      const patt = item.PATT || '';
      const matl = (item.MATL || '').toUpperCase();
      const spec = (item.SPEC || '').toUpperCase();
      if (desc.includes('COUPLING') || desc.includes('NOZZLE')) {
        const sizeMatch = patt.match(/^([\d.]+)"/);
        if (sizeMatch) {
          const size = parseFloat(sizeMatch[1]);
          const qty = parseInt(item.QTY, 10) || 1;
          for (let q = 0; q < qty; q++) vars.connections.push(size);
        }
      }
      if (desc.includes('PIPE') && desc.includes('SHELL')) {
        if (spec.includes('316') || matl.includes('STAINLESS')) vars.shell_material = 'STAINLESS';
        const tkMatch = patt.match(/([\d.]+)\s*TK/i);
        if (tkMatch) vars.shell_wall = parseFloat(tkMatch[1]);
      }
    }
    vars.connections.sort((a, b) => b - a);
  }
  if (vars.type === 'bundle') {
    for (const item of bomItems) {
      const desc = (item.DESC || '').toUpperCase();
      const patt = item.PATT || '';
      const matl = (item.MATL || '').toUpperCase();
      if (desc.includes('U-TUBE') || desc.includes('SET OF')) {
        const odMatch = patt.match(/([\d.]+)\s*O\.?D/i);
        if (odMatch) vars.tube_od = parseFloat(odMatch[1]);
        const wallMatch = patt.match(/[xX\u00d7]\s*([\d.]+)\s*WALL/i);
        if (wallMatch) vars.tube_wall = parseFloat(wallMatch[1]);
        if (matl.includes('COPPER')) vars.tube_material = 'COPPER';
        else if (matl.includes('90/10') || matl.includes('CUNI')) vars.tube_material = '90/10';
        else if (matl.includes('STAINLESS') || matl.includes('316')) vars.tube_material = 'STAINLESS';
        else vars.tube_material = matl;
      }
    }
    vars.banding = false;
    vars.seal_weld = false;
    for (const t of texts) {
      if (t.value.toUpperCase().includes('BAND')) vars.banding = true;
      if (t.value.toUpperCase().includes('SEAL WELD') || t.value.toUpperCase().includes('SEAL-WELD')) vars.seal_weld = true;
    }
  }
  if (vars.type === 'setting') {
    vars.shell_pn = '';
    vars.bundle_pn = '';
    for (const item of bomItems) {
      const desc = (item.DESC || '').toUpperCase();
      if (desc.includes('SHELL')) vars.shell_pn = item.PN || '';
      if (desc.includes('BUNDLE')) vars.bundle_pn = item.PN || '';
    }
    for (const t of texts) {
      const wm = t.value.match(/WEIGHT\s*WET:\s*(\d+)\s*DRY:\s*(\d+)\s*BDL:\s*(\d+)/i);
      if (wm) {
        vars.weight_wet = parseInt(wm[1]);
        vars.weight_dry = parseInt(wm[2]);
        vars.weight_bdl = parseInt(wm[3]);
      }
    }
  }
  return vars;
}

function rtCalculateRouting(vars) {
  const dia = vars.nom_dia;
  const len = vars.nom_length;
  if (!dia || !len) return [];
  const lenFt = len / 12;
  const ops = [];

  if (vars.type === 'shell') {
    const conns = vars.connections || [];
    const numConns = conns.length;

    // Sum contributions from ALL connections
    let burnConns = 0, setupConns = 0, weldConns = 0, grindConns = 0;
    for (const size of conns) {
      const c = rtLookupConn(size);
      burnConns += c.burn;
      setupConns += c.setup;
      weldConns += c.weld;
      grindConns += c.grind;
    }

    const pipeEnds = rtLookupUnit(dia, 12) * 2;
    const lengthAddRate = numConns === 0 ? 0.0065 : numConns === 1 ? 0.0135 : 0.018;
    const burnTotal = pipeEnds + burnConns + lengthAddRate * lenFt + 0.175;
    ops.push({ wc: 116, op: 'BURN PIPE & HOLES PER DWG', run: burnTotal, setup: 0.16 });

    ops.push({ wc: 117, op: 'SETUP HEAD & FLANGE', run: rtLookupUnit(dia, 6), setup: 0 });
    ops.push({ wc: 104, op: 'WELD HEAD & FLANGE', run: rtLookupUnit(dia, 7), setup: 0.19 });

    const suPHT = rtLookupUnit(dia, 8);
    ops.push({ wc: 100, op: 'SETUP CONNECTIONS', run: setupConns + suPHT + 0.009 * numConns, setup: 0 });

    ops.push({ wc: 101, op: 'WELD CONNECTIONS', run: weldConns + rtLookupUnit(dia, 9), setup: 0 });

    ops.push({ wc: 102, op: 'GRIND COMPLETE', run: grindConns + rtLookupUnit(dia, 10) + rtLookupUnit(dia, 11), setup: 0 });

  } else if (vars.type === 'bundle') {
    const tubeOD = vars.tube_od || 0.75;
    const is38 = tubeOD < 0.5;
    const isSU = (vars.unit_type || 'SU') === 'SU';
    const passes = vars.passes || 2;
    const passCol = Math.min(Math.max(Math.floor(passes / 2), 1), 3);

    if (!is38 && tubeOD === 0.75 && (vars.tube_wall === 0.035 || !vars.tube_wall) && dia <= 20) {
      let colIdx = 0;
      for (let c = CUT_BEND_LENGTHS.length - 1; c >= 0; c--) {
        if (len <= CUT_BEND_LENGTHS[c]) colIdx = c;
      }
      const row = CUT_BEND_TABLE.find(r => r[0] >= dia) || CUT_BEND_TABLE[CUT_BEND_TABLE.length - 1];
      ops.push({ wc: 120, op: 'CUT & BEND TUBES', run: row[colIdx + 1], setup: 0 });
    }

    if (is38) {
      const tubeRow = TUBE_38_TABLE.find(r => r[0] >= dia) || TUBE_38_TABLE[TUBE_38_TABLE.length - 1];
      const tubes = tubeRow[passCol];
      const perTube = (vars.tube_material === 'STAINLESS') ? 0.0065 : 0.0054;
      const perTbLg = isSU ? 0.0023 : 0.0024;
      const perFtRate = isSU ? (dia < 10 ? 0.0318 : 0.0467) : (dia < 10 ? 0.0349 : 0.0514);
      const rate = 0.0816 + (perTube * tubes) + (0.0383 * 4) + (tubes * lenFt * perTbLg) + (perFtRate * lenFt);
      ops.push({ wc: 150, op: 'BUNDLE ASSEMBLY', run: rate, setup: 0 });
    } else {
      const tubes = rtLookupUnit(dia, passCol);
      const tierods = rtLookupUnit(dia, 4);
      const pht = rtLookupUnit(dia, 5) * lenFt;
      const perMatl = (vars.tube_material === 'STAINLESS') ? 0.0096 * tubes : 0.008 * tubes;
      const tbXft = isSU ? tubes * lenFt * 0.0023 : tubes * lenFt * 0.0025;
      ops.push({ wc: 150, op: 'BUNDLE ASSEMBLY', run: tierods * 0.0383 + pht + perMatl + tbXft + 0.0816, setup: 0 });
    }

  } else if (vars.type === 'setting') {
    let installBundle;
    if (dia <= 6) installBundle = 0.0107 * lenFt + 0.0674;
    else if (dia <= 18) installBundle = 0.0241 * lenFt + 0.0674;
    else installBundle = 0.0482 * lenFt + 0.1346;
    ops.push({ wc: 150, op: 'INSTALL BUNDLE', run: installBundle, setup: 0 });

    const testBase = rtLookupUnit(dia, 13);
    const testAdd = rtLookupUnit(dia, 14) * lenFt;
    ops.push({ wc: 160, op: 'HYDRO TEST', run: testBase + testAdd, setup: 0 });

    const actDia = rtLookupUnit(dia, 15);
    const paintBase = actDia * Math.PI * len * 0.0000343;
    const paintAdder = dia <= 10 ? 0.0701 : 0.0787;
    ops.push({ wc: 170, op: 'PAINT & SKID', run: paintBase + paintAdder + 0.30, setup: 0 });
  }
  return ops;
}

// ─── GPHE DXF BOM Extraction ──────────────────────────────────────────
function gpheExtractBomData(parsed) {
  const bomItems = [];
  let current = {};
  for (const a of parsed.attribs) {
    if (a.tag === 'ITEM') {
      if (current.ITEM) bomItems.push(current);
      current = { ITEM: a.value };
    } else if (['QTY', 'DESC', 'MATL', 'SPEC', 'PATT', 'PN'].includes(a.tag)) {
      current[a.tag] = a.value;
    }
  }
  if (current.ITEM) bomItems.push(current);

  // Port liners: PN starting with 3-340 (expanded liners on the top-level BOM)
  let linerCount = 0;
  for (const item of bomItems) {
    if ((item.PN || '').startsWith('3-340')) {
      linerCount += parseFloat(item.QTY) || 0;
    }
  }

  // Tightening bolts: sum QTY, extract diameter and length from DESC
  let boltCount = 0;
  const boltDetails = [];
  for (const item of bomItems) {
    const desc = (item.DESC || '').toUpperCase();
    if (desc.includes('TIGHTENING BOLT')) {
      const qty = parseFloat(item.QTY) || 0;
      boltCount += qty;
      const m = desc.match(/([\d.]+)\s*DIA\s*X\s*([\d.]+)\s*LG/);
      if (m) boltDetails.push({ qty, dia: parseFloat(m[1]), len: parseFloat(m[2]) });
    }
  }

  // Kanban parts: only specific PNs from the kanban table get machining operations
  const KANBAN_CARRY    = new Set(['4338049010600','4338049011000','4338049011300']);
  const KANBAN_GUIDE    = new Set(['4548049020600','4548049021000','4548049021300']);
  const KANBAN_SUPPORT  = new Set(['465801022002','465801047001']);
  let hasCarryBar = false, hasGuideBar = false, hasSupportColumn = false;
  for (const item of bomItems) {
    const pn = (item.PN || '').replace(/-/g, '');
    if (KANBAN_CARRY.has(pn)) hasCarryBar = true;
    if (KANBAN_GUIDE.has(pn)) hasGuideBar = true;
    if (KANBAN_SUPPORT.has(pn)) hasSupportColumn = true;
  }

  // Plate count from DXF text — look for "AP110-418-TKTL-63%" style model strings
  let plateCount = 0;
  if (parsed.texts) {
    for (const t of parsed.texts) {
      const m = t.value.match(/^A[FW]?P\d+\w*[-\u2013](\d+)[-\u2013]/);
      if (m) { plateCount = parseInt(m[1], 10); break; }
    }
  }

  return {
    linerCount: Math.round(linerCount),
    boltCount: Math.round(boltCount),
    boltDetails,
    hasCarryBar,
    hasGuideBar,
    hasSupportColumn,
    bomItemCount: bomItems.length,
    plateCount,
  };
}

function gpheResolveDwgPath() {
  // Drawing mode — primary file or altFormat
  if (S.mode === 'drawings' && S.dwgResult) {
    if (S.dwgResult.primary) {
      const p = S.dwgResult.primary;
      if (p.ext && p.ext.replace(']', '').toUpperCase() === 'DWG') return p.filepath;
    }
    if (S.dwgResult.altFormat) {
      const a = S.dwgResult.altFormat;
      if (a.ext && a.ext.replace(']', '').toUpperCase() === 'DWG') return a.filepath;
    }
    // Wildcard: selected file
    if (S.dwgResult.wildcard && S.selected >= 0) {
      const sel = S.files[S.selected];
      if (sel && sel.ext && sel.ext.replace(']', '').toUpperCase() === 'DWG') return sel.filepath;
    }
  }
  // Order mode — gpheFile is DWG or find DWG near DRS
  if (S.routeScan && S.routeScan.gphe && S.routeScan.gpheFile) {
    const gf = S.routeScan.gpheFile;
    if (gf.ext && gf.ext.replace(']', '').toUpperCase() === 'DWG') return gf.filepath;
    // DRS-identified: find a DWG in the file list
    if (S.files) {
      const dwg = S.files.find(f =>
        f.type !== 'section-header' &&
        f.ext && f.ext.replace(']', '').toUpperCase() === 'DWG'
      );
      if (dwg) return dwg.filepath;
    }
  }
  return null;
}

async function gpheAttemptDxfEnhancement(dwgPath) {
  if (!dwgPath) return null;
  try {
    const result = await window.api.convertDwgDxfText(dwgPath);
    if (!result.ok) return null;
    const parsed = rtParseDXF(result.text);
    const bomData = gpheExtractBomData(parsed);
    if (bomData.bomItemCount === 0) return null;
    return bomData;
  } catch { return null; }
}

function gpheBaseDigits(input) {
  // Strip brackets, file extension, and revision suffix (rNN/RNN) to get just the drawing number
  let clean = input.replace(/^\[|\]$/g, '').replace(/\.\w+$/i, '').replace(/[rR]\d+$/, '');
  return clean.replace(/[^0-9]/g, '');
}

function isGpheDrawing(drawingNum) {
  const digits = gpheBaseDigits(drawingNum);
  if (digits.length < 12 || digits.length > 13) return false;
  const first2 = parseInt(digits.substring(0, 2));
  if (first2 < 54 || first2 > 55) return false;
  if (digits[4] !== '2') return false;
  // Verify model code exists in the GPHE calculator
  const nonConfig = parseInt(digits.substring(1, 4));
  if (GPHE_MODELS.find(r => r[1] === nonConfig)) return true;
  const asNonConfig = Math.floor(nonConfig/100)*100 + ((Math.floor(nonConfig/10)%10)+5)*10 + nonConfig%10;
  if (GPHE_MODELS.find(r => r[1] === asNonConfig)) return true;
  return false;
}

// Classify a drawing filename as U-Tube setting, shell, or bundle (or null)
function classifyUtubeDwg(name) {
  const base = (name || '').replace(/^\[|\]$/g, '');
  const lo = base.toLowerCase();
  if (lo === 'setting.dwg') return 'setting';
  if (lo === 'shell.dwg') return 'shell';
  if (lo === 'bundle.dwg') return 'bundle';
  const m = base.match(/^(\d{4})/);
  if (!m) return null;
  const n4 = parseInt(m[1], 10);
  if (n4 >= 5254 && n4 <= 5294) return 'setting';
  if ((n4 >= 4620 && n4 <= 4626) || n4 === 4646) return 'shell';
  if ((n4 >= 4220 && n4 <= 4263) || (n4 >= 4298 && n4 <= 4299)) return 'bundle';
  return null;
}

function gpheCalculateRouting(drawingNum, bomData) {
  const digits = gpheBaseDigits(drawingNum);
  if (!isGpheDrawing(drawingNum)) return null;

  const nonConfig = parseInt(digits.substring(1, 4));
  const pressureDigit = parseInt(digits[5]);
  const platesFromDwgNum = digits.length >= 13 ? parseInt(digits.substring(6, 10)) : parseInt(digits.substring(6, 9));
  const hasBomPlates = bomData && bomData.plateCount > 0;
  const plates = Math.min(hasBomPlates ? bomData.plateCount : platesFromDwgNum, 1500);

  // Try non-config code first, then convert config→non-config (add 5 to tens digit)
  let modelRow = GPHE_MODELS.find(r => r[1] === nonConfig);
  if (!modelRow) {
    const asNonConfig = Math.floor(nonConfig/100)*100 + ((Math.floor(nonConfig/10)%10)+5)*10 + nonConfig%10;
    modelRow = GPHE_MODELS.find(r => r[1] === asNonConfig);
  }
  if (!modelRow) return null;

  const [model, , port, b150, b300, mawp150, mawp300,
    gskMin, paintMin, assyR, assyS, expLin,
    hangC, peenC, tigSC, namep, splash, drain, skid, flat] = modelRow;

  const pEntry = GPHE_PRESSURE.find(p => p[0] === pressureDigit) || [0, 0, 0];
  const psigHigh = pEntry[2];
  const boltsFromDrawing = (psigHigh > (mawp150 || 999) && b300 > 0) ? b300 : (b150 || b300);
  const hasBom = bomData && bomData.bomItemCount > 0;
  const bolts = (hasBom && bomData.boltCount > 0) ? bomData.boltCount : boltsFromDrawing;

  const m2h = v => v / 60;
  const ops = [];

  // Assemble frame
  if (assyR > 0) ops.push({ wc: 707, op: 'ASSEMBLE FRAME', run: m2h(assyR), setup: m2h(assyS) });

  // All formulas below use per-model lookups from GPHE calculator Data tab.
  // Port-based grouping is unreliable — many models are exceptions within their port size.
  const _s = new Set;  // reusable set builder
  const _in = (...ms) => { _s.clear(); ms.forEach(m => _s.add(m)); return _s.has(model); };

  // Hang plates — run is hangC * plates / 60 (hangC already per-model in GPHE_MODELS)
  // Setup: flat 12.5, flat 15, or =1.25*IF(Plates<=100, C, C*Plates/100) where C=10/15/16
  if (hangC > 0 && plates > 0) {
    let hangSetup;
    const FLAT15 = _in('P19','P31','P21','P22','WP26','P45');
    if (FLAT15) { hangSetup = 15; }
    else if (port <= 3) { hangSetup = 12.5; }
    else {
      const HSC = { 'P188':16,'P251':16,'P352':16,'P145':16,'P210':16,'P201':16,
                    'P100':15,'P100X':15,'FP101':15,'P130':15,'P152':15,'P220':15,'P113':15,'P81':15,'P121':15 };
      const c = HSC[model] || 10;
      hangSetup = 1.25 * Math.max(c, c * plates / 100);
    }
    ops.push({ wc: 707, op: 'HANG PLATES', run: m2h(hangC * plates / 60), setup: m2h(hangSetup) });
  }

  // Peen bolts — =1.25 * peenC * bolts (peenC already per-model in GPHE_MODELS)
  if (peenC > 0 && bolts > 0)
    ops.push({ wc: 707, op: 'PEEN BOLTS', run: m2h(1.25 * peenC * bolts), setup: 0 });

  // Tighten plate pack — per-model formulas from Data tab
  if (plates > 0 && bolts > 0) {
    let tigRun;
    if (_in('P47','P55','P64','P41','P42','WP54')) tigRun = 50;
    else if (_in('P62','P86','P110','P43','P65')) tigRun = 1.25 * (plates <= 200 ? 40 : 30 * plates / 100);
    else if (_in('P100','P100X','FP101','P130','P152','P220','P113','P81','P121')) tigRun = 1.25 * (plates <= 150 ? 60 : 50 * plates / 100);
    else if (_in('P188','P251','P352','P145','P210','P201')) tigRun = 1.25 * (plates <= 150 ? 120 : 120 * plates / 100);
    else tigRun = 18.75;

    let tigSetup;
    if (_in('P62')) tigSetup = 1.25 * (plates <= 200 ? 16 : 30);
    else if (_in('P86','P110','P43')) tigSetup = 1.25 * (plates <= 200 ? 2 * bolts : 30);
    else if (_in('P65','P100','P100X','FP101','P130','P152','P220','P113')) tigSetup = 1.25 * (plates <= 150 ? 30 : 50);
    else if (_in('P81','P121')) tigSetup = 1.25 * (plates <= 150 ? 20 : 40);
    else if (_in('P188','P251','P352','P145')) tigSetup = 1.25 * (plates <= 150 ? 25 : 40);
    else if (_in('P210','P201')) tigSetup = 1.25 * (plates <= 150 ? 30 : 50);
    else tigSetup = 1.25 * tigSC * bolts;

    ops.push({ wc: 707, op: 'TIGHTEN PLATE PACK', run: m2h(tigRun), setup: m2h(tigSetup) });
  }

  // Hydro test — per-model formulas from Data tab
  if (plates > 0) {
    let testMins;
    if (_in('P43')) testMins = 1.25 * (psigHigh <= 200 ? (0.42 * plates) + 32 : (0.42 * plates) + 45);
    else if (_in('P47','P55','P64','P41','P42','WP54','P62','P86','P110')) testMins = 1.25 * (psigHigh <= 200 ? (0.36 * plates) + 36 : (0.36 * plates) + 60);
    else if (_in('P65','P100','P100X','FP101','P130','P152','P220','P113','P81','P121')) testMins = 1.25 * (psigHigh <= 200 ? (0.42 * plates) + 52 : (0.42 * plates) + 99);
    else if (_in('P188','P251','P352','P145','P210','P201')) testMins = 1.25 * (psigHigh <= 200 ? (0.45 * plates) + 70 : (0.42 * plates) + 90);
    else testMins = 1.25 * ((0.3 * plates) + 40);
    ops.push({ wc: 707, op: 'HYDRO TEST', run: m2h(testMins), setup: 0 });
  }

  // Attach nameplate
  if (namep > 0) ops.push({ wc: 707, op: 'ATTACH NAMEPLATE', run: m2h(namep), setup: 0 });

  // Create splash shield
  if (splash > 0) ops.push({ wc: 707, op: 'CREATE SPLASH SHIELD', run: m2h(splash), setup: 0 });

  // Drain & prep
  if (drain > 0) ops.push({ wc: 707, op: 'DRAIN & PREP', run: m2h(drain), setup: 0 });

  // Package (skid for < 500 plates, flatbed otherwise)
  const pkgMins = plates < 500 ? skid : flat;
  if (pkgMins > 0) ops.push({ wc: 707, op: 'PACKAGE', run: m2h(pkgMins), setup: 0 });

  // Extra / DXF-confirmed operations
  // When DXF is available, machining goes at the start of ops and liners go after assembly.
  // Without DXF, these stay in extras as "if applicable".
  const extras = [];
  if (hasBom) {
    // Machining ops — insert at the beginning of ops (before assembly)
    const preOps = [];
    if (bomData.hasCarryBar) preOps.push({ wc: 710, op: 'MACHINE CARRY BAR', run: 0.4, setup: 0 });
    if (bomData.hasGuideBar) preOps.push({ wc: 710, op: 'MACHINE GUIDE BAR', run: 0.25, setup: 0 });
    if (bomData.hasSupportColumn) preOps.push({ wc: 710, op: 'MACHINE SUPPORT COLUMN', run: 0.25, setup: 0 });
    if (preOps.length) ops.unshift(...preOps);
    // Expand liners — insert right after assembly
    if (expLin > 0 && bomData.linerCount > 0) {
      const perLiner = expLin / 4;
      const linerOp = { wc: 707, op: 'EXPAND LINERS', run: m2h(perLiner * bomData.linerCount), setup: 0, note: bomData.linerCount + ' liners' };
      const assyIdx = ops.findIndex(o => o.op === 'ASSEMBLE FRAME');
      if (assyIdx >= 0) ops.splice(assyIdx + 1, 0, linerOp);
      else ops.unshift(linerOp);
    }
  } else {
    // No DXF — extras section (if applicable)
    if (expLin > 0) extras.push({ op: 'EXPAND LINERS', run: m2h(expLin) });
    if (port === 2.5 || port === 3 || port === 4) extras.push({ op: 'MACHINE CARRY BAR', run: 0.4 });
    if (port === 2.5 || port === 3 || port === 4) extras.push({ op: 'MACHINE GUIDE BAR', run: 0.25 });
    if (model === 'P21' || model === 'P22' || model === 'P47') extras.push({ op: 'MACHINE SUPPORT COLUMN', run: 0.25 });
  }

  const platesPerHr = gskMin > 0 ? 60 / gskMin : 0;
  const platesPerHrStr = platesPerHr > 0 ? (platesPerHr % 1 === 0 ? String(platesPerHr) : platesPerHr.toFixed(1)) : '';

  return {
    model, plates, psigHigh, bolts, port,
    gasketing: gskMin > 0 ? { platesPerHr: platesPerHrStr, starterPlate: m2h(Math.min(gskMin * 4, 15)) } : null,
    extras,
    ops,
    dxf: hasBom ? {
      used: true,
      linerCount: bomData.linerCount,
      boltCount: bomData.boltCount,
      boltDetails: bomData.boltDetails,
      hasCarryBar: bomData.hasCarryBar,
      hasGuideBar: bomData.hasGuideBar,
      hasSupportColumn: bomData.hasSupportColumn,
      boltsChanged: bomData.boltCount > 0 && bomData.boltCount !== boltsFromDrawing,
      platesFromDxf: hasBomPlates,
      platesChanged: hasBomPlates && bomData.plateCount !== platesFromDwgNum,
    } : { used: false },
  };
}

  const el = overlay.querySelector(`#route-step-${idx}`);

  const icon = el.querySelector('.step-icon');
  if (state === 'active') icon.innerHTML = '<div class="route-spinner"></div>';
  else if (state === 'done') icon.innerHTML = RT_CHECK_SVG;
  else if (state === 'error') icon.innerHTML = RT_X_SVG;
  else if (state === 'skipped') icon.innerHTML = RT_SKIP_SVG;
  if (detail) {
    const file = overlay.querySelector(`#route-file-${idx}`);
    if (file) file.textContent = detail;
  }
  if (timeSec !== undefined) {
    const timeEl = overlay.querySelector(`#route-time-${idx}`);
    if (timeEl) timeEl.textContent = timeSec.toFixed(1) + 's';
  }
}

// Round half up — counteracts JS floating-point where e.g. 7.725 → 7.7249999...
function roundHalfUp(n, d = 2) {
  const f = Math.pow(10, d);
  return Math.round(n * f + 1e-10) / f;
}

// Shared routing display helpers (used by both U-Tube and GPHE results)
function rtFmt(n) {
  if (n === undefined || n === null || n === 0) return '';
  const s = roundHalfUp(n).toFixed(2);
  return s.startsWith('0.') ? s.slice(1) : s;
}
function rtFmtTotal(n) {
  const s = roundHalfUp(n).toFixed(2);
  return s.startsWith('0.') ? s.slice(1) : s;
}
function rtSentenceCase(s) { return s.charAt(0) + s.slice(1).toLowerCase(); }

async function handleSoapUpload(allOps, btn, defaultBasis) {
  // Resolve BPCS part number
  let pn = null;
  btn.textContent = 'Resolving...';
  if (S.currentOrder && S.currentLine) {
    try {
      const r = await window.api.bpcsGetItemNumber('SANDBOX', S.currentOrder, S.currentLine);
      if (r.ok && r.result && r.result.trim()) pn = r.result.trim();
    } catch (e) { /* fall through to prompt */ }
  }
  if (!pn) {
    btn.textContent = 'SOAP';
    alert('Could not resolve BPCS part number. Search an order first so we can look up the item number.');
    return;
  }

  // Flatten ops
  const flatOps = [];
  let opNum = 10;
  for (const { ops } of allOps) {
    for (const op of ops) {
      flatOps.push({ op: opNum, wc: op.wc, desc: (op.op || '').slice(0, 30), run: op.run || 0, setup: op.setup || 0, basis: op.basis || defaultBasis || '' });
      opNum += 10;
    }
  }

  // Confirmation
  const msg = `Upload ${flatOps.length} operations to SANDBOX for:\n${pn}\n\nOps: ${flatOps.map(o => o.op + ' ' + o.desc).join(', ')}\n\nProceed?`;
  if (!confirm(msg)) { btn.textContent = 'SOAP'; return; }

  btn.textContent = 'Uploading...';
  btn.disabled = true;
  try {
    const r = await window.api.bpcsUploadRouting('SANDBOX', pn, flatOps);
    if (r.ok) {
      btn.textContent = `Done! ${r.summary.succeeded}/${r.summary.total}`;
      btn.style.background = 'var(--accent)'; btn.style.color = '#fff';
    } else {
      const details = r.results.filter(x => !x.ok).map(x => `Op ${x.op}: ${x.error}`).join('\n');
      btn.textContent = `${r.summary.succeeded}/${r.summary.total} ok`;
      btn.style.background = '#c44'; btn.style.color = '#fff';
      alert(`Upload partial:\n${r.summary.succeeded} succeeded, ${r.summary.failed} failed, ${r.summary.skipped} skipped\n\n${details}`);
    }
  } catch (e) {
    btn.textContent = 'Error';
    alert('SOAP upload failed: ' + e.message);
  }
  btn.disabled = false;
}

function showRoutingResults(overlay, allOps, allVars, warnings, scanNames) {
  const modal = overlay.querySelector('.modal');
  const fmt = rtFmt, fmtTotal = rtFmtTotal;
  const typeLabel = { shell: 'Shell', bundle: 'Bundle', setting: 'Setting (final)' };
  const typeClass = { shell: 'shell', bundle: 'bundle', setting: 'setting' };

  // Build inputs summary for each drawing type
  let inputsHtml = '';
  for (const { type, vars: v } of allOps) {
    const pills = [];
    if (v.nom_dia) pills.push(`${v.nom_dia}" \u00d7 ${v.nom_length}"`);
    if (v.unit_type) pills.push(v.unit_type);
    if (v.passes) pills.push(`${v.passes}-pass`);
    if (type === 'shell' && v.connections && v.connections.length) {
      // Group connections by size for compact display
      const counts = {};
      for (const c of v.connections) counts[c] = (counts[c] || 0) + 1;
      const parts = Object.entries(counts).sort((a,b) => b[0] - a[0]).map(([sz, ct]) => ct > 1 ? `${ct}\u00d7 ${sz}"` : `${sz}"`);
      pills.push(`Conns: ${parts.join(', ')}`);
      if (v.shell_material && v.shell_material !== 'STEEL') pills.push(v.shell_material);
    }
    if (type === 'bundle') {
      if (v.tube_od) pills.push(`${v.tube_od}" OD tube`);
      if (v.tube_wall) pills.push(`.${String(v.tube_wall).replace('0.','')} wall`);
      if (v.tube_material) pills.push(v.tube_material);
    }
    if (pills.length) {
      const color = { shell: '#22d3ee', bundle: '#34d399', setting: '#fbbf24' }[type] || 'var(--text3)';
      inputsHtml += `<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:6px">
        <span style="font:700 9px/1 'DM Sans',sans-serif;letter-spacing:.5px;color:${color};min-width:52px">${typeLabel[type]?.replace(' (FINAL)','') || type.toUpperCase()}</span>
        ${pills.map(p => `<span style="font:500 10px/1 'DM Sans',sans-serif;color:var(--text2);background:var(--glass);border:1px solid var(--glass-border);border-radius:6px;padding:3px 7px">${escHtml(p)}</span>`).join('')}
      </div>`;
    }
  }

  let totalRun = 0, totalSetup = 0;
  let rows = '';
  for (const { type, ops, vars: v } of allOps) {
    if (!ops.length) continue;
    const label = typeLabel[type] || type.toUpperCase();
    const cls = typeClass[type] || '';
    const info = v.nom_dia ? ` \u2014 ${v.nom_dia}" \u00d7 ${v.nom_length}"` : '';
    rows += `<tr class="group-header ${cls}"><td colspan="4">${label}${info}</td></tr>`;
    for (const op of ops) {
      totalRun += roundHalfUp(op.run || 0);
      totalSetup += roundHalfUp(op.setup || 0);
      rows += `<tr><td style="width:40px;color:var(--text3)">${op.wc}</td><td>${rtSentenceCase(op.op)}</td><td class="num">${fmt(op.run)}</td><td class="num">${fmt(op.setup)}</td></tr>`;
    }
  }
  rows += `<tr class="total-row"><td></td><td>Total</td><td class="num">${fmtTotal(totalRun)}</td><td class="num">${fmtTotal(totalSetup)}</td></tr>`;

  const warnHtml = warnings.length
    ? `<div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:8px;padding:8px 12px;margin-bottom:14px;font:500 11px/1.4 'DM Sans',sans-serif;color:#fbbf24">${warnings.join('<br>')}</div>`
    : '';

  const settingVars = allOps.find(o => o.type === 'setting')?.vars;
  const title = settingVars?.title || 'U-Tube Routing';
  const unitInfo = settingVars?.unit_type ? ` (${settingVars.unit_type}, ${settingVars.passes}P)` : '';

  modal.style.width = '440px';
  modal.style.maxHeight = '85vh';
  modal.style.overflowY = 'auto';
  modal.innerHTML = `
    <div style="font:700 15px/1.3 'DM Sans',sans-serif;margin-bottom:4px">${escHtml(title)}${unitInfo}</div>
    <div style="font:500 10px/1 'IBM Plex Mono',monospace;color:var(--text3);margin-bottom:12px">${escHtml(settingVars?.mxpn || '')}</div>
    ${inputsHtml ? `<div style="margin-bottom:14px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--glass-border);border-radius:10px">${inputsHtml}</div>` : ''}
    ${warnHtml}
    <table class="route-table">
      <thead><tr><th style="width:40px">WC</th><th>OPERATION</th><th class="num" style="width:60px">RUN</th><th class="num" style="width:60px">SETUP</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="route-action-bar">
      <button class="btn-route-action no-drag" id="route-copy-excel">${t('Copy to Excel')}</button>
      <button class="btn-route-action no-drag" id="route-pcomm" style="background:var(--accent);color:#fff">Route-O-Matic</button>
      <button class="btn-route-action no-drag" id="route-soap" style="font-size:10px" data-tip="Upload via BPCS web service (sandbox)">SOAP</button>
      <!-- ACS Route-O-Matic button (disabled for now — macro gen works, needs polish) -->
      <!-- <button class="btn-route-action no-drag" id="route-acs" style="font-size:10px" data-tip="Generate ACS macro file">ACS</button> -->
      <button class="btn-route-action btn-route-primary no-drag" id="route-close">Close</button>
    </div>`;
  modal.querySelector('#route-close').addEventListener('click', () => overlay.remove());
  // SOAP upload
  modal.querySelector('#route-soap').addEventListener('click', function() { handleSoapUpload(allOps, this); });
  // Copy to Excel — tab-separated values
  modal.querySelector('#route-copy-excel').addEventListener('click', function() {
    const tsvRows = [['WC', 'Operation', 'Run', 'Setup'].join('\t')];
    for (const { type, ops, vars: v } of allOps) {
      if (!ops.length) continue;
      const label = typeLabel[type] || type.toUpperCase();
      const info = v.nom_dia ? ' \u2014 ' + v.nom_dia + '" \u00d7 ' + v.nom_length + '"' : '';
      tsvRows.push(['', label + info, '', ''].join('\t'));
      for (const op of ops) {
        tsvRows.push([op.wc, rtSentenceCase(op.op), fmt(op.run), fmt(op.setup)].join('\t'));
      }
    }
    tsvRows.push(['', 'Total', fmtTotal(totalRun), fmtTotal(totalSetup)].join('\t'));
    window.api.copyText(tsvRows.join('\n'));
    this.textContent = t('Copied!');
    setTimeout(() => { this.textContent = t('Copy to Excel'); }, 2000);
  });
  // Route-O-Matic — drive PCOMM to enter operations
  modal.querySelector('#route-pcomm').addEventListener('click', async function() {
    const pick = await askSessionLetter();
    if (!pick) return;

    // Determine which ops to upload
    let targetOps = allOps;

    // Orders mode with multiple drawing types — auto-detect from PCOMM item number
    if (scanNames && allOps.length > 1) {
      this.textContent = 'Reading...';
      const rd = await window.api.readPcommItem(pick.session);
      if (rd.ok && rd.item) {
        const item = rd.item.toUpperCase().replace(/-/g, '');
        let matchedType = null;

        // Check prefixes: % or BY/SY → setting (final assembly)
        if (item.startsWith('%') || item.startsWith('BY') || item.startsWith('SY')) {
          matchedType = 'setting';
        }

        // Check against drawing filenames
        if (!matchedType) {
          for (const type of ['shell', 'bundle', 'setting']) {
            if (!scanNames[type]) continue;
            // Strip extension and revision, extract digits for comparison
            const dwgDigits = scanNames[type].replace(/\.\w+$/i, '').replace(/[rR]\d+$/, '').replace(/[^0-9]/g, '');
            if (dwgDigits && item.includes(dwgDigits)) { matchedType = type; break; }
          }
        }

        // For generic names (SHELL.dwg, BUNDLE.dwg), classify by item number ranges
        if (!matchedType) {
          const m = item.match(/(\d{4})/);
          if (m) {
            const n4 = parseInt(m[1], 10);
            if ((n4 >= 4620 && n4 <= 4626) || n4 === 4646) matchedType = 'shell';
            else if ((n4 >= 4220 && n4 <= 4263) || (n4 >= 4298 && n4 <= 4299)) matchedType = 'bundle';
            else if (n4 >= 5254 && n4 <= 5294) matchedType = 'setting';
          }
        }

        if (matchedType) {
          const matched = allOps.filter(o => o.type === matchedType);
          if (matched.length) {
            targetOps = matched;
            console.log(`Route-O-Matic: PCOMM item "${rd.item}" → ${matchedType}`);
          }
        }

        if (!matchedType) {
          this.textContent = 'Route-O-Matic';
          alert(`Could not determine item type from PCOMM item "${rd.item}".`);
          return;
        }
      } else {
        // Couldn't read PCOMM — fall back to uploading all ops
        console.log('Route-O-Matic: could not read PCOMM item, uploading all ops');
      }
    }

    // Flatten selected ops with auto-numbering
    const flatOps = [];
    let opNum = pick.startOp;
    for (const { ops } of targetOps) {
      for (const op of ops) {
        flatOps.push({ op: opNum, wc: op.wc, desc: (op.op || '').slice(0, 30), run: op.run || 0, setup: op.setup || 0, basis: op.basis || '' });
        opNum += 10;
      }
    }
    this.textContent = 'Launching...';
    const r = await window.api.routeOMatic(flatOps, pick.session);
    if (r.ok) { this.textContent = t('Launched!'); } else { alert('Error: ' + r.msg); this.textContent = 'Route-O-Matic'; }

// ─── Brazed (BPHE) Routing Calculator ──────────────────────────────────

function bpMatchModel(modNo, key) {
  if (key === 'ALL') return true;
  if (key === 'Large port') return modNo > 430;
  if (typeof key === 'number') return modNo === key;
  if (typeof key === 'string' && /^\d+X$/.test(key)) return Math.floor(modNo / 10) === parseInt(key.slice(0, -1));
  return false;
}

function bpLookupFlat(table, modNo) {
  for (const [model, val] of table) if (bpMatchModel(modNo, model)) return val;
  return null;
}

function bpLookupRange(table, modNo, plates) {
  for (const [model, min, max, total] of table) if (bpMatchModel(modNo, model) && plates >= min && plates <= max) return total;
  return null;
}

function bpLookupCompressRange(table, modType, modNo, plates) {
  for (const [type, model, min, max, total] of table) if (type === modType && bpMatchModel(modNo, model) && plates >= min && plates <= max) return total;
  return null;
}

function brazedCalculateRouting(data) {
  const { modType, modNo, plates, studs, asme, swagedConns } = data;
  const isLargePort = modNo > 430;
  const ops = [];

  // Pull plates — 430 + Large port only
  if (modNo >= 430) {
    const t = bpLookupFlat(BP_PULL, modNo);
    if (t !== null) ops.push({ wc: 304, op: 'Pull plates', run: t });
  }

  // Press plates — < 430 only, BPDW = 2x time
  if (modNo < 430) {
    const perPlate = bpLookupFlat(BP_PRESS, modNo);
    if (perPlate !== null) {
      let run = perPlate * plates;
      if (modType === 'BPDW') run *= 2;
      ops.push({ wc: 301, op: 'Press plates', run });
    }
  }

  // Spray plates — BPDW only
  if (modType === 'BPDW') {
    const perPair = bpLookupFlat(BP_SPRAY, modNo);
    if (perPair !== null) ops.push({ wc: 302, op: 'Spray plates', run: perPair * plates });
  }

  // Compress plate pack — BPDW and BPN only
  if (modType === 'BPDW' || modType === 'BPN') {
    const t = bpLookupCompressRange(BP_COMPRESS, modType, modNo, plates);
    if (t !== null) ops.push({ wc: 302, op: 'Compress plate pack', run: t });
  }

  // Build plate pack — all models
  { const t = bpLookupRange(BP_BUILD, modNo, plates); if (t !== null) ops.push({ wc: 302, op: 'Build plate pack', run: t }); }

  // Swage — if swaged connections exist
  if (swagedConns > 0) {
    const perConn = bpLookupFlat(BP_SWAGE, modNo);
    if (perConn !== null) ops.push({ wc: 307, op: 'Swage', run: perConn * swagedConns });
  }

  // Cut copper top+bottom plates — Large port only
  if (isLargePort) {
    const t = bpLookupFlat(BP_CUT_COPPER, modNo);
    if (t !== null) ops.push({ wc: 301, op: 'Cut top+bottom plates', run: t });
  }

  // Braze — all models
  { const t = bpLookupRange(BP_BRAZE, modNo, plates); if (t !== null) ops.push({ wc: 303, op: 'Braze', run: t }); }

  // Prep for test — all models
  { const t = bpLookupRange(BP_PREP_TEST, modNo, plates); if (t !== null) ops.push({ wc: 304, op: 'Prep for test', run: t }); }

  // Pressure test — all models
  { const t = bpLookupRange(BP_TEST, modNo, plates); if (t !== null) ops.push({ wc: 304, op: 'Pressure test', run: t }); }

  // Weld code plate — ASME only
  if (asme) { const t = bpLookupRange(BP_CODE, modNo, plates); if (t !== null) ops.push({ wc: 305, op: 'Weld code plate', run: t }); }

  // Weld studs — studs only
  if (studs) { const t = bpLookupFlat(BP_STUDS, modNo); if (t !== null) ops.push({ wc: 308, op: 'Weld studs', run: t }); }

  // Retest — ASME only (same test time again after code plate welded)
  if (asme) { const t = bpLookupRange(BP_TEST, modNo, plates); if (t !== null) ops.push({ wc: 304, op: 'Retest', run: t }); }

  // Dry unit — Large port only
  if (isLargePort) { const t = bpLookupFlat(BP_DRY, modNo); if (t !== null) ops.push({ wc: 304, op: 'Dry unit', run: t }); }

  // Prep to ship — all models
  { const t = bpLookupRange(BP_SHIP, modNo, plates); if (t !== null) ops.push({ wc: 305, op: 'Prep to ship', run: t }); }

  const modTypeLabel = modType === 'BPDW' ? 'Brazed Double-Wall' : modType === 'BPN' ? 'Brazed Nickel' : 'Brazed Copper';
  return { ops, modType, modTypeLabel, modNo, plates, studs, asme, swagedConns, model: data.model };
}

    const arrow = open ? '\u25B4' : '\u25BE';
    const count = _histCount > 0 ? `  \u00b7  ${_histCount} order${_histCount !== 1 ? 's' : ''}` : '';
    toggle.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>ORDER HISTORY ${arrow}<span style="font-weight:400;color:var(--text3);font-size:8px">${count}</span>`;
  }
  updateToggle(false);

  // Toggle expand/collapse
  toggle.onclick = async () => {
    const isHidden = body.style.display === 'none';
    body.style.display = isHidden ? '' : 'none';
    updateToggle(isHidden);
    // Hide/show key button when history is expanded/collapsed
    const odaBtn = $('#btn-install-oda');
    if (odaBtn) odaBtn.style.display = isHidden ? 'none' : '';
    if (isHidden && !_bpcsHistoryCache[drawingBase]) {
      status.textContent = 'Querying BPCS\u2026';
      status.style.display = '';
      table.style.display = 'none';
      rows.innerHTML = '';
      try {
        const r = await window.api.bpcsDrawingHistory(drawingBase);
        if (!r.ok) { status.textContent = 'Error: ' + r.error; return; }
        _bpcsHistoryCache[drawingBase] = r.rows;
        _histCount = r.rows.length;
        updateToggle(true);
        renderBpcsHistory(r.rows);
      } catch (e) { status.textContent = 'Failed: ' + e.message; }
    } else if (isHidden && _bpcsHistoryCache[drawingBase]) {
      renderBpcsHistory(_bpcsHistoryCache[drawingBase]);
    }
  };
}

function renderBpcsHistory(data) {
  const status = $('#bpcs-history-status');
  const table = $('#bpcs-history-table');
  const rowsEl = $('#bpcs-history-rows');
  if (!data.length) { status.textContent = 'No orders found for this drawing.'; status.style.display = ''; table.style.display = 'none'; return; }
  status.style.display = 'none';
  table.style.display = '';
  rowsEl.innerHTML = data.map(r => `<tr style="border-bottom:1px solid var(--glass-border)">
    <td style="padding:3px 6px;white-space:nowrap;color:var(--accent);text-align:center">${escHtml(r.orderLine)}</td>
    <td class="bpcs-item-copy" style="padding:3px 6px;white-space:nowrap;font-size:9px;color:var(--text2);cursor:pointer" data-pn="${escHtml(r.itemNumber)}" title="Click to copy">${escHtml(r.itemNumber)}</td>
    <td style="padding:3px 4px;white-space:nowrap;text-align:center">${escHtml(r.schedDate)}</td>
    <td style="padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;font-family:'DM Sans',sans-serif;font-size:10px">${escHtml(r.customer)}</td>
    <td style="padding:3px 3px;font-size:9px;color:var(--text3);text-align:center">${escHtml(r.itemClass)}</td>
    <td style="padding:3px 6px;text-align:center">${escHtml(r.qty)}</td>
  </tr>`).join('');
  // Click-to-copy on item numbers
  rowsEl.querySelectorAll('.bpcs-item-copy').forEach(td => {
    td.addEventListener('click', () => {
      window.api.copyText(td.dataset.pn);
      const orig = td.textContent;
      td.textContent = 'Copied!';
      td.style.color = 'var(--accent)';
      setTimeout(() => { td.textContent = orig; td.style.color = ''; }, 1200);
    });
  });
}

function resetRouteState() {
  S.routeScan = null;
  const btn = $('#btn-route');
  if (btn) { btn.classList.remove('route-ready', 'route-locked'); btn.innerHTML = t('Route'); btn.removeAttribute('data-tip'); btn.disabled = true; btn.style.opacity = '.4'; }
}

async function checkRouteability() {
  const btn = $('#btn-route');
  if (!btn) return;

  if (S.mode === 'drawings') {
    // GPHE check for single-drawing card mode
    if (S.dwgResult && S.dwgResult.primary) {
      if (isGpheDrawing(S.dwgResult.primary.name || '')) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    // GPHE check for wildcard mode — use selected file
    if (S.dwgResult && S.dwgResult.wildcard && S.selected >= 0) {
      const sel = S.files[S.selected];
      if (sel && sel.type !== 'section-header' && isGpheDrawing(sel.name || '')) {
        S.routeScan = { ok: true, gphe: true, gpheFile: sel, msg: 'GPHE drawing found' };
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    // U-Tube check for single-drawing card mode (setting or shell only)
    if (S.dwgResult && S.dwgResult.primary) {
      const utype = classifyUtubeDwg(S.dwgResult.primary.name || '');
      if (utype === 'setting' || utype === 'shell') {
        const dxfConv = await window.api.checkDxfConverter();
        if (!dxfConv) {
          btn.classList.remove('route-ready');
          btn.classList.add('route-locked');
          btn.disabled = true;
          btn.style.opacity = '';
          btn.innerHTML = '<span class="lock-icon">&#128274;</span>Route';
          btn.setAttribute('data-tip', 'Install ODA File Converter (free) or AutoCAD');
          return;
        }
        btn.classList.remove('route-locked');
        btn.innerHTML = t('Route');
        btn.removeAttribute('data-tip');
        S.routeScan = { ok: true, utube: true, utubeType: utype, utubeFile: S.dwgResult.primary, msg: `U-Tube ${utype} drawing` };
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    // U-Tube check for wildcard mode (setting or shell only)
    if (S.dwgResult && S.dwgResult.wildcard && S.selected >= 0) {
      const sel = S.files[S.selected];
      if (sel && sel.type !== 'section-header') {
        const utype = classifyUtubeDwg(sel.name || '');
        if (utype === 'setting' || utype === 'shell') {
          const dxfConv = await window.api.checkDxfConverter();
          if (!dxfConv) {
            btn.classList.remove('route-ready');
            btn.classList.add('route-locked');
            btn.disabled = true;
            btn.style.opacity = '';
            btn.innerHTML = '<span class="lock-icon">&#128274;</span>Route';
            btn.setAttribute('data-tip', 'Install ODA File Converter (free) or AutoCAD');
            return;
          }
          btn.classList.remove('route-locked');
          btn.innerHTML = t('Route');
          btn.removeAttribute('data-tip');
          S.routeScan = { ok: true, utube: true, utubeType: utype, utubeFile: sel, msg: `U-Tube ${utype} drawing` };
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.classList.add('route-ready');
          return;
        }
      }
    }
    resetRouteState();
    return;
  }

  // Orders mode — check for U-Tube OR GPHE
  if (!S.currentFolder || S.mode !== 'orders') { resetRouteState(); return; }
  const wasReady = btn.classList.contains('route-ready');
  if (!wasReady) resetRouteState();
  try {
    // Check U-Tube
    const scan = await window.api.scanFolderUtube(S.currentFolder);
    if (S.currentFolder && S.mode === 'orders') {
      S.routeScan = scan;
      if (scan.ok) {
        // U-Tube routing needs a DXF converter (ODA or accoreconsole)
        const dxfConv = await window.api.checkDxfConverter();
        if (!dxfConv) {
          btn.classList.remove('route-ready');
          btn.classList.add('route-locked');
          btn.disabled = true;
          btn.style.opacity = '';
          btn.innerHTML = '<span class="lock-icon">&#128274;</span>Route';
          btn.setAttribute('data-tip', 'Install ODA File Converter (free) or AutoCAD');
          return;
        }
        btn.classList.remove('route-locked');
        btn.innerHTML = t('Route');
        btn.removeAttribute('data-tip');
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    // Check GPHE — look for any 54xxx or 55xxx drawing in the file list
    if (S.files) {
      for (const f of S.files) {
        if (isGpheDrawing(f.name)) {
          S.routeScan = { ok: true, gphe: true, gpheFile: f, msg: 'GPHE drawing found' };
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.classList.add('route-ready');
          return;
        }
      }
      // Check DRS files for GPHE — files like ########_P##.dwg have drawing number inside DRS
      for (const f of S.files) {
        if (f.ext.toUpperCase() === 'DRS') {
          const drs = await window.api.parseDrsGphe(f.filepath);
          if (drs.isGphe && drs.drawingNum) {
            S.routeScan = { ok: true, gphe: true, gpheFile: f, gpheDrsDrawingNum: drs.drawingNum, msg: 'GPHE drawing found (DRS)' };
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.classList.add('route-ready');
            return;
          }
        }
      }
    }
    // Check Brazed — exactly one DRS file in the folder starting with FAMILY|BP
    if (S.files) {
      const drsFiles = S.files.filter(f => f.ext && f.ext.toUpperCase() === 'DRS');
      if (drsFiles.length === 1) {
        const bp = await window.api.parseDrsBrazed(drsFiles[0].filepath);
        if (bp.ok) {
          S.routeScan = { ok: true, brazed: true, brazedData: bp, brazedDrsFile: drsFiles[0].name, msg: 'Brazed BPHE found (DRS)' };
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.classList.add('route-ready');
          return;
        }
      }
    }
    if (!wasReady) resetRouteState();
    else if (!scan.ok) resetRouteState();
  } catch {}
}

async function runRoutingFlow() {
  // GPHE from drawing search
  if (S.mode === 'drawings' && S.dwgResult && S.dwgResult.primary) {
    const dwgName = S.dwgResult.primary.name || '';
    if (isGpheDrawing(dwgName)) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:440px;padding:24px"></div>';
      document.body.appendChild(overlay);
      modalDismiss(overlay);

      // Attempt DXF enhancement if ODA is available
      const dwgPath = gpheResolveDwgPath();
      let bomData = null;
      if (dwgPath) {
        const hasOda = await window.api.checkDxfConverter();
        if (hasOda) {
          overlay.querySelector('.modal').style.width = '260px'; overlay.querySelector('.modal').innerHTML = '<div style="text-align:center;padding:14px 0"><div class="route-spinner" style="margin:0 auto 10px"></div><div style="font:500 11px/1.4 \'DM Sans\',sans-serif;color:var(--text2)">Analyzing drawing\u2026</div></div>';
          bomData = await gpheAttemptDxfEnhancement(dwgPath);
        }
      }

      const result = gpheCalculateRouting(dwgName, bomData);
      if (result) {
        showGpheResults(overlay, result, dwgName);
        return;
      }
      overlay.remove();
    }
  }

  // GPHE from order or drawing wildcard search
  if ((S.mode === 'orders' || S.mode === 'drawings') && S.routeScan && S.routeScan.gphe && S.routeScan.gpheFile) {
    const gpheDrawingNum = S.routeScan.gpheDrsDrawingNum || S.routeScan.gpheFile.name;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:440px;padding:24px"></div>';
    document.body.appendChild(overlay);
    modalDismiss(overlay);

    // Attempt DXF enhancement if ODA is available
    const dwgPath = gpheResolveDwgPath();
    let bomData = null;
    if (dwgPath) {
      const hasOda = await window.api.checkDxfConverter();
      if (hasOda) {
        const analyzeMsg = S.mode === 'orders' ? 'Analyzing setting drawing' : 'Analyzing drawing';
        overlay.querySelector('.modal').style.width = '260px'; overlay.querySelector('.modal').innerHTML = '<div style="text-align:center;padding:14px 0"><div class="route-spinner" style="margin:0 auto 10px"></div><div style="font:500 11px/1.4 \'DM Sans\',sans-serif;color:var(--text2)">' + analyzeMsg + '\u2026</div></div>';
        bomData = await gpheAttemptDxfEnhancement(dwgPath);
      }
    }

    const result = gpheCalculateRouting(gpheDrawingNum, bomData);
    if (result) {
      showGpheResults(overlay, result, gpheDrawingNum);
      return;
    }
    overlay.remove();
  }

  // Brazed from order mode — instant, no loading screen needed
  if (S.mode === 'orders' && S.routeScan && S.routeScan.brazed && S.routeScan.brazedData) {
    const result = brazedCalculateRouting(S.routeScan.brazedData);
    if (result) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:440px;padding:24px"></div>';
      document.body.appendChild(overlay);
      modalDismiss(overlay);
      showBrazedResults(overlay, result, S.routeScan.brazedDrsFile);
      return;
    }
  }

  // U-Tube single drawing from Drawings tab (setting or shell only)
  if (S.mode === 'drawings' && S.routeScan && S.routeScan.utube && S.routeScan.utubeFile) {
    const utype = S.routeScan.utubeType;
    const ufile = S.routeScan.utubeFile;
    let dwgPath = ufile.filepath;
    if (ufile.isLink) {
      try { const lnk = await window.api.readLink(dwgPath); if (lnk) dwgPath = lnk; } catch {}
    }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:260px;padding:24px"><div style="text-align:center;padding:14px 0"><div class="route-spinner" style="margin:0 auto 10px"></div><div style="font:500 11px/1.4 \'DM Sans\',sans-serif;color:var(--text2)">Analyzing drawing\u2026</div></div></div>';
    document.body.appendChild(overlay);
    modalDismiss(overlay);

    try {
      const dxfResult = await window.api.convertDwgDxfText(dwgPath);
      if (!dxfResult.ok) {
        overlay.querySelector('.modal').innerHTML = `<div style="text-align:center;padding:14px 0;color:var(--text)">${dxfResult.msg || 'DXF conversion failed'}</div>`;
        return;
      }
      const vars = rtExtractVariables(rtParseDXF(dxfResult.text));
      const ops = rtCalculateRouting(vars);
      const allOps = [{ type: utype, ops, vars }];
      const allVars = { [utype]: vars };
      showRoutingResults(overlay, allOps, allVars, []);
    } catch (err) {
      overlay.querySelector('.modal').innerHTML = `<div style="text-align:center;padding:14px 0;color:var(--text)">Error: ${err.message}</div>`;
    }
    return;
  }

  const overlay = showRoutingOverlay();
  const totalSteps = 3;
  let stepsComplete = 0;
  let cancelled = false;
  function progress() { rtSetProgress(overlay, stepsComplete / totalSteps); }

  // Total timer
  const flowStart = Date.now();
  const timerEl = overlay.querySelector('#route-timer');
  const timerIv = setInterval(() => {
    const elapsed = (Date.now() - flowStart) / 1000;
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    if (timerEl) timerEl.textContent = mins + ':' + String(secs).padStart(2, '0');
  }, 100);

  // Show Stop button during processing
  const actionsEl = overlay.querySelector('#route-actions');
  const stopBtn = overlay.querySelector('#route-stop');
  actionsEl.style.display = 'flex';
  overlay.querySelector('#route-close').style.display = 'none';
  stopBtn.addEventListener('click', () => {
    cancelled = true;
    try { window.api.cancelConvert(); } catch {}
    clearInterval(timerIv);
    rtSetStatus(overlay, 'Stopped by user');
    // Replace any active spinners with red X
    overlay.querySelectorAll('.route-step.active').forEach(el => {
      el.className = 'route-step error';
      const icon = el.querySelector('.step-icon');
      if (icon) icon.innerHTML = RT_X_SVG;
    });
    stopBtn.style.display = 'none';
    overlay.querySelector('#route-close').style.display = '';
  });

  try {
    // Use cached scan
    const scan = (S.routeScan && S.routeScan.ok) ? S.routeScan : await window.api.scanFolderUtube(S.currentFolder);
    if (!scan.ok) {
      clearInterval(timerIv);
      rtSetStep(overlay, 0, 'error', scan.msg);
      rtSetStatus(overlay, scan.msg);
      stopBtn.style.display = 'none';
      overlay.querySelector('#route-close').style.display = '';
      return;
    }

    const dxfTexts = { setting: null, shell: null, bundle: null };
    const warnings = [];

    // Step 0: Convert setting
    let stepStart = Date.now();
    rtSetStep(overlay, 0, 'active', scan.setting.name);
    rtSetStatus(overlay, 'Analyzing setting drawing...');
    const settingResult = await window.api.convertDwgDxfText(scan.setting.filepath);
    if (cancelled) return;
    if (!settingResult.ok) {
      clearInterval(timerIv);
      rtSetStep(overlay, 0, 'error', settingResult.msg, (Date.now() - stepStart) / 1000);
      rtSetStatus(overlay, 'Setting conversion failed');
      stopBtn.style.display = 'none';
      overlay.querySelector('#route-close').style.display = '';
      return;
    }
    dxfTexts.setting = settingResult.text;
    rtSetStep(overlay, 0, 'done', null, (Date.now() - stepStart) / 1000);
    stepsComplete = 1; progress();

    // Step 1: Convert shell
    if (cancelled) return;
    stepStart = Date.now();
    if (scan.shell) {
      rtSetStep(overlay, 1, 'active', scan.shell.name);
      rtSetStatus(overlay, 'Analyzing shell drawing...');
      const shellResult = await window.api.convertDwgDxfText(scan.shell.filepath);
      if (cancelled) return;
      if (shellResult.ok) {
        dxfTexts.shell = shellResult.text;
        rtSetStep(overlay, 1, 'done', null, (Date.now() - stepStart) / 1000);
      } else {
        rtSetStep(overlay, 1, 'error', 'Failed', (Date.now() - stepStart) / 1000);
        warnings.push('Shell conversion failed: ' + shellResult.msg);
      }
    } else {
      rtSetStep(overlay, 1, 'skipped', 'Not found');
      warnings.push('No shell drawing found \u2014 shell operations omitted');
    }
    stepsComplete = 2; progress();

    // Step 2: Convert bundle
    if (cancelled) return;
    stepStart = Date.now();
    if (scan.bundle) {
      rtSetStep(overlay, 2, 'active', scan.bundle.name);
      rtSetStatus(overlay, 'Analyzing bundle drawing...');
      const bundleResult = await window.api.convertDwgDxfText(scan.bundle.filepath);
      if (cancelled) return;
      if (bundleResult.ok) {
        dxfTexts.bundle = bundleResult.text;
        rtSetStep(overlay, 2, 'done', null, (Date.now() - stepStart) / 1000);
      } else {
        rtSetStep(overlay, 2, 'error', 'Failed', (Date.now() - stepStart) / 1000);
        warnings.push('Bundle conversion failed: ' + bundleResult.msg);
      }
    } else {
      rtSetStep(overlay, 2, 'skipped', 'Not found');
      warnings.push('No bundle drawing found \u2014 bundle operations omitted');
    }
    stepsComplete = 3; progress();

    // Parse and calculate (instant, no separate step)
    if (cancelled) return;
    const allVars = {};
    for (const key of ['setting', 'shell', 'bundle']) {
      if (dxfTexts[key]) {
        allVars[key] = rtExtractVariables(rtParseDXF(dxfTexts[key]));
      }
    }

    // Apply setting context to shell/bundle
    const sv = allVars.setting;
    if (sv) {
      for (const key of ['shell', 'bundle']) {
        if (allVars[key]) {
          if (sv.unit_type && !allVars[key].unit_type) allVars[key].unit_type = sv.unit_type;
          if (sv.passes && !allVars[key].passes) allVars[key].passes = sv.passes;
          if (sv.nom_dia && !allVars[key].nom_dia) allVars[key].nom_dia = sv.nom_dia;
          if (sv.nom_length && !allVars[key].nom_length) allVars[key].nom_length = sv.nom_length;
        }
      }
    }

    const allOps = [];
    for (const type of ['shell', 'bundle', 'setting']) {
      if (allVars[type]) {
        allOps.push({ type, ops: rtCalculateRouting(allVars[type]), vars: allVars[type] });
      }
    }

    clearInterval(timerIv);
    const totalElapsed = ((Date.now() - flowStart) / 1000).toFixed(1);
    if (timerEl) timerEl.textContent = totalElapsed + 's total';
    rtSetStatus(overlay, 'Complete');
    await new Promise(r => setTimeout(r, 400));

    const scanNames = {
      setting: scan.setting ? scan.setting.name : null,
      shell: scan.shell ? scan.shell.name : null,
      bundle: scan.bundle ? scan.bundle.name : null,
    };
    showRoutingResults(overlay, allOps, allVars, warnings, scanNames);

  } catch (err) {
    clearInterval(timerIv);
    rtSetStatus(overlay, 'Error: ' + err.message);
    stopBtn.style.display = 'none';
    overlay.querySelector('#route-close').style.display = '';
  }
}

async function init() {
  bootLog('getConfig');
  S.config = await window.api.getConfig();
  bootLog('getPlatform');
  S.platform = await window.api.getPlatform();
  bootLog('config+platform done');

  // Mark What's New bell as seen if user already viewed the latest version
  if (S.config.seen_changelog_ver === CHANGELOG[0].ver) {
    const bellBtn = $('#btn-whats-new');
    if (bellBtn) bellBtn.classList.add('seen');
  }

  // One-time AutoCAD availability check (non-blocking)
  window.api.checkAccore().then(r => { S._hasAccore = !!r; updateOpenBtn(); }).catch(() => { S._hasAccore = false; });

  // Show ODA install button if not installed (always show in dev for testing)
  // Also show BOM extract button when ODA is available
  Promise.all([window.api.checkDxfConverter(), window.api.getVersion()]).then(([r, v]) => {
    // ODA now served from network share — no install prompt needed
    if (r) {
      const bomBtn = $('#btn-bom-extract');
      if (bomBtn) { bomBtn.style.display = ''; S._hasOda = true; }

  }).catch(() => {});

  // PDF paper detection toast
  window.api.onPdfPaperDetected((letter, orient) => {
    setStatus(`Exporting as ANSI ${letter} ${orient.toLowerCase()}\u2026`);
  });

  // Contingency loading listener is registered in the splash IIFE (before preload)

  // Apply saved language
  S.language = S.config.language || 'en';
  applyLanguage();

  // Apply saved theme
  bootLog('applyTheme');
  S.theme = S.config.theme === 'auto' ? 'dark' : (S.config.theme || 'dark');
  await applyTheme(S.theme);
  bootLog('theme applied');
  window.api.onSystemThemeChanged(() => { if (S.theme === 'auto') applyTheme('auto'); });
  window.api.onMaximizedChanged((maximized) => { document.body.classList.toggle('maximized', maximized); });

  // Theme segment
  const themeSeg = initSeg($('#theme-seg'), t => { applyTheme(t); });
  themeSeg.activate(S.theme);

  // ─── Dashboard: 500k order countdown ────────────────────────────────
  const DASH_MILESTONE = 500000;
  const DASH_NOTIFY_THRESHOLD = DASH_MILESTONE - 10; // 499,990 — notify from 499,991+
  const DASH_POLL_FAST = 5000;    // 5s when focused on dashboard
  const DASH_POLL_SLOW = 120000;  // 2min when unfocused or other tab
  let _dashInterval = null;
  let _dashMaxOrder = parseInt(localStorage.getItem('dashMaxOrder'), 10) || null; // cached from last session
  let _dashLastUpdate = parseInt(localStorage.getItem('dashMaxOrderTime'), 10) ? new Date(parseInt(localStorage.getItem('dashMaxOrderTime'), 10)) : null;
  let _dashError = null;
  let _dashFetching = false;
  let _dashFocused = document.hasFocus();
  let _dashLastPct = null; // track bar width to avoid re-animation
  let _dashLastNotified = parseInt(localStorage.getItem('dash500kNotified'), 10) || null;
  let _dashCelebrateStart = parseInt(localStorage.getItem('dash500kStart'), 10) || null;
  let _celebrationTimers = [];
  let _dashFanfarePlayed = !!localStorage.getItem('dash500kFanfare');

  // Track window focus for adaptive polling
  window.addEventListener('focus', () => { _dashFocused = true; if (S.mode === 'dashboard') resetDashPollRate(); });
  window.addEventListener('blur', () => { _dashFocused = false; if (S.mode === 'dashboard') resetDashPollRate(); });

  function resetDashPollRate() {
    if (_dashInterval) clearInterval(_dashInterval);
    const rate = _dashFocused ? DASH_POLL_FAST : DASH_POLL_SLOW;
    _dashInterval = setInterval(fetchDashOrder, rate);
  }

  async function fetchDashOrder() {
    _dashFetching = true;
    if (S.mode === 'dashboard') renderDashboard();
    try {
      const res = await window.api.bpcsMaxOrder();
      if (res.ok && res.maxOrder != null) {
        _dashMaxOrder = res.maxOrder;
        _dashLastUpdate = new Date();
        _dashError = null;
        localStorage.setItem('dashMaxOrder', String(_dashMaxOrder));
        localStorage.setItem('dashMaxOrderTime', String(_dashLastUpdate.getTime()));
      } else {
        _dashError = res.error || 'No data returned';
      }
    } catch (e) {
      _dashError = e.message || 'Network error';
    }
    _dashFetching = false;

    // ── Chat notifications for the final 10 orders ──
    if (_dashMaxOrder && _dashMaxOrder > DASH_NOTIFY_THRESHOLD) {
      if (_dashLastNotified === null) {
        // First fetch ever (or first since install) — seed to current so we don't spam history
        _dashLastNotified = _dashMaxOrder;
        localStorage.setItem('dash500kNotified', String(_dashLastNotified));
      } else if (_dashMaxOrder > _dashLastNotified) {
        // New orders in the final stretch — announce each one
        const start = Math.max(DASH_NOTIFY_THRESHOLD + 1, _dashLastNotified + 1);
        for (let ord = start; ord <= _dashMaxOrder; ord++) {
          const rem = DASH_MILESTONE - ord;
          let msg;
          if (rem <= 0)     msg = '\u{1F389}\u{1F389}\u{1F389} ORDER 500,000 HAS BEEN ENTERED!!! \u{1F389}\u{1F389}\u{1F389}';
          else if (rem === 1) msg = '\u{1F525} Order ' + ord.toLocaleString() + ' just entered \u{2014} ONE MORE until 500,000!!!';
          else if (rem <= 3)  msg = '\u{1F680} Order ' + ord.toLocaleString() + ' \u{2014} only ' + rem + ' to go until 500,000!!';
          else                msg = '\u{1F4E2} Order ' + ord.toLocaleString() + ' \u{2014} ' + rem + ' to go until 500,000!';
          try { await window.api.chatSend(msg); } catch {}
        }
        _dashLastNotified = _dashMaxOrder;
        localStorage.setItem('dash500kNotified', String(_dashLastNotified));
      }
    }

    // ── Detect celebration start ──
    if (_dashMaxOrder >= DASH_MILESTONE && !_dashCelebrateStart) {
      _dashCelebrateStart = Date.now();
      localStorage.setItem('dash500kStart', String(_dashCelebrateStart));
    }

    if (S.mode === 'dashboard') renderDashboard();
  }

  function dashboardPoll(active) {
    if (_dashInterval) { clearInterval(_dashInterval); _dashInterval = null; }
    if (!active) { stopCelebrationEffects(); return; }
    fetchDashOrder();
    resetDashPollRate();
  }

  // ── Celebration time window ──
  function isCelebrationActive() {
    if (!_dashMaxOrder || _dashMaxOrder < DASH_MILESTONE) return false;
    if (!_dashCelebrateStart) return false;
    // Get current ET time components
    const nowETstr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
    const startETdate = new Date(_dashCelebrateStart).toLocaleDateString('en-US', { timeZone: 'America/New_York' });
    const [nowDate, nowTime] = nowETstr.split(', ');
    const nowHour = parseInt(nowTime.split(':')[0], 10);
    // Same calendar day (ET) as detection → always celebrate
    if (nowDate === startETdate) return true;
    // Next day(s) → celebrate until 7 AM ET
    return nowHour < 7;
  }

  // ── Celebration effects: confetti, fireworks, sparkles ──
  function startCelebrationEffects() {
    if (_celebrationTimers.length) return; // already running
    const el = $('#dashboard-container');
    if (!el) return;
    // Dense confetti rain
    _celebrationTimers.push(setInterval(() => { if (S.mode === 'dashboard') spawnConfetti(el); }, 60));
    // Firework bursts
    _celebrationTimers.push(setInterval(() => { if (S.mode === 'dashboard') spawnFirework(el); }, 1800));
    // Sparkles
    _celebrationTimers.push(setInterval(() => { if (S.mode === 'dashboard') spawnSparkle(el); }, 50));
    // Initial burst of fireworks
    setTimeout(() => spawnFirework(el), 100);
    setTimeout(() => spawnFirework(el), 500);
    setTimeout(() => spawnFirework(el), 1000);
    // Fanfare + Konami face rain (once ever)
    if (!_dashFanfarePlayed) {
      playFanfare();
      _dashFanfarePlayed = true;
      localStorage.setItem('dash500kFanfare', '1');
      setTimeout(() => triggerKonamiCelebration(), 2000);
    }
  }

  async function triggerKonamiCelebration() {
    // Load faces + cursor silently (no spinner)
    if (!_konamiFaces) _konamiFaces = await window.api.getKonamiFaces();
    if (_konamiCursor === null) _konamiCursor = (await window.api.getKonamiCursor()) || false;
    const faces = _konamiFaces && _konamiFaces.length ? _konamiFaces : null;
    // Preload all face images
    const preloaded = [];
    if (faces) {
      await Promise.all(faces.map(src => new Promise(resolve => {
        const img = new Image();
        img.onload = img.onerror = resolve;
        img.src = src;
        preloaded.push(img);
      })));
    }
    // Swap cursor
    if (_konamiCursor && !$('#konami-cursor')) {
      await new Promise(resolve => { const img = new Image(); img.onload = img.onerror = resolve; img.src = _konamiCursor; });
      document.body.style.cursor = 'url(' + _konamiCursor + '), auto';
      const sheet = document.createElement('style');
      sheet.id = 'konami-cursor';
      sheet.textContent = '*{cursor:url(' + _konamiCursor + '),auto !important}body{-webkit-app-region:no-drag !important}.titlebar{-webkit-app-region:drag !important}';
      document.head.appendChild(sheet);
    }
    // Rain faces
    const endY = window.innerHeight + 80;
    const interval = setInterval(() => {
      const el = document.createElement('div');
      const size = 50 + Math.random() * 60;
      const rotation = -30 + Math.random() * 60;
      const fallTime = 2.5 + Math.random() * 2;
      if (preloaded.length) {
        const img = preloaded[Math.floor(Math.random() * preloaded.length)].cloneNode();
        img.style.cssText = 'width:' + size + 'px;height:auto;transform:rotate(' + rotation + 'deg)';
        el.appendChild(img);
      } else {
        el.textContent = '\uD83C\uDF89';
        el.style.fontSize = size + 'px';
      }
      const startY = -(size + 20);
      el.style.cssText += 'position:fixed;top:' + startY + 'px;left:' + (Math.random() * 90) + '%;z-index:9999;pointer-events:none';
      document.body.appendChild(el);
      const t0 = performance.now();
      function tick(now) {
        const p = Math.min((now - t0) / (fallTime * 1000), 1);
        el.style.top = (startY + (endY - startY) * p) + 'px';
        if (p >= 0.8) el.style.opacity = String(Math.max(0, 1 - (p - 0.8) / 0.2));
        if (p < 1) requestAnimationFrame(tick);
        else el.remove();
      }
      requestAnimationFrame(tick);
    }, 120);
    setTimeout(() => clearInterval(interval), 6000);
  }

  function stopCelebrationEffects() {
    _celebrationTimers.forEach(t => clearInterval(t));
    _celebrationTimers = [];
    const el = $('#dashboard-container');
    if (el) el.classList.remove('dash-celebrate');
  }

  const _confettiColors = ['#ffd700','#ff1493','#00bfff','#00ff00','#ff4500','#8a2be2','#ff6347','#00ffcc','#fff','#ff69b4'];
  function spawnConfetti(container) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = _confettiColors[Math.floor(Math.random() * _confettiColors.length)];
    const size = 5 + Math.random() * 9;
    const dur = 2.5 + Math.random() * 3;
    const spin = 360 + Math.random() * 720;
    Object.assign(piece.style, {
      left: Math.random() * 100 + '%',
      width: size + 'px',
      height: size * (0.5 + Math.random() * 1) + 'px',

    container.appendChild(piece);
    setTimeout(() => piece.remove(), dur * 1000);

  function spawnFirework(container) {
    const colors = ['#ffd700','#ff1493','#00bfff','#ff4500','#00ff00','#8a2be2','#ff69b4','#00ffcc'];
    const cx = 15 + Math.random() * 70;
    const cy = 10 + Math.random() * 55;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const count = 24 + Math.floor(Math.random() * 16);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
      const dist = 50 + Math.random() * 100;
      const p = document.createElement('div');
      p.className = 'firework-particle';
      const sz = 2.5 + Math.random() * 3.5;
      Object.assign(p.style, {
        left: cx + '%', top: cy + '%',
        width: sz + 'px', height: sz + 'px',
        backgroundColor: color,
        boxShadow: '0 0 ' + (sz * 3) + 'px ' + color,
        '--fw-x': (Math.cos(angle) * dist) + 'px',
        '--fw-y': (Math.sin(angle) * dist) + 'px',
        animationDuration: (0.6 + Math.random() * 0.9) + 's',
      });
      container.appendChild(p);
      setTimeout(() => p.remove(), 1600);
    }
  }

  function spawnSparkle(container) {
    const colors = ['#ffd700','#ff1493','#00bfff','#fff','#ff4500','#00ff00'];
    const s = document.createElement('div');
    s.className = 'celebrate-sparkle';
    const color = colors[Math.floor(Math.random() * colors.length)];

      backgroundColor: color,
      boxShadow: '0 0 6px ' + color,
    });
    container.appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }

  function playFanfare() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // Ascending C major arpeggio into a triumphant chord
      const melody = [
        { f: 523.25, t: 0,    d: 0.3 },  // C5
        { f: 659.25, t: 0.15, d: 0.3 },  // E5
        { f: 783.99, t: 0.30, d: 0.3 },  // G5
        { f: 1046.5, t: 0.45, d: 0.8 },  // C6 (held)
        // Triumphant chord
        { f: 523.25, t: 0.55, d: 0.9 },  // C5
        { f: 659.25, t: 0.55, d: 0.9 },  // E5
        { f: 783.99, t: 0.55, d: 0.9 },  // G5
      ];
      melody.forEach(({ f, t: time, d: dur }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.12, ctx.currentTime + time);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + time);
        osc.stop(ctx.currentTime + time + dur + 0.05);
      });
      // Close context after fanfare completes
      setTimeout(() => ctx.close(), 3000);
    } catch {}
  }

  // ── Render ──
  function renderDashboard() {
    const el = $('#dashboard-container');
    if (!el) return;

    const celebrating = isCelebrationActive();
    el.classList.toggle('dash-celebrate', celebrating);

    // No data at all (not even cached)
    if (_dashMaxOrder == null && !_dashError) {
      el.innerHTML = '<div class="dash-label dash-loading">Loading from BPCS&hellip;</div>';
      return;
    }
    // Error with no data (not even cached)
    if (_dashError && _dashMaxOrder == null) {
      el.innerHTML = '<div class="dash-label">HIGHEST ORDER IN BPCS</div><div class="dash-error">' + _dashError + '</div>' +
        '<button class="dash-retry">Retry</button>';
      el.querySelector('.dash-retry').addEventListener('click', () => { el.innerHTML = '<div class="dash-label dash-loading">Retrying&hellip;</div>'; fetchDashOrder(); });
      return;
    }

    if (celebrating) {
      // Tear down normal DOM if switching to celebration
      if (el.querySelector('.dash-num')) el.innerHTML = '';
      renderCelebration(el);
      startCelebrationEffects();
      return;
    }
    stopCelebrationEffects();
    // Tear down celebration DOM if switching back to normal
    if (el.querySelector('.dash-celebrate-label')) el.innerHTML = '';

    const remaining = DASH_MILESTONE - _dashMaxOrder;
    const rangeStart = 499000;
    const pct = Math.min(100, Math.max(0, ((_dashMaxOrder - rangeStart) / (DASH_MILESTONE - rangeStart)) * 100));
    const formatted = _dashMaxOrder.toLocaleString();
    const ago = _dashLastUpdate ? timeAgo(_dashLastUpdate.getTime()) : '';
    const isFinal10 = remaining > 0 && remaining <= 10;

    el.classList.toggle('dash-final10', isFinal10);

    // Build DOM structure ONCE — subsequent renders only update text
    if (!el.querySelector('.dash-num')) {
      el.innerHTML =
        '<div class="dash-label">Highest Order in BPCS</div>' +
        '<div class="dash-number dash-num"></div>' +
        '<div class="dash-remaining dash-rem"></div>' +
        '<div class="dash-bar-wrap">' +
          '<div class="dash-bar-label"><span>' + rangeStart.toLocaleString() + '</span><span>' + DASH_MILESTONE.toLocaleString() + '</span></div>' +
          '<div class="dash-bar"><div class="dash-bar-fill dash-fill"></div></div>' +
        '</div>' +
        '<div class="dash-updated dash-ago"></div>' +
        '<div class="dash-error dash-err" style="font-size:10px;margin-top:2px;display:none"></div>';
      // Initial bar animation from 0 → target
      requestAnimationFrame(() => {
        const fill = el.querySelector('.dash-fill');
        if (fill) fill.style.width = pct.toFixed(1) + '%';
      });
      _dashLastPct = pct;
    }

    // ── Update text content (no DOM rebuild) ──
    el.querySelector('.dash-num').textContent = formatted;

    const remEl = el.querySelector('.dash-rem');
    if (remaining <= 0) {
      remEl.textContent = 'WE HIT ' + DASH_MILESTONE.toLocaleString() + '!';
      remEl.style.cssText = 'color:var(--accent);font-size:22px;font-weight:800';
    } else if (remaining <= 3) {
      remEl.textContent = 'Only ' + remaining + ' to go!!!';
      remEl.style.cssText = 'color:var(--accent);font-weight:800;font-size:22px';
    } else if (remaining <= 10) {
      remEl.textContent = 'Only ' + remaining + ' to go!';
      remEl.style.cssText = 'color:var(--accent);font-weight:800';
    } else {
      remEl.textContent = remaining.toLocaleString() + ' to go until ' + DASH_MILESTONE.toLocaleString();
      remEl.style.cssText = '';
    }

    // Bar — only transition width when the value actually changes
    if (_dashLastPct !== pct) {
      el.querySelector('.dash-fill').style.width = pct.toFixed(1) + '%';
      _dashLastPct = pct;
    }

    // Updated / refreshing indicator
    const agoEl = el.querySelector('.dash-ago');
    const agoLabel = ago ? 'Updated ' + ago + (_dashFocused ? ' \u2022 live' : '') : '';
    if (_dashFetching) {
      agoEl.innerHTML = '<span class="dash-spinner"></span>' + (agoLabel || 'Updating\u2026');
    } else {
      agoEl.textContent = agoLabel;
    }

    // Error line (stale data + error)
    const errEl = el.querySelector('.dash-err');
    if (_dashError) { errEl.textContent = _dashError; errEl.style.display = ''; }
    else { errEl.style.display = 'none'; }
  }

  function renderCelebration(el) {
    const ago = _dashLastUpdate ? timeAgo(_dashLastUpdate.getTime()) : '';

    if (!el.querySelector('.dash-celebrate-label')) {

  // Mode segment — save/restore state per mode
  const _modeState = { orders: null, drawings: null, marketing: null };
  function saveModeState() {

      const otpOrder = S.otpDigits.slice(0, 6).join('');
      const loadedOrder = S.currentOrder || '';
      if (otpOrder !== loadedOrder && loadedOrder && S.files.length > 0) {
        // Revert OTP digits to match the actually loaded order
        const revert = (loadedOrder + (S.currentLine || '00')).split('');
        S.otpDigits = revert;
        S.otpComplete = revert.length === 8;
        updateOtpDisplay();
        cancelShimmer();
