          <div style="font-size:9px;color:var(--text3);margin-bottom:1px">${f.label}</div>
          <input class="field-input" id="set-${f.key}" value="${escHtml(cfg[f.key] || '')}"
            style="width:100%;height:28px;font-size:11px;padding:0 8px;font-family:'IBM Plex Mono',monospace">
        </div>
      `).join('')}
      <button class="btn-glass" id="set-db-reset" style="margin-top:4px;font-size:10px;height:26px;padding:0 12px">${t('Restore defaults')}</button>
      </div>

      <div class="field-label" style="margin:8px 0 4px;cursor:pointer" id="set-diag-toggle">${t('DIAGNOSTICS')} ▾</div>
      <div id="set-diag-section" style="display:none">
        <p style="font-size:10px;color:var(--text3);margin:0 0 6px">${S.language === 'tlh' ? "nobjech De' DalIngmeH, naDev yIchap." : 'Copy a diagnostics report to your clipboard. Includes system info, path status, and recent activity log. Useful for troubleshooting.'}</p>
        <button class="btn-glass" id="set-diag-copy" style="font-size:10px;height:26px;padding:0 12px;display:flex;align-items:center;gap:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          ${t('Copy diagnostics to clipboard')}
        </button>
      </div>

      <div style="display:flex;align-items:center;margin-top:12px">
        <a href="#" id="tip-jar" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.6"><span class="tip-jar-icon">☕</span> ${t('Tip Jar')}</a>
        <div style="flex:1"></div>
        <button class="btn-glass" id="set-cancel" style="margin-right:6px">${t('Cancel')}</button>
        <button class="btn-accent" id="set-save" style="height:34px;font-size:13px">${t('Save')}</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  modalDismiss(overlay);
  $('#set-cancel').addEventListener('click', () => overlay.remove());

  // Init inline radio buttons
  $$('.set-radio').forEach(radio => {
    radio.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        radio.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });

  // DB paths toggle
  $('#set-db-toggle').addEventListener('click', () => {
    const el = $('#set-db-paths');
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? '' : 'none';
    $('#set-db-toggle').textContent = isHidden ? t('DATABASE PATHS') + ' ▴' : t('DATABASE PATHS') + ' ▾';
  });

  // Diagnostics toggle + copy
  $('#set-diag-toggle').addEventListener('click', () => {
    const el = $('#set-diag-section');
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? '' : 'none';
    $('#set-diag-toggle').textContent = isHidden ? t('DIAGNOSTICS') + ' ▴' : t('DIAGNOSTICS') + ' ▾';
  });
  $('#set-diag-copy').addEventListener('click', async () => {
    const btn = $('#set-diag-copy');
    const origText = btn.innerHTML;
    btn.textContent = t('Collecting...');
    btn.disabled = true;
    try {
      const report = await window.api.collectDiagnostics();
      await window.api.copyText(report);
      btn.textContent = t('Copied!');
      setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 2000);
    } catch (e) {
      btn.textContent = t('Failed');
      setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 2000);
    }
  });

  // Restore default database paths
  $('#set-db-reset').addEventListener('click', async () => {
    const defs = await window.api.getPathDefaults();
    for (const f of dbFields) $(`#set-${f.key}`).value = defs[f.key] || '';
  });

  $('#set-save').addEventListener('click', async () => {
    const newCfg = {};
    for (const f of fields) {
      newCfg[f.key] = $(`#set-${f.key}`).value.trim();
    }
    newCfg.minimize_to_tray = $('#set-tray').checked;
    newCfg.launch_on_startup = $('#set-startup').checked;
    newCfg.mute_chat = $('#set-mute-chat').checked;
    const activeBtn = $('#dwg-action-radio button.active');
    newCfg.default_dwg_action = activeBtn ? activeBtn.dataset.val : 'viewer';
    const fmtBtn = $('#pref-format-radio button.active');
    newCfg.preferred_format = fmtBtn ? fmtBtn.dataset.val : 'dwg';
    const expBtn = $('#export-loc-radio button.active');
    newCfg.convert_save_location = expBtn ? expBtn.dataset.val : 'downloads';
    const langBtn = $('#lang-radio button.active');
    newCfg.language = langBtn ? langBtn.dataset.val : 'en';
    await window.api.saveConfig(newCfg);
    S.config = await window.api.getConfig();
    S.language = newCfg.language;
    overlay.remove();
    applyLanguage();
    renderSearchCard();
    playChime();
  });

  $('#tip-jar').addEventListener('click', (e) => {
    e.preventDefault();
    window.api.openExternal('https://venmo.com/willboiss');
  });
}

// ── Verbose startup diagnostics ──────────────────────────────────────────
// Buffers timestamped boot events; flushes to logDiag once IPC is ready.
const _bootLog = [];
const _bootT0 = performance.now();
function bootLog(msg) {
  const dt = (performance.now() - _bootT0).toFixed(0);
  const entry = `+${dt}ms ${msg}`;
  _bootLog.push(entry);
  console.log(`[BOOT] ${entry}`);
}
function flushBootLog() {
  if (!window.api?.logDiag) return;
  try { window.api.logDiag('BOOT', _bootLog.join(' → ')); } catch {}
}
bootLog('script parsed');

// Splash: solid bg → logo fades+zooms in with chime → hold → fade out into app
// Chime plays FIRST, then init() starts — so IPC calls can't block the audio
(function() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  const content = splash.querySelector('.splash-content');

  // Pre-warm the AudioContext immediately (before any async work)
  try { getSfxCtx(); } catch(e) {}

  function dismissSplash() {
    if (splash._dismissed) return;
    splash._dismissed = true;
    bootLog('splash dismiss');
    try { window.api.setGlassMode(true); } catch(e) {}
    splash.classList.add('fading');
    setTimeout(() => { if (splash.parentNode) splash.remove(); }, 1000);
  }

  function startSplash() {
    bootLog('startSplash');
    // 1.6s solid bg, then logo fades+zooms in and chime plays
    setTimeout(() => {
      bootLog('show content');
      // Register contingency loading listener BEFORE preload so the spinner shows immediately
      try {
        window.api.onContingencyLoading((loading) => {
          const btn = document.querySelector('#cnt-btn');
          if (!btn) return;
          window._cntLoading = loading;
          if (loading) {
            btn._origText = btn._origText || btn.textContent;
            btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
          } else if (btn._origText) {
            btn.textContent = btn._origText;
            btn._origText = null;
          }
        });
        // Contingency DB load deferred — loads on first need or after 60s idle
        bootLog('cnt preload deferred');
      } catch(e) {}
      if (content) {
        content.classList.add('show');
        // When the zoom transition finishes naturally, lock transform so text renders crisp
        content.addEventListener('transitionend', function handler(e) {
          if (e.propertyName === 'transform') {
            content.removeEventListener('transitionend', handler);
            content.style.transition = 'none';
            content.style.transform = 'none';
            bootLog('zoom complete');
          }
        });
      }
      try { playStartupChime(); S._hasPlayed = true; bootLog('chime'); } catch (e) { bootLog('chime failed: ' + e.message); }
      // Boot the app AFTER the chime has started playing
      setTimeout(() => { bootLog('init start'); init().then(() => bootLog('init done')).catch(e => bootLog('init error: ' + e.message)); }, 10);
    }, 1600);
    // Hold, then fade out — last shimmer notes play over the crossfade into the app
    setTimeout(dismissSplash, 5200);
  }

  // Failsafe: force-dismiss splash after 12.5s no matter what
  setTimeout(() => { if (!splash._dismissed) bootLog('failsafe triggered'); dismissSplash(); }, 12500);

  // Use setTimeout instead of requestAnimationFrame — rAF may not fire while window is hidden
  if (document.readyState === 'loading') {
    bootLog('waiting for DOMContentLoaded');
    document.addEventListener('DOMContentLoaded', () => { bootLog('DOMContentLoaded'); setTimeout(startSplash, 0); });
  } else {
    bootLog('DOM already ready');
    setTimeout(startSplash, 0);
  }
})();
</script>
