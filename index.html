function brazedCalculateRouting(data) {
  const { modType, modNo, plates, studs, asme, swagedConns } = data;
  const isLargePort = modNo > 430;
  const ops = [];

  // Pull plates — 430 + Large port only
  if (modNo >= 430) {
    const t = bpLookupFlat(BP_PULL, modNo);
    if (t !== null) ops.push({ wc: 304, op: 'Pull plates', run: t });
  }

  // Press plates — < 430 only, BPDW = 2x time
  if (modNo < 430) {
    const perPlate = bpLookupFlat(BP_PRESS, modNo);
    if (perPlate !== null) {
      let run = perPlate * plates;
      if (modType === 'BPDW') run *= 2;
      ops.push({ wc: 301, op: 'Press plates', run });
    }
  }

  // Spray plates — BPDW only
  if (modType === 'BPDW') {
    const perPair = bpLookupFlat(BP_SPRAY, modNo);
    if (perPair !== null) ops.push({ wc: 302, op: 'Spray plates', run: perPair * plates });
  }

  // Compress plate pack — BPDW and BPN only
  if (modType === 'BPDW' || modType === 'BPN') {
    const t = bpLookupCompressRange(BP_COMPRESS, modType, modNo, plates);
    if (t !== null) ops.push({ wc: 302, op: 'Compress plate pack', run: t });
  }

  // Build plate pack — all models
  { const t = bpLookupRange(BP_BUILD, modNo, plates); if (t !== null) ops.push({ wc: 302, op: 'Build plate pack', run: t }); }

  // Swage — if swaged connections exist
  if (swagedConns > 0) {
    const perConn = bpLookupFlat(BP_SWAGE, modNo);
    if (perConn !== null) ops.push({ wc: 307, op: 'Swage', run: perConn * swagedConns });
  }

  // Cut copper top+bottom plates — Large port only
  if (isLargePort) {
    const t = bpLookupFlat(BP_CUT_COPPER, modNo);
    if (t !== null) ops.push({ wc: 301, op: 'Cut top+bottom plates', run: t });
  }

  // Braze — all models
  { const t = bpLookupRange(BP_BRAZE, modNo, plates); if (t !== null) ops.push({ wc: 303, op: 'Braze', run: t }); }

  // Prep for test — all models
  { const t = bpLookupRange(BP_PREP_TEST, modNo, plates); if (t !== null) ops.push({ wc: 304, op: 'Prep for test', run: t }); }

  // Pressure test — all models
  { const t = bpLookupRange(BP_TEST, modNo, plates); if (t !== null) ops.push({ wc: 304, op: 'Pressure test', run: t }); }

  // Weld code plate — ASME only
  if (asme) { const t = bpLookupRange(BP_CODE, modNo, plates); if (t !== null) ops.push({ wc: 305, op: 'Weld code plate', run: t }); }

  // Weld studs — studs only
  if (studs) { const t = bpLookupFlat(BP_STUDS, modNo); if (t !== null) ops.push({ wc: 308, op: 'Weld studs', run: t }); }

  // Retest — ASME only (same test time again after code plate welded)
  if (asme) { const t = bpLookupRange(BP_TEST, modNo, plates); if (t !== null) ops.push({ wc: 304, op: 'Retest', run: t }); }

  // Dry unit — Large port only
  if (isLargePort) { const t = bpLookupFlat(BP_DRY, modNo); if (t !== null) ops.push({ wc: 304, op: 'Dry unit', run: t }); }

  // Prep to ship — all models
  { const t = bpLookupRange(BP_SHIP, modNo, plates); if (t !== null) ops.push({ wc: 305, op: 'Prep to ship', run: t }); }

  const modTypeLabel = modType === 'BPDW' ? 'Brazed Double-Wall' : modType === 'BPN' ? 'Brazed Nickel' : 'Brazed Copper';
  return { ops, modType, modTypeLabel, modNo, plates, studs, asme, swagedConns, model: data.model };
}

function showBrazedResults(overlay, result, filename) {
  const modal = overlay.querySelector('.modal');
  const fmt = n => (n === undefined || n === null || n === 0) ? '' : n.toFixed(2);
  const fmtTotal = n => n.toFixed(2);

  let totalRun = 0;
  let rows = '';
  rows += `<tr class="group-header setting"><td colspan="3">BPHE ROUTING \u2014 ${escHtml(result.modTypeLabel)}</td></tr>`;
  for (const op of result.ops) {
    totalRun += op.run || 0;
    rows += `<tr><td style="width:40px;color:var(--text3)">${op.wc}</td><td>${escHtml(op.op)}</td><td class="num">${fmt(op.run)}</td></tr>`;
  }
  rows += `<tr class="total-row"><td></td><td>TOTAL</td><td class="num">${fmtTotal(totalRun)}</td></tr>`;

  const pills = [
    result.modType,
    `Model ${result.modNo}`,
    `${result.plates} plates`,
    result.studs ? 'Welded studs' : 'No studs',
    result.asme ? 'ASME Code' : 'Non-Code',
    `${result.swagedConns} swaged`,
  ];

  const inputsHtml = `<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:6px">
    <span style="font:700 9px/1 'DM Sans',sans-serif;letter-spacing:.5px;color:#f97316;min-width:52px">BPHE</span>
    ${pills.map(p => `<span style="font:500 10px/1 'DM Sans',sans-serif;color:var(--text2);background:var(--glass);border:1px solid var(--glass-border);border-radius:6px;padding:3px 7px">${escHtml(p)}</span>`).join('')}
  </div>`;

  modal.style.width = '400px';
  modal.style.maxHeight = '85vh';
  modal.style.overflowY = 'auto';
  modal.innerHTML = `
    <div style="font:700 15px/1.3 'DM Sans',sans-serif;margin-bottom:4px">BPHE \u2014 ${escHtml(result.modTypeLabel)}</div>
    <div style="font:500 10px/1 'IBM Plex Mono',monospace;color:var(--text3);margin-bottom:12px">${escHtml(filename)}</div>
    <div style="margin-bottom:14px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--glass-border);border-radius:10px">${inputsHtml}</div>
    <table class="route-table">
      <thead><tr><th style="width:40px">WC</th><th>OPERATION</th><th class="num" style="width:60px">RUN</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="route-action-bar">
      <button class="btn-route-action no-drag" id="route-copy-excel">Copy to Excel</button>
      <button class="btn-route-action btn-route-primary no-drag" id="route-close">Close</button>
    </div>`;
  modal.querySelector('#route-close').addEventListener('click', () => overlay.remove());
  modal.querySelector('#route-copy-excel').addEventListener('click', function() {
    const tsvRows = [['WC', 'Operation', 'Run'].join('\t')];
    tsvRows.push(['', 'BPHE ROUTING \u2014 ' + result.modTypeLabel, ''].join('\t'));
    for (const op of result.ops) tsvRows.push([op.wc, op.op, fmt(op.run)].join('\t'));
    tsvRows.push(['', 'TOTAL', fmtTotal(totalRun)].join('\t'));
    window.api.copyText(tsvRows.join('\n'));
    this.textContent = 'Copied!';
    setTimeout(() => { this.textContent = 'Copy to Excel'; }, 2000);
  });
}

function resetRouteState() {
  S.routeScan = null;
  const btn = $('#btn-route');
  if (btn) { btn.classList.remove('route-ready', 'route-locked'); btn.innerHTML = 'Route'; btn.removeAttribute('data-tip'); btn.disabled = true; btn.style.opacity = '.4'; }
}

async function checkRouteability() {
  const btn = $('#btn-route');
  if (!btn) return;

  if (S.mode === 'drawings') {
    // GPHE check for single-drawing card mode
    if (S.dwgResult && S.dwgResult.primary) {
      if (isGpheDrawing(S.dwgResult.primary.name || '')) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    // GPHE check for wildcard mode — use selected file
    if (S.dwgResult && S.dwgResult.wildcard && S.selected >= 0) {
      const sel = S.files[S.selected];
      if (sel && sel.type !== 'section-header' && isGpheDrawing(sel.name || '')) {
        S.routeScan = { ok: true, gphe: true, gpheFile: sel, msg: 'GPHE drawing found' };
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    resetRouteState();
    return;
  }

  // Orders mode — check for U-Tube OR GPHE
  if (!S.currentFolder || S.mode !== 'orders') { resetRouteState(); return; }
  const wasReady = btn.classList.contains('route-ready');
  if (!wasReady) resetRouteState();
  try {
    // Check U-Tube
    const scan = await window.api.scanFolderUtube(S.currentFolder);
    if (S.currentFolder && S.mode === 'orders') {
      S.routeScan = scan;
      if (scan.ok) {
        // U-Tube routing needs a DXF converter (ODA or accoreconsole)
        const dxfConv = await window.api.checkDxfConverter();
        if (!dxfConv) {
          btn.classList.remove('route-ready');
          btn.classList.add('route-locked');
          btn.disabled = true;
          btn.style.opacity = '';
          btn.innerHTML = '<span class="lock-icon">&#128274;</span>Route';
          btn.setAttribute('data-tip', 'Install ODA File Converter (free) or AutoCAD');
          return;
        }
        btn.classList.remove('route-locked');
        btn.innerHTML = 'Route';
        btn.removeAttribute('data-tip');
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.classList.add('route-ready');
        return;
      }
    }
    // Check GPHE — look for any 54xxx or 55xxx drawing in the file list
    if (S.files) {
      for (const f of S.files) {
        if (isGpheDrawing(f.name)) {
          S.routeScan = { ok: true, gphe: true, gpheFile: f, msg: 'GPHE drawing found' };
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.classList.add('route-ready');
          return;
        }
      }
      // Check DRS files for GPHE — files like ########_P##.dwg have drawing number inside DRS
      for (const f of S.files) {
        if (f.ext.toUpperCase() === 'DRS') {
          const drs = await window.api.parseDrsGphe(f.filepath);
          if (drs.isGphe && drs.drawingNum) {
            S.routeScan = { ok: true, gphe: true, gpheFile: f, gpheDrsDrawingNum: drs.drawingNum, msg: 'GPHE drawing found (DRS)' };
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.classList.add('route-ready');
            return;
          }
        }
      }
    }
    // Check Brazed — exactly one DRS file in the folder starting with FAMILY|BP
    if (S.files) {
      const drsFiles = S.files.filter(f => f.ext && f.ext.toUpperCase() === 'DRS');
      if (drsFiles.length === 1) {
        const bp = await window.api.parseDrsBrazed(drsFiles[0].filepath);
        if (bp.ok) {
          S.routeScan = { ok: true, brazed: true, brazedData: bp, brazedDrsFile: drsFiles[0].name, msg: 'Brazed BPHE found (DRS)' };
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.classList.add('route-ready');
          return;
        }
      }
    }
    if (!wasReady) resetRouteState();
    else if (!scan.ok) resetRouteState();
  } catch {}
}

async function runRoutingFlow() {
  // GPHE from drawing search — instant, no loading screen needed
  if (S.mode === 'drawings' && S.dwgResult && S.dwgResult.primary) {
    const dwgName = S.dwgResult.primary.name || '';
    if (isGpheDrawing(dwgName)) {
      const result = gpheCalculateRouting(dwgName);
      if (result) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:440px;padding:24px"></div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('mousedown', e => { if (!e.target.closest('.modal') && e.clientY >= 38) overlay.remove(); });
        showGpheResults(overlay, result, dwgName);
        return;
      }
    }
  }

  // GPHE from order or drawing wildcard search — instant, no loading screen needed
  if ((S.mode === 'orders' || S.mode === 'drawings') && S.routeScan && S.routeScan.gphe && S.routeScan.gpheFile) {
    // Use DRS-extracted drawing number if available, otherwise use filename
    const gpheDrawingNum = S.routeScan.gpheDrsDrawingNum || S.routeScan.gpheFile.name;
    const result = gpheCalculateRouting(gpheDrawingNum);
    if (result) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:440px;padding:24px"></div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('mousedown', e => { if (!e.target.closest('.modal') && e.clientY >= 38) overlay.remove(); });
      showGpheResults(overlay, result, gpheDrawingNum);
      return;
    }
  }

  // Brazed from order mode — instant, no loading screen needed
  if (S.mode === 'orders' && S.routeScan && S.routeScan.brazed && S.routeScan.brazedData) {
    const result = brazedCalculateRouting(S.routeScan.brazedData);
    if (result) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal glass-strong" style="color:var(--text);width:440px;padding:24px"></div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('mousedown', e => { if (!e.target.closest('.modal') && e.clientY >= 38) overlay.remove(); });
      showBrazedResults(overlay, result, S.routeScan.brazedDrsFile);
      return;
    }
  }

  const overlay = showRoutingOverlay();
  const totalSteps = 3;
  let stepsComplete = 0;
  let cancelled = false;
  function progress() { rtSetProgress(overlay, stepsComplete / totalSteps); }

  // Total timer
  const flowStart = Date.now();
  const timerEl = overlay.querySelector('#route-timer');
  const timerIv = setInterval(() => {
    const elapsed = (Date.now() - flowStart) / 1000;
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    if (timerEl) timerEl.textContent = mins + ':' + String(secs).padStart(2, '0');
  }, 100);

  // Show Stop button during processing
  const actionsEl = overlay.querySelector('#route-actions');
  const stopBtn = overlay.querySelector('#route-stop');
  actionsEl.style.display = 'flex';
  overlay.querySelector('#route-close').style.display = 'none';
  stopBtn.addEventListener('click', () => {
    cancelled = true;
    try { window.api.cancelConvert(); } catch {}
    clearInterval(timerIv);
    rtSetStatus(overlay, 'Stopped by user');
    stopBtn.style.display = 'none';
    overlay.querySelector('#route-close').style.display = '';
  });

  try {
    // Use cached scan
    const scan = (S.routeScan && S.routeScan.ok) ? S.routeScan : await window.api.scanFolderUtube(S.currentFolder);
    if (!scan.ok) {
      clearInterval(timerIv);
      rtSetStep(overlay, 0, 'error', scan.msg);
      rtSetStatus(overlay, scan.msg);
      stopBtn.style.display = 'none';
      overlay.querySelector('#route-close').style.display = '';
      return;
    }

    const dxfTexts = { setting: null, shell: null, bundle: null };
    const warnings = [];

    // Step 0: Convert setting
    let stepStart = Date.now();
    rtSetStep(overlay, 0, 'active', scan.setting.name);
    rtSetStatus(overlay, 'Analyzing setting drawing...');
    const settingResult = await window.api.convertDwgDxfText(scan.setting.filepath);
    if (cancelled) return;
    if (!settingResult.ok) {
      clearInterval(timerIv);
      rtSetStep(overlay, 0, 'error', settingResult.msg, (Date.now() - stepStart) / 1000);
      rtSetStatus(overlay, 'Setting conversion failed');
      stopBtn.style.display = 'none';
      overlay.querySelector('#route-close').style.display = '';
      return;
    }
    dxfTexts.setting = settingResult.text;
    rtSetStep(overlay, 0, 'done', null, (Date.now() - stepStart) / 1000);
    stepsComplete = 1; progress();

    // Step 1: Convert shell
    if (cancelled) return;
    stepStart = Date.now();
    if (scan.shell) {
      rtSetStep(overlay, 1, 'active', scan.shell.name);
      rtSetStatus(overlay, 'Analyzing shell drawing...');
      const shellResult = await window.api.convertDwgDxfText(scan.shell.filepath);
      if (cancelled) return;
      if (shellResult.ok) {
        dxfTexts.shell = shellResult.text;
        rtSetStep(overlay, 1, 'done', null, (Date.now() - stepStart) / 1000);
      } else {
        rtSetStep(overlay, 1, 'error', 'Failed', (Date.now() - stepStart) / 1000);
        warnings.push('Shell conversion failed: ' + shellResult.msg);
      }
    } else {
      rtSetStep(overlay, 1, 'skipped', 'Not found');
      warnings.push('No shell drawing found \u2014 shell operations omitted');
    }
    stepsComplete = 2; progress();

    // Step 2: Convert bundle
    if (cancelled) return;
    stepStart = Date.now();
    if (scan.bundle) {
      rtSetStep(overlay, 2, 'active', scan.bundle.name);
      rtSetStatus(overlay, 'Analyzing bundle drawing...');
      const bundleResult = await window.api.convertDwgDxfText(scan.bundle.filepath);
      if (cancelled) return;
      if (bundleResult.ok) {
        dxfTexts.bundle = bundleResult.text;
        rtSetStep(overlay, 2, 'done', null, (Date.now() - stepStart) / 1000);
      } else {
        rtSetStep(overlay, 2, 'error', 'Failed', (Date.now() - stepStart) / 1000);
        warnings.push('Bundle conversion failed: ' + bundleResult.msg);
      }
    } else {
      rtSetStep(overlay, 2, 'skipped', 'Not found');
      warnings.push('No bundle drawing found \u2014 bundle operations omitted');
    }
    stepsComplete = 3; progress();

    // Parse and calculate (instant, no separate step)
    if (cancelled) return;
    const allVars = {};
    for (const key of ['setting', 'shell', 'bundle']) {
      if (dxfTexts[key]) {
        allVars[key] = rtExtractVariables(rtParseDXF(dxfTexts[key]));
      }
    }

    // Apply setting context to shell/bundle
    const sv = allVars.setting;
    if (sv) {
      for (const key of ['shell', 'bundle']) {
        if (allVars[key]) {
          if (sv.unit_type && !allVars[key].unit_type) allVars[key].unit_type = sv.unit_type;
          if (sv.passes && !allVars[key].passes) allVars[key].passes = sv.passes;
          if (sv.nom_dia && !allVars[key].nom_dia) allVars[key].nom_dia = sv.nom_dia;
          if (sv.nom_length && !allVars[key].nom_length) allVars[key].nom_length = sv.nom_length;
        }
      }
    }

    const allOps = [];
    for (const type of ['shell', 'bundle', 'setting']) {
      if (allVars[type]) {
        allOps.push({ type, ops: rtCalculateRouting(allVars[type]), vars: allVars[type] });
      }
    }

    clearInterval(timerIv);
    const totalElapsed = ((Date.now() - flowStart) / 1000).toFixed(1);
    if (timerEl) timerEl.textContent = totalElapsed + 's total';
    rtSetStatus(overlay, 'Complete');
    await new Promise(r => setTimeout(r, 400));

    showRoutingResults(overlay, allOps, allVars, warnings);

  } catch (err) {
    clearInterval(timerIv);
    rtSetStatus(overlay, 'Error: ' + err.message);
    stopBtn.style.display = 'none';
    overlay.querySelector('#route-close').style.display = '';
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════════════
async function init() {
  S.config = await window.api.getConfig();
  S.platform = await window.api.getPlatform();

  // Mark What's New bell as seen if user already viewed the latest version
  if (S.config.seen_changelog_ver === CHANGELOG[0].ver) {
    const bellBtn = $('#btn-whats-new');
    if (bellBtn) bellBtn.classList.add('seen');
  }

  // One-time AutoCAD availability check (non-blocking)
  window.api.checkAccore().then(r => { S._hasAccore = !!r; updateOpenBtn(); }).catch(() => { S._hasAccore = false; });

  // Show ODA install button if not installed (always show in dev for testing)
  // Also show BOM extract button when ODA is available
  Promise.all([window.api.checkDxfConverter(), window.api.getVersion()]).then(([r, v]) => {
    if (!r || v.isDev) {
      const odaBtn = $('#btn-install-oda');
      if (odaBtn) {
        odaBtn.style.display = '';
        odaBtn.addEventListener('click', () => {
          showOdaPromo();
        });
      }
    }
    if (r) {
      const bomBtn = $('#btn-bom-extract');
      if (bomBtn) { bomBtn.style.display = ''; S._hasOda = true; }
    }
  }).catch(() => {});

  // PDF paper detection toast
  window.api.onPdfPaperDetected((letter, orient) => {
    setStatus(`Exporting as ANSI ${letter} ${orient.toLowerCase()}\u2026`);
  });

  // Preload contingency database early (non-blocking) and show spinner on button during loads
  window.api.preloadContingency().catch(() => {});
  window.api.onContingencyLoading((loading) => {
    const btn = $('#cnt-btn');
    if (!btn) return;
    if (loading) {
      btn._origText = btn.textContent;
      btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
    } else if (btn._origText) {
      btn.textContent = btn._origText;
      btn._origText = null;
    }
  });

  // Apply saved theme
  S.theme = S.config.theme === 'auto' ? 'dark' : (S.config.theme || 'dark');
  await applyTheme(S.theme);
  window.api.onSystemThemeChanged(() => { if (S.theme === 'auto') applyTheme('auto'); });

  // Theme segment
  const themeSeg = initSeg($('#theme-seg'), t => { applyTheme(t); });
  themeSeg.activate(S.theme);

  // Mode segment — save/restore state per mode
  const _modeState = { orders: null, drawings: null };
  function saveModeState() {
    if (S.mode === 'orders') {
      _modeState.orders = { files: S.files, cntFiles: S.cntFiles, selected: S.selected, currentFolder: S.currentFolder, currentOrder: S.currentOrder, currentLine: S.currentLine, otpDigits: [...S.otpDigits], otpComplete: S.otpComplete, revWarnings: { ...S.revWarnings }, collapsedSections: { ...S.collapsedSections }, _checklistPath: S._checklistPath, _checklistName: S._checklistName };
    } else if (S.mode === 'drawings') {
      _modeState.drawings = { files: S.files, selected: S.selected, currentFolder: S.currentFolder, dwgResult: S.dwgResult };
    }
  }
  function restoreModeState(m) {
    const saved = _modeState[m];
    if (saved && m === 'orders') {
      Object.assign(S, { files: saved.files, cntFiles: saved.cntFiles, selected: saved.selected, currentFolder: saved.currentFolder, currentOrder: saved.currentOrder, currentLine: saved.currentLine, otpDigits: saved.otpDigits, otpComplete: saved.otpComplete, revWarnings: saved.revWarnings, collapsedSections: saved.collapsedSections, _checklistPath: saved._checklistPath, _checklistName: saved._checklistName });
      return true;
    } else if (saved && m === 'drawings') {
      Object.assign(S, { files: saved.files, selected: saved.selected, currentFolder: saved.currentFolder, dwgResult: saved.dwgResult });
      return true;
    }
    return false;
  }

  const modeSeg = initSeg($('#mode-seg'), m => {
    saveModeState();
    S.mode = m;
    const isChat = m === 'chat';
    const isDwg = m === 'drawings';
    if (m !== 'orders') resetRouteState();

    // Show/hide layout — clear cross-mode state
    $('#search-card-wrap').style.display = isChat ? 'none' : '';
    hideRecentDropdown();
    $('#status-bar').style.display = (isChat || isDwg) ? 'none' : '';
    if (m !== 'orders') $('#sibling-lines').style.display = 'none';
    const cardEl = $('#file-list-card');
    if (cardEl) cardEl.classList.remove('card-glow');
    document.querySelector('[id=section-label]').parentElement.style.display = isChat ? 'none' : '';
    $('#main-area').style.display = isChat ? 'none' : 'flex';
    $('#chat-container').classList.toggle('active', isChat);
    if (isChat) requestAnimationFrame(() => {
      const el = $('#chat-messages'); if (el) el.scrollTop = el.scrollHeight;
      const inp = $('#chat-input'); if (inp) inp.focus();
    });
    $('#rev-banner').classList.remove('show');
    $('#comments-section').style.display = 'none';
    startChatPoll(isChat);

    // Hide order-only buttons in drawing mode; show shared buttons in both
    $('#cnt-btn').style.display = isDwg ? 'none' : '';
    $('#cnt-ident').style.display = isDwg ? 'none' : '';
    $('#sidebar-row-mf').style.display = isDwg ? 'none' : 'flex';
    $('#sidebar-row-lr').style.display = 'flex';
    $('#btn-resubmit').style.display = isDwg ? 'none' : '';
    $('#btn-route').style.display = '';
    $('#sidebar-gap1').style.display = isDwg ? 'none' : '';
    // Move Folder button next to Link in drawing mode, back to its row in order mode
    const explorerBtn = $('#btn-explorer');
    if (isDwg) {

    if (e.key === 'Escape') { $('#ctx-menu').style.display = 'none'; }
    // Close theme popover on any key press
    if ($('#theme-popover')?.classList.contains('open')) hideThemePop(0);
    // Ctrl+C: copy selected file (skip if user has text selected in an input)
    const activeEl = document.activeElement;
    const hasTextSelection = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA') && activeEl.selectionStart !== activeEl.selectionEnd;
    if (e.ctrlKey && e.key === 'c' && !e.shiftKey && !e.altKey && !hasTextSelection && S.selected >= 0 && S.files[S.selected]?.filepath) {
      e.preventDefault();
      window.api.copyFileToClipboard(S.files[S.selected].filepath);
      return;
    }
    // Ctrl+V: paste files into current folder
    if (e.ctrlKey && e.key === 'v' && !e.shiftKey && !e.altKey && S.mode === 'orders' && S.currentFolder) {
      e.preventDefault();
      doPaste();
      return;
    }
    // Ctrl+1/2/3 to switch modes
    if (e.ctrlKey && !e.shiftKey && !e.altKey && ['1','2','3'].includes(e.key)) {
      e.preventDefault();
      const modes = ['orders','drawings','chat'];
      const target = modes[+e.key - 1];
      if (target && target !== S.mode) {
        modeSeg.activate(target);
        $('#mode-seg button[data-val="' + target + '"]').click();
      }
      return;
    }
    // Ctrl+Tab / Ctrl+Shift+Tab to cycle tabs
    if (e.ctrlKey && e.key === 'Tab') {
      e.preventDefault();
      const modes = ['orders','drawings','chat'];
      const cur = modes.indexOf(S.mode);
      const next = modes[(cur + (e.shiftKey ? modes.length - 1 : 1)) % modes.length];
      modeSeg.activate(next);
      $('#mode-seg button[data-val="' + next + '"]').click();
      return;
    }
    // Ctrl+Q: quit app (bypasses minimize-to-tray)
    if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'q') {
      e.preventDefault();
      window.api.quitApp();
      return;
    }
    // Ctrl+Backspace: clear everything in current search mode
    if (e.ctrlKey && e.key === 'Backspace') {
      e.preventDefault();
      if (S.mode === 'orders') {
        S.otpDigits = []; S.otpComplete = false; S.files = []; S.selected = -1;
        renderFiles(); setStatus(''); setCount(''); updateOtpDisplay();
      } else if (S.mode === 'drawings') {
        const inp = $('#inp-dwg');
        if (inp) { inp.value = ''; inp.dispatchEvent(new Event('input')); inp.focus(); }
      }
      return;
    }
    // Enter key: open selected file if a search is loaded and not typing in an input
    if (e.key === 'Enter' && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
      if (S.mode === 'orders' && S.otpComplete && S.selected >= 0 && S.files[S.selected]) {
        e.preventDefault();
        openFile(S.selected);
      } else if (S.mode === 'drawings' && S.dwgResult && S.dwgResult.primary) {
        e.preventDefault();
        openFile(0);
      }
    }
    // Arrow keys navigate file list (orders mode only)
    if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && S.mode === 'orders' && S.files.length && document.activeElement?.tagName !== 'INPUT') {
      e.preventDefault();
      const dir = e.key === 'ArrowDown' ? 1 : -1;
      let next = S.selected;
      do { next += dir; } while (
        next >= 0 && next < S.files.length &&
        (S.files[next].type === 'section-header' || (S.files[next].section && S.collapsedSections[S.files[next].section]))
      );
      if (next >= 0 && next < S.files.length && S.files[next].type !== 'section-header') {
        selectFile(next);
        const el = document.querySelector(`[data-idx="${next}"]`);
        if (el) el.scrollIntoView({ block: 'nearest' });
      }
    }
    // Global typing → OTP (orders) or auto-focus (drawings)
    const hasModal = !!$('.modal-overlay');
    const onInput = document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA';
    if (!e.ctrlKey && !e.metaKey && !e.altKey && !hasModal && !onInput) {
      if (S.mode === 'orders') {
        if (/^[0-9]$/.test(e.key)) {
          e.preventDefault();
          if (S.otpComplete || S.otpDigits.length >= 8) { S.otpDigits = []; S.otpComplete = false; }
          S.otpDigits.push(e.key);
          updateOtpDisplay();
          if (S.otpDigits.length === 8) setTimeout(doOrderSearch, 50);
        } else if (e.key === 'Backspace') {
          e.preventDefault();
          if (e.ctrlKey || S.otpComplete) { S.otpDigits = []; S.otpComplete = false; S.files = []; S.selected = -1; renderFiles(); setStatus(''); setCount(''); }
          else S.otpDigits.pop();
          updateOtpDisplay();
        } else if (e.key === 'Enter' && S.otpDigits.length > 0 && !S.otpComplete) {
          if (S.otpDigits.length < 6) {
            // Not enough digits — flash the next empty box red
            const boxes = $$('#otp-order .otp-box');
            const nextBox = boxes[S.otpDigits.length];
            if (nextBox) {
              nextBox.style.borderColor = 'var(--danger)';
              nextBox.style.boxShadow = '0 0 0 3px rgba(255,69,58,0.3)';
              setTimeout(() => { nextBox.style.borderColor = ''; nextBox.style.boxShadow = ''; }, 800);
            }
          } else if (S.otpDigits.length === 6) {
            // 6 digits → search for 00 line
            S.otpDigits.push('0', '0');
            updateOtpDisplay();
            setTimeout(doOrderSearch, 50);
          } else if (S.otpDigits.length === 7) {
            // 7 digits → assume leading zero on line (e.g. 1234560 → 12345600)
            S.otpDigits.splice(6, 0, '0');
            updateOtpDisplay();
            setTimeout(doOrderSearch, 50);
          } else {
            doOrderSearch();
          }
        }
      } else if (S.mode === 'drawings' && e.key.length === 1 && /[0-9a-zA-Z*%_]/.test(e.key) && !konamiConsumed) {
        const inp = $('#inp-dwg');
        if (inp) { inp.focus(); inp.value = ''; }
      }
    }
  });
}

const USERNAME_NAMES = {
  pcastig:'Peter Castiglia', wboisso:'Will Boissonnault', tshershn:'Tatiana Shershnevskiy',
  agrogan:'Adam Grogan', smancuso:'Steve Mancuso', jmaeder:'Jake Maeder', jdeci:'Jeff Deci',
  spierson:'Scott Pierson', jjurynie:'Josh Juryniec', mzoyhofski:'Mark Zoyhofski',
  dpinson:'Dave Pinson', mkielma:'Matt Kielma', pmccarne:'Peggy McCarney',
};
function displayName(username) {
  if (!username) return '';
  const lower = username.toLowerCase().trim();
  return USERNAME_NAMES[lower] || username;
}

async function showContingencyViewer(orderLine) {
  const order = orderLine.slice(0, 6), line = orderLine.slice(6);

  // Fetch data first (button shows spinner), then create the modal
  const r = await window.api.getContingency(orderLine);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal glass-strong cnt-viewer"></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('mousedown', e => { if (!e.target.closest('.modal') && e.clientY >= 38) overlay.remove(); });

  if (!r.found) {
    overlay.querySelector('.modal').innerHTML = `<div style="text-align:center;padding:32px">
      <div style="font:600 13px/1.4 'DM Sans',sans-serif;color:var(--danger);margin-bottom:6px">No contingency found</div>
      <div style="font:400 11px/1.3 'DM Sans',sans-serif;color:var(--text3);margin-bottom:16px">${order}-${line}</div>
      <button class="btn-glass" id="cnt-open-legacy" style="font-size:11px">Open Contingency App</button>
    </div>`;
    overlay.querySelector('#cnt-open-legacy')?.addEventListener('click', () => { overlay.remove(); window.api.openContingencyStandalone(); });
    return;
  }

  const d = r.data;
  const oi = d.OrderInfo || {};
  const con = d.ConstructionData || {};
  const insp = d.InspectionData || {};
  const test = d.TestingData || {};
  const clean = d.CleaningData || {};
  const paint = d.PaintingData || {};
  const np = d.NamePlateData || {};
  const pkg = d.PackagingData || {};
  const purch = d.PurchasingData || {};
  const qc = d.QCdata || {};

  function notes(obj, prefix, max) {
    const out = [];
    for (let i = 1; i <= max; i++) {
      const v = obj[prefix + i];
      if (v && v.trim()) out.push(escHtml(v.trim()));
    }
    return out;
  }
  function section(title, lines) {
    const body = lines.filter(Boolean);
    return `<div class="cnt-section">
      <div class="cnt-section-title">${title}</div>
      <div class="cnt-section-body">${body.length ? body.join('<br>') : '<span class="cnt-empty">None specified</span>'}</div>
    </div>`;
  }

  // Build inspection levels
  const inspLevels = [];
  for (let i = 1; i <= 6; i++) { const v = insp['InspLevel' + i]; if (v && v.trim()) inspLevels.push(escHtml(v.trim())); }

  // Build name plates
  const namePlates = [];
  for (let i = 1; i <= 6; i++) { const v = np['NamePlate' + i]; if (v && v.trim()) namePlates.push(escHtml(v.trim())); }

  // QC docs
  const qcNotes = notes(qc, 'Note', 6);
  const sendTo = [qc.SendToLine1, qc.SendToLine2, qc.SendToLine3, qc.SendToLine4].filter(Boolean).map(s => s.trim()).filter(Boolean);
  const sendAttn = qc.SendToAttn ? qc.SendToAttn.trim() : '';

  // Staleness check — warn if data is more than 30 minutes old
  const staleMinutes = r.loadedAt ? Math.floor((Date.now() - r.loadedAt) / 60000) : -1;
  const isStale = staleMinutes < 0 || staleMinutes > 30;

  const html = `
    <div class="cnt-head">
      <h2>Contingency Instructions</h2>
      <div class="cnt-order">${order}-${line}</div>
      <div class="cnt-detail">
        ${oi.DwgNo ? `<span>Dwg <b>${escHtml(oi.DwgNo)}</b></span>` : ''}
        ${oi.Qty ? `<span>Qty <b>${escHtml(String(oi.Qty))}</b></span>` : ''}
        <span class="cnt-nowrap">Doc Rev <b>${escHtml(String(oi.RevNo || '0'))}</b></span>
        <span>By <b>${escHtml(displayName(oi.MadeBy))}</b></span>
      </div>
      ${isStale ? `<div id="cnt-stale-banner" style="margin-top:8px;padding:5px 10px;border-radius:8px;background:rgba(255,180,0,.12);border:1px solid rgba(255,180,0,.25);font:500 10px/1.4 'DM Sans',sans-serif;color:var(--amber,#f0a030);display:flex;align-items:center;gap:8px">
        <span>\u26A0 Data is ${staleMinutes >= 0 ? staleMinutes + ' min' : 'unknown time'} old</span>
        <button id="cnt-retry" class="btn-glass" style="font-size:9px;padding:2px 10px;margin-left:auto">Retry</button>
      </div>` : ''}
    </div>

    <div class="cnt-scroll">
    ${section('Construction', [
      con.ConstrCode ? escHtml(con.ConstrCode.trim()) : null,
      ...notes(con, 'Note', 12),
    ])}

    ${section('Inspection', [
      con.ConstrCode && con.ConstrCode.includes('ASME') ? 'ASME Code (Section VIII, Div. I) \u2026(ref Q-01-01-11)' : null,
      inspLevels.length ? '<span class="cnt-label">Level(s):</span> ' + inspLevels.join('; ') : null,
      ...notes(insp, 'Note', 6),
    ])}

    ${section('Testing', [
      test.Fluid_SS ? '<span class="cnt-label">Shell Side Fluid:</span> ' + escHtml(test.Fluid_SS.trim()) + (test.psi_SS ? ' \u2026.. at ' + escHtml(test.psi_SS.trim()) : '') : null,
      test.Fluid_TS ? '<span class="cnt-label">Tube Side Fluid:</span> ' + escHtml(test.Fluid_TS.trim()) + (test.psi_TS ? ' \u2026.. at ' + escHtml(test.psi_TS.trim()) : '') : null,
      ...notes(test, 'Note', 6),
    ])}

    ${section('Cleaning', notes(clean, 'Note', 6))}
    ${section('Painting', notes(paint, 'Note', 6))}

    ${section('Name Plates', [
      ...namePlates,
      ...notes(np, 'Note', 6),
    ])}

    ${section('Packaging', notes(pkg, 'Note', 6))}
    ${section('Purchased Material', notes(purch, 'Note', 6))}

    ${section('Required Documents', [
      qc.QCdocs === 'Y' ? '<span class="cnt-label">Documentation required</span>' : '<span class="cnt-label">Documentation not required</span>',
      ...qcNotes,
      sendTo.length ? '<span class="cnt-label">Send Docs to:</span> ' + sendTo.map(escHtml).join(', ') : null,
      sendAttn ? '<span class="cnt-label">Attn:</span> ' + escHtml(sendAttn) : null,
    ])}

    <div class="cnt-footer">
      ${oi.CustomerName ? escHtml(oi.CustomerName.trim()) : ''} ${oi.CustomerLoc ? '\u2014 ' + escHtml(oi.CustomerLoc.trim()) : ''}
      <br>${oi.ItemDesc ? escHtml(oi.ItemDesc.trim()) : ''} ${oi.BPCSpn ? '(' + escHtml(oi.BPCSpn.trim()) + ')' : ''}
    </div>
    </div>

    <div class="cnt-actions">
      <button id="cnt-print">Print</button>
      <button id="cnt-save">Save</button>
      <button id="cnt-legacy">Open</button>
      <button id="cnt-close">Close</button>
    </div>
  `;

  const modal = overlay.querySelector('.modal');
  modal.style.textAlign = 'left';
  modal.style.padding = '';
  modal.innerHTML = html;
  overlay.querySelector('#cnt-close').addEventListener('click', () => overlay.remove());
  // Retry button — force-reload contingency DB and reopen viewer
  overlay.querySelector('#cnt-retry')?.addEventListener('click', async () => {
    overlay.remove();
    setStatus('Refreshing contingency\u2026');
    await window.api.preloadContingency(true);
    showContingencyViewer(orderLine);
  });
  // Build print-friendly HTML shared by Print and Save
  function pSection(title, lines) {
    const body = lines.filter(Boolean);
    return `<div class="section"><div class="section-title">${title}</div><div class="section-body">${body.length ? body.join('<br>') : '<span class="empty">None specified</span>'}</div></div>`;
  }
  const printHtml = `
    <h2>CONTINGENCY INSTRUCTIONS</h2>
    <div class="meta">ORDER: <b>${order}-${line}</b>&nbsp;&nbsp;&nbsp;${oi.DwgNo ? `Dwg: <b>${escHtml(oi.DwgNo)}</b>&nbsp;&nbsp;&nbsp;` : ''}${oi.Qty ? `Qty: <b>${escHtml(String(oi.Qty))}</b>&nbsp;&nbsp;&nbsp;` : ''}Doc Rev: <b>${escHtml(String(oi.RevNo || '0'))}</b>&nbsp;&nbsp;&nbsp;By: <b>${escHtml(displayName(oi.MadeBy))}</b></div>
    ${pSection('Construction', [con.ConstrCode ? escHtml(con.ConstrCode.trim()) : null, ...notes(con, 'Note', 12)])}
    ${pSection('Inspection', [con.ConstrCode && con.ConstrCode.includes('ASME') ? 'ASME Code (Section VIII, Div. I) \u2026(ref Q-01-01-11)' : null, inspLevels.length ? '<span class="label">Level(s):</span> ' + inspLevels.join('; ') : null, ...notes(insp, 'Note', 6)])}
    ${pSection('Testing', [test.Fluid_SS ? '<span class="label">Shell Side Fluid:</span> ' + escHtml(test.Fluid_SS.trim()) + (test.psi_SS ? ' \u2026.. at ' + escHtml(test.psi_SS.trim()) : '') : null, test.Fluid_TS ? '<span class="label">Tube Side Fluid:</span> ' + escHtml(test.Fluid_TS.trim()) + (test.psi_TS ? ' \u2026.. at ' + escHtml(test.psi_TS.trim()) : '') : null, ...notes(test, 'Note', 6)])}
    ${pSection('Cleaning', notes(clean, 'Note', 6))}
    ${pSection('Painting', notes(paint, 'Note', 6))}
    ${pSection('Name Plates', [...namePlates, ...notes(np, 'Note', 6)])}
    ${pSection('Packaging', notes(pkg, 'Note', 6))}
    ${pSection('Purchased Material', notes(purch, 'Note', 6))}
    ${pSection('Required Documents', [qc.QCdocs === 'Y' ? '<span class="label">Documentation required</span>' : '<span class="label">Documentation not required</span>', ...qcNotes, sendTo.length ? '<span class="label">Send Docs to:</span> ' + sendTo.map(escHtml).join(', ') : null, sendAttn ? '<span class="label">Attn:</span> ' + escHtml(sendAttn) : null])}
    <div class="footer">${oi.CustomerName ? escHtml(oi.CustomerName.trim()) : ''} ${oi.CustomerLoc ? '\u2014 ' + escHtml(oi.CustomerLoc.trim()) : ''}<br>${oi.ItemDesc ? escHtml(oi.ItemDesc.trim()) : ''} ${oi.BPCSpn ? '(' + escHtml(oi.BPCSpn.trim()) + ')' : ''}</div>
  `;

  // Print — sends directly to printer (OS print dialog, no Adobe)
  overlay.querySelector('#cnt-print').addEventListener('click', async () => {
    const btn = overlay.querySelector('#cnt-print');
    btn.disabled = true;
    btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
    const r = await window.api.printContingency(printHtml);
    btn.disabled = false;
    btn.textContent = 'Print';
    if (!r.ok) showToast('Print failed: ' + r.msg, 'danger');
  });

  // Save PDF to Downloads
  overlay.querySelector('#cnt-save').addEventListener('click', async () => {
    const btn = overlay.querySelector('#cnt-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
    const r = await window.api.saveContingencyPdf(orderLine, printHtml);
    btn.disabled = false;
    btn.textContent = 'Save';
    if (r.ok) showToast('Saved to Downloads', 'success');
    else showToast('Save failed: ' + r.msg, 'danger');
  });
  overlay.querySelector('#cnt-legacy').addEventListener('click', () => {
    overlay.remove();
    window.api.openContingencyOrder(order + '-' + line);
  });
}

async function showChecklistReview(orderPad) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal glass-strong" style="color:var(--text);width:440px;max-height:85vh;overflow-y:auto;scrollbar-gutter:stable;padding:24px">
    <div style="text-align:center"><div class="deep-spinner" style="width:16px;height:16px;margin:0 auto 8px"></div>

  overlay.addEventListener('mousedown', e => { if (!e.target.closest('.modal') && e.clientY >= 38) overlay.remove(); });

  const r = await window.api.scanChecklists(orderPad);
  const modal = overlay.querySelector('.modal');

  if (!r.found || !r.checklists.length) {
    modal.innerHTML = `<div style="text-align:center;padding:24px">
      <div style="font:600 13px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-bottom:6px">No checklist found</div>
      <div style="font:400 11px/1.3 'DM Sans',sans-serif;color:var(--text3)">${orderPad}-00</div>
      <button class="btn-accent" style="margin-top:16px;height:32px;font-size:12px;padding:0 20px" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`;
    return;
  }

  const cl = r.checklists[0];
  if (cl.error) {
    modal.innerHTML = `<div style="text-align:center;padding:24px">
      <div style="font:600 12px/1.4 'DM Sans',sans-serif;color:var(--danger)">Error parsing checklist</div>
      <div style="font:400 11px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:6px">${escHtml(cl.error)}</div>
      <button class="btn-accent" style="margin-top:16px;height:32px;font-size:12px;padding:0 20px" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`;
    return;
  }

  const hasDrawings = cl.lineItems.some(li => li.dwgNorm);
  const repeatBadge = hasDrawings
    ? '<span style="background:var(--success);color:#000;font:700 9px/1 \'DM Sans\',sans-serif;padding:3px 8px;border-radius:6px;letter-spacing:0.5px">REPEAT ORDER</span>'
    : '<span style="background:var(--amber);color:#000;font:700 9px/1 \'DM Sans\',sans-serif;padding:3px 8px;border-radius:6px;letter-spacing:0.5px">NEW UNIT</span>';

  const lineItemsHtml = cl.lineItems.map(li => `
    <div class="clr-line-item" data-dwg="${escHtml(li.dwgNorm)}" data-line="${escHtml(li.line)}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);margin-bottom:4px;cursor:pointer;transition:background .15s" title="Click to copy ${escHtml(li.dwgNorm)}">
      <div style="font:700 13px/1 'IBM Plex Mono',monospace;color:var(--accent);min-width:24px">${li.line}</div>
      <div style="flex:1">
        <div style="font:600 12px/1.3 'IBM Plex Mono',monospace;color:var(--dwg)">${escHtml(li.dwgRaw)}</div>
        <div style="font:400 10px/1.3 'DM Sans',sans-serif;color:var(--text3);margin-top:2px">${escHtml(li.template)} \u2022 Qty: ${li.qty}${li.price ? ' \u2022 $' + escHtml(li.price) : ''}</div>
      </div>
      <button class="clr-link-btn btn-glass" data-dwg="${escHtml(li.dwgNorm)}" data-line="${escHtml(li.line)}" style="font-size:9px;height:24px;padding:0 8px;flex-shrink:0" title="Link drawing to order folder" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5l-1 1"/><path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5l1-1"/></svg></button>
      <div style="font:700 9px/1 'DM Sans',sans-serif;padding:3px 8px;border-radius:6px;background:${li.dwgNorm ? 'rgba(0,255,144,0.12);color:var(--success)' : 'rgba(255,152,32,0.12);color:var(--amber)'}">
        ${li.dwgNorm ? 'REPEAT' : 'NEW'}
      </div>
    </div>
  `).join('');

  modal.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <h3 style="font:700 16px/1 'DM Sans',sans-serif;margin:0">Order ${orderPad}</h3>
      ${repeatBadge}
    </div>
    <div style="font:400 11px/1.5 'DM Sans',sans-serif;color:var(--text2);margin-bottom:14px">
      PO: <b>${escHtml(cl.poNumber || '?')}</b> \u2022 AE: <b>${escHtml(cl.ae || '?')}</b> \u2022 ${escHtml(cl.date || '')}${cl.fileDate ? ' \u2022 Filed: <b>' + new Date(cl.fileDate).toLocaleDateString() + '</b>' : ''}
    </div>
    <div style="font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:6px">LINE ITEMS${cl.lineNumberSource === 'estimated' ? ' <span style="opacity:.6;font-weight:400">(line #s estimated)</span>' : ''}</div>
    ${lineItemsHtml || '<div style="font:400 11px/1.4 \'DM Sans\',sans-serif;color:var(--text3);font-style:italic;padding:8px 12px">No line items found in checklist</div>'}
    ${cl.comments ? `<div style="margin-top:12px;font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:4px">COMMENTS</div><div style="font:400 11px/1.5 'DM Sans',sans-serif;color:var(--text2);padding:8px 12px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border)">${escHtml(cl.comments)}</div>` : ''}
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
      <button class="btn-glass" id="clr-view-pdf" style="font-size:11px;height:32px;padding:0 16px">View PDF</button>
      <button class="btn-accent" style="height:32px;font-size:12px;padding:0 20px" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>
  `;

  overlay.querySelector('#clr-view-pdf')?.addEventListener('click', () => {
    window.api.openFile(cl.filepath);
  });
  overlay.querySelectorAll('.clr-line-item').forEach(el => {
    el.addEventListener('click', () => {
      const dwg = el.dataset.dwg;
      if (dwg) {
        navigator.clipboard.writeText(dwg);
        const badge = el.querySelector('div:last-child');
        const orig = badge.textContent;
        badge.textContent = 'COPIED';
        setTimeout(() => { badge.textContent = orig; }, 1200);
      }
    });
  });
  // Link buttons — search for drawing and link to order-line folder
  overlay.querySelectorAll('.clr-link-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const dwg = btn.dataset.dwg;
      const line = btn.dataset.line;
      if (!dwg || !orderPad) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="deep-spinner" style="width:9px;height:9px"></span>';
      // Search for the drawing
      const r = await window.api.searchDrawing(dwg);
      if (!r.found || !r.primary) {
        btn.innerHTML = '\u2717';
        btn.title = 'Drawing not found in ACADDWGS';
        setTimeout(() => { btn.innerHTML = '\u{1F517}'; btn.disabled = false; }, 2000);
        return;
      }
      // Create link in the order-line folder
      const orderFolder = S.config.order_path + (S.platform === 'win32' ? '\\' : '/') + orderPad + line;
      const linkResult = await window.api.createLink(r.primary.filepath, orderFolder, true);
      if (linkResult.ok) {
        btn.innerHTML = '\u2713';
        btn.style.color = 'var(--success)';
        btn.title = 'Linked!';
        playChime();
      } else {
        btn.innerHTML = '\u26A0';
        btn.title = linkResult.msg || 'Link failed';
        setTimeout(() => { btn.innerHTML = '\u{1F517}'; btn.disabled = false; btn.style.color = ''; }, 2000);
      }
    });
  });
}

//  Link to Order dialog
// ═══════════════════════════════════════════════════════════════════════
function showLinkDialog() {
  const f = S.files[S.selected]; if (!f) return;
  const linkDigits = [];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-strong" style="color:var(--text);width:320px;padding:20px;text-align:center">
      <div style="font:700 14px/1 'DM Sans',sans-serif;margin-bottom:12px">Link to Order</div>
      <div class="otp-container no-drag" id="link-otp" style="justify-content:center">
        ${[0,1,2,3,4,5].map(i => `<div class="otp-box" data-idx="${i}" style="width:32px;height:38px;font-size:18px;line-height:38px"></div>`).join('')}
        <span class="otp-dash">&ndash;</span>
        ${[6,7].map(i => `<div class="otp-box" data-idx="${i}" style="width:32px;height:38px;font-size:18px;line-height:38px"></div>`).join('')}
      </div>
      <div id="link-status" style="font:500 11px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:10px;min-height:16px">Type order number, Enter to link</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('mousedown', e => { if (!e.target.closest('.modal') && e.clientY >= 38) overlay.remove(); });
  // Focus the modal so it captures keyboard events
  const modalDiv = overlay.querySelector('.modal');
  modalDiv.setAttribute('tabindex', '-1');
  modalDiv.focus();

  function updateLinkOtp() {
    const boxes = overlay.querySelectorAll('#link-otp .otp-box');
    boxes.forEach((box, i) => {
      box.textContent = linkDigits[i] || '';
      box.classList.toggle('filled', !!linkDigits[i]);
      box.classList.toggle('active', i === linkDigits.length);
    });
  }
  updateLinkOtp();

  async function doLink() {
    if (linkDigits.length < 8) return;
    const order = linkDigits.slice(0, 6).join('');
    const line = linkDigits.slice(6, 8).join('');
    const folder = S.config.order_path + (S.platform === 'win32' ? '\\' : '/') + order + line;
    $('#link-status').textContent = 'Creating…';
    $('#link-status').style.color = 'var(--text3)';
    const r = await window.api.createLink(f.filepath, folder, true);
    if (r.ok) {
      $('#link-status').textContent = '✓ Linked!';
      $('#link-status').style.color = 'var(--success)';
      playChime();
      setTimeout(() => {
        overlay.style.opacity = '0';
        overlay.style.transition = 'opacity .3s';
        setTimeout(() => overlay.remove(), 300);
      }, 600);
    } else {
      $('#link-status').textContent = '⚠  ' + r.msg.split('\n')[0];
      $('#link-status').style.color = 'var(--danger)';
    }
  }

  function linkKeyHandler(e) {
    if (!document.body.contains(overlay)) { document.removeEventListener('keydown', linkKeyHandler, true); return; }
    e.stopImmediatePropagation();
    e.preventDefault();
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', linkKeyHandler, true); return; }
    if (/^[0-9]$/.test(e.key) && linkDigits.length < 8) {
      linkDigits.push(e.key);
      updateLinkOtp();
      if (linkDigits.length === 8) setTimeout(doLink, 100);
    } else if (e.key === 'Backspace') {
      linkDigits.pop();
      updateLinkOtp();
      $('#link-status').textContent = 'Type order number, Enter to link';
      $('#link-status').style.color = 'var(--text3)';
    } else if (e.key === 'Enter') {
      doLink();
    }
  }
  document.addEventListener('keydown', linkKeyHandler, true);  // capture phase — fires before global handler
}

//  Settings dialog
// ═══════════════════════════════════════════════════════════════════════
async function showSettings() {
  const cfg = await window.api.getConfig();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  const programFields = [
    { key: 'dwg_viewer', label: 'DWG viewer program' },
    { key: 'autocad_exe', label: 'AutoCAD program' },
    { key: 'contingency_exe', label: 'Contingency program' },
  ];
  const dbFields = [
    { key: 'order_path', label: 'Order folder root' },
    { key: 'archive_path', label: 'Orders archive' },
    { key: 'drawing_path', label: 'Drawing database (ACADDWGS)' },
    { key: 'ds_path', label: 'Design standards (DSGNSTDS)' },
  ];

  overlay.innerHTML = `
    <div class="modal glass-strong" style="color:var(--text);width:400px;max-height:90vh;overflow-y:auto;scrollbar-gutter:stable">
      <h3 style="font-size:18px;margin-bottom:4px">Settings</h3>

            <input type="checkbox" id="set-startup" ${cfg.launch_on_startup !== false ? 'checked' : ''} style="accent-color:var(--accent)">

          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
            <span style="font-size:10px;color:var(--text2)">DWG double-click</span>
            <div class="set-radio no-drag" id="dwg-action-radio">
              <button data-val="viewer" ${cfg.default_dwg_action === 'viewer' ? 'class="active"' : ''}>Viewer</button>

          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:10px;color:var(--text2)">Preferred format</span>
            <div class="set-radio no-drag" id="pref-format-radio">

              <button data-val="pdf" ${cfg.preferred_format === 'pdf' ? 'class="active"' : ''}>PDF</button>

          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:10px;color:var(--text2)">Export save location</span>
            <div class="set-radio no-drag" id="export-loc-radio">
              <button data-val="downloads" ${cfg.convert_save_location !== 'source' ? 'class="active"' : ''}>Downloads</button>
              <button data-val="source" ${cfg.convert_save_location === 'source' ? 'class="active"' : ''}>Source</button>
            </div>
          </div>
      </div>

      <div class="field-label" style="margin-bottom:4px">PROGRAMS</div>
      ${programFields.map(f => `
        <div style="margin-bottom:4px">
          <div style="font-size:9px;color:var(--text3);margin-bottom:1px">${f.label}</div>

  // DB paths toggle

  // Restore default database paths
  $('#set-db-reset').addEventListener('click', async () => {

  $('#set-save').addEventListener('click', async () => {

    const fmtBtn = $('#pref-format-radio button.active');
    newCfg.preferred_format = fmtBtn ? fmtBtn.dataset.val : 'dwg';
    const expBtn = $('#export-loc-radio button.active');
    newCfg.convert_save_location = expBtn ? expBtn.dataset.val : 'downloads';
    await window.api.saveConfig(newCfg);
    S.config = await window.api.getConfig();
    overlay.remove();
    playChime();
  });

  $('#tip-jar').addEventListener('click', (e) => {
    e.preventDefault();
    window.api.openExternal('https://venmo.com/willboiss');
  });
}

// Splash: solid bg → logo fades+zooms in with chime → hold → fade out into app
// Chime plays FIRST, then init() starts — so IPC calls can't block the audio
(function() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  const content = splash.querySelector('.splash-content');

  // Pre-warm the AudioContext immediately (before any async work)
  try { getSfxCtx(); } catch(e) {}

  function startSplash() {
    // 0.3s solid bg, then logo fades+zooms in and chime plays
    setTimeout(() => {
      if (content) content.classList.add('show');
      try { playStartupChime(); S._hasPlayed = true; } catch (e) {}
      // Boot the app AFTER the chime has started playing
      setTimeout(() => init().catch(console.error), 10);
    }, 300);
    // After zoom-in completes (0.3s delay + 0.8s transition), lock the transform
    setTimeout(() => {
      if (content) content.style.transition = 'opacity 0.8s ease';
    }, 1200);
    // Hold, then fade out — last ~1s of chord tail plays over the fade
    setTimeout(() => {
      splash.classList.add('fading');
      setTimeout(() => { if (splash.parentNode) splash.remove(); }, 1000);
    }, 4800);
  }
  if (document.readyState === 'complete') requestAnimationFrame(startSplash);
  else window.addEventListener('load', () => requestAnimationFrame(startSplash));
})();
</script>
