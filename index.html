        <button class="btn-icon no-drag" id="btn-contact" data-tip="Contact" style="width:26px;height:26px;border-radius:7px"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M1 3l7 5 7-5"/></svg></button>
        <button class="btn-icon no-drag" id="btn-settings" data-tip="Settings" style="width:26px;height:26px;border-radius:7px"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 1h2.8l.4 2.2a5.2 5.2 0 0 1 1.4.8l2.1-.7 1.4 2.4-1.7 1.5a5.3 5.3 0 0 1 0 1.6l1.7 1.5-1.4 2.4-2.1-.7a5.2 5.2 0 0 1-1.4.8L9.4 15H6.6l-.4-2.2a5.2 5.2 0 0 1-1.4-.8l-2.1.7-1.4-2.4 1.7-1.5a5.3 5.3 0 0 1 0-1.6L1.3 5.7l1.4-2.4 2.1.7a5.2 5.2 0 0 1 1.4-.8L6.6 1z"/><circle cx="8" cy="8" r="2.5"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Birthday -->
  <div id="birthday" style="text-align:center;font-size:11px;font-weight:600;color:var(--text);margin-top:8px;margin-bottom:4px;flex-shrink:0"></div>

  <!-- Chat container (shown only in chat mode) -->
  <div class="chat-container glass-strong no-drag" id="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input no-drag" id="chat-input" placeholder="Type a message…">
      <button class="chat-send no-drag" id="chat-send">Send</button>
    </div>
  </div>
</div>

<!-- Context menu (hidden) -->
<div class="ctx-menu" id="ctx-menu" style="display:none"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════════════
let S = {
  mode: 'orders',
  theme: 'dark',
  files: [],
  cntFiles: [],
  selected: -1,
  collapsedSections: {},
  currentFolder: null,
  currentOrder: null,  // just the order number (no line)
  currentLine: null,
  config: {},
  platform: 'win32',
  revWarnings: {},  // {filepath: {currentRev, newestRev}}
  recentOrders: [],
  recentDrawings: [],
  otpDigits: [],
  otpComplete: false,
  dwgResult: null,  // structured drawing search result
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// Global error logging — sends to shared network drive
window.onerror = (msg, src, line, col) => { try { window.api.logError(`${msg} at ${src}:${line}:${col}`); } catch(e) {} };
window.onunhandledrejection = (ev) => { try { window.api.logError(String(ev.reason)); } catch(e) {} };

// ═══════════════════════════════════════════════════════════════════════
//  Segmented control with sliding pill
// ═══════════════════════════════════════════════════════════════════════
function initSeg(container, onChange) {
  const btns = container.querySelectorAll('button');
  const pill = container.querySelector('.pill');

  function updatePill(btn) {
    pill.style.left = btn.offsetLeft + 'px';
    pill.style.width = btn.offsetWidth + 'px';
  }

  function activate(val) {
    btns.forEach(b => b.classList.toggle('active', b.dataset.val === val));
    const active = container.querySelector(`button[data-val="${val}"]`);
    if (active) updatePill(active);
  }

  pill.style.transition = 'none';

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      pill.style.transition = '';
      activate(btn.dataset.val);
      onChange(btn.dataset.val);
    });
  });

  // Position pill after layout — transition is 'none' so it snaps instantly
  requestAnimationFrame(() => {
    const active = container.querySelector('button.active');
    if (active) updatePill(active);
  });

  return { activate };
}

// ═══════════════════════════════════════════════════════════════════════
//  Rendering
// ═══════════════════════════════════════════════════════════════════════
function updateOtpDisplay() {
  const boxes = $$('#otp-order .otp-box');
  if (!boxes.length) return;
  boxes.forEach((box, i) => {
    const digit = S.otpDigits[i] || '';
    const wasEmpty = !box.textContent && digit;
    // Show faint "00" hint in line boxes when exactly 6 order digits entered
    const isHint = !S.otpComplete && S.otpDigits.length === 6 && (i === 6 || i === 7);
    box.textContent = isHint ? '0' : digit;
    box.style.opacity = isHint ? '0.3' : '';
    box.classList.toggle('filled', !!digit);
    box.classList.toggle('active', S.otpComplete ? i === 0 : i === S.otpDigits.length);
    if (wasEmpty) { box.classList.add('pop'); setTimeout(() => box.classList.remove('pop'), 100); }
  });
  // Recent pills always visible
  const bar = $('#recent-bar');
  const pills = bar ? bar.querySelectorAll('.recent-pill') : [];
  if (bar) pills.forEach(p => p.classList.remove('hidden-pill'));
}

function renderSearchCard() {
  const card = $('#search-card');
  if (S.mode === 'orders') {
    const currentKey = S.currentOrder && S.currentLine ? `${S.currentOrder}-${S.currentLine}` : '';
    const recents = S.recentOrders.filter(r => r.key !== currentKey).slice(0, 4);
    const hasRecent = recents.length > 0;
    card.innerHTML = `
      <div style="flex:1">
        <div class="field-label">ORDER NUMBER</div>
        <div class="otp-container no-drag" id="otp-order">
          ${[0,1,2,3,4,5].map(i => `<div class="otp-box" data-idx="${i}"></div>`).join('')}
          <span class="otp-dash">&ndash;</span>
          ${[6,7].map(i => `<div class="otp-box" data-idx="${i}"></div>`).join('')}
        </div>
        ${hasRecent ? `<div class="recent-bar no-drag" id="recent-bar">
          ${recents.map(r => `<button class="recent-pill no-drag" data-key="${r.key}">${r.order}-${r.line}</button>`).join('')}
        </div>` : ''}
      </div>`;

    // Recent order pills — always visible when no digits entered
    if (hasRecent) {
      $$('#recent-bar .recent-pill').forEach(el => {
        el.addEventListener('click', () => {
          S.otpDigits = el.dataset.key.replace(/[^0-9]/g, '').split('');
          S.otpComplete = false;
          updateOtpDisplay();
          setTimeout(doOrderSearch, 50);
        });
      });
    }
    updateOtpDisplay();
  } else {
    card.innerHTML = `
      <div style="flex:1">
        <div class="field-label">DRAWING NUMBER</div>
        <div style="position:relative">
          <input class="field-input" id="inp-dwg" style="width:100%;padding:0 40px 0 14px;font-size:22px;font-weight:600;letter-spacing:.5px;font-family:'DM Sans',sans-serif" placeholder="">
          <button id="btn-recent-dwg" class="btn-recent-dwg no-drag" title="Recent searches">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 1.5"/></svg>
          </button>
        </div>
      </div>`;
    const inp = $('#inp-dwg');
    const recentBtn = $('#btn-recent-dwg');

    // Toggle recent dropdown on button click
    recentBtn.addEventListener('click', e => {
      e.stopPropagation();
      const dd = $('#recent-dwg-dropdown');
      if (dd.classList.contains('show')) {
        hideRecentDropdown();
      } else {
        showRecentSearchedDrawings();
      }
    });

    inp.addEventListener('focus', () => inp.select());
    inp.addEventListener('input', () => {
      const cardEl = $('#file-list-card');
      if (cardEl) cardEl.classList.remove('card-glow');
      inp.classList.remove('dimmed');
      hideRecentDropdown();
      let v = inp.value.replace(/[\s-]/g, '').toUpperCase();
      const h = v.indexOf('#'); if (h !== -1) v = v.slice(0, h);
      const alnum = v.replace(/[^0-9A-Za-z*%_]/g, '');
      // Auto-hyphenate based on first digit
      let display = alnum;
      if (alnum.length >= 1 && !/[*%_]/.test(alnum) && /^[0-5]/.test(alnum)) {
        const f = alnum[0];
        let parts;
        if ('123'.includes(f)) {
          // X-XXX-X-XX-XXX-XX
          parts = [alnum.slice(0,1), alnum.slice(1,4), alnum.slice(4,5), alnum.slice(5,7), alnum.slice(7,10), alnum.slice(10,12)];
        } else {
          // X-XXX-XX-XXX-XXX
          parts = [alnum.slice(0,1), alnum.slice(1,4), alnum.slice(4,6), alnum.slice(6,9), alnum.slice(9,12)];
        }
        display = parts.filter(p => p).join('-');
      }
      inp.value = display;
      if (alnum.length === 12) setTimeout(doDrawingSearch, 50);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const cardHasGlow = $('#file-list-card')?.classList.contains('card-glow');
        if (cardHasGlow && S.dwgResult && S.dwgResult.primary) openFile(0);
        else doDrawingSearch();
      }
    });
    ['focus', 'click'].forEach(evt => inp.addEventListener(evt, () => {
      const cardEl = $('#file-list-card');
      if (cardEl) cardEl.classList.remove('card-glow');
      inp.classList.remove('dimmed');
      // Auto-show recent searches popover if no results are displayed
      if (!S.dwgResult) showRecentSearchedDrawings();
    }));
    setTimeout(() => inp.focus(), 50);
  }
}

let _shimmerTimer = null;
function showLoadingSkeleton(cardMode) {
  const list = $('#file-list');
  if (!list) return;
  // Delay shimmer so it doesn't flash for instant searches
  clearTimeout(_shimmerTimer);
  _shimmerTimer = setTimeout(() => _renderShimmer(list, cardMode), 150);
}
function cancelShimmer() { clearTimeout(_shimmerTimer); }
function _renderShimmer(list, cardMode) {
  if (cardMode) {
    // Card-shaped shimmer matching real drawing result card
    list.innerHTML = `<div style="padding:16px 18px">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px">
        <div class="shimmer-bar" style="width:180px;height:18px"></div>
        <div class="shimmer-bar" style="width:55px;height:12px"></div>
      </div>
      <div style="display:flex;gap:14px;margin-bottom:8px">
        <div class="shimmer-bar" style="width:70px;height:9px"></div>
        <div class="shimmer-bar" style="width:100px;height:9px"></div>
      </div>
      <div style="display:flex;gap:14px">
        <div class="shimmer-bar" style="width:60px;height:9px"></div>
        <div class="shimmer-bar" style="width:85px;height:9px"></div>
      </div>
      <div class="shimmer-bar" style="width:90px;height:8px;margin-top:12px;opacity:.5"></div>
    </div>`;
  } else {
    list.innerHTML = Array.from({length: 5}, (_, i) =>
      `<div class="shimmer-row" style="animation-delay:${i * 0.08}s">
        <div class="shimmer-bar" style="width:${40 + Math.random() * 30}%;height:12px"></div>
        <div style="flex:1"></div>
        <div class="shimmer-bar" style="width:30px;height:10px"></div>
      </div>`
    ).join('');
  }
}

function renderFiles() {
  const list = $('#file-list');
  // Reset flex for file list mode
  const listCard = $('#file-list-card');
  if (listCard) { listCard.style.flex = '1'; listCard.style.alignSelf = ''; }
  if (!S.files.length) { list.innerHTML = ''; return; }

  list.innerHTML = S.files.map((f, i) => {
    // Divider between subfolders and main files
    const prevFile = i > 0 ? S.files[i - 1] : null;
    const divider = (prevFile && (prevFile.section || prevFile.type === 'section-header') && !f.section && f.type !== 'section-header')
      ? '<div style="height:1px;margin:6px 14px;background:linear-gradient(90deg,transparent 5%,var(--text3) 30%,var(--text3) 70%,transparent 95%);opacity:.3"></div>'
      : '';

    // Section header for subfolder
    if (f.type === 'section-header') {
      const collapsed = S.collapsedSections[f.sectionName];
      const emptyClass = f.isEmpty ? ' empty' : '';
      const countLabel = f.isEmpty ? '(empty)' : `${f.fileCount} file${f.fileCount !== 1 ? 's' : ''}`;
      return divider + `<div class="section-header${emptyClass}" data-idx="${i}" data-section="${escHtml(f.sectionName)}">
        <span class="chevron${collapsed ? ' collapsed' : ''}">▼</span>
        <span>${escHtml(f.displayLabel || f.sectionName)}</span>
        <span class="section-count">${countLabel}</span>
      </div>`;
    }

    // Hide files in collapsed sections
    const hidden = f.section && S.collapsedSections[f.section] ? 'display:none;' : '';
    const subClass = f.section ? ' subfolder-file' : '';
    const is00 = S.currentLine === '00';

    // Badge color always matches extension; name color only for drawings
    const rawExt = f.ext.replace(']','').toUpperCase();
    const extLower = rawExt.toLowerCase();
    const badgeColor = (extLower === 'xls' || extLower === 'xlsx') ? '--xls'
      : (extLower === 'doc' || extLower === 'docx') ? '--doc'
      : (extLower === 'dwg' || extLower === 'dxf' || extLower === 'plt' || extLower === 'mvw') ? '--dwg'
      : extLower === 'pdf' ? '--pdf' : '--text2';
    const nameColor = f.isDrawing ? (f.tag === 'dwg' ? '--dwg' : f.tag === 'pdf' ? '--pdf' : f.tag === 'link' ? '--link' : '--text') : '--text';

    const warn = S.revWarnings[f.filepath];
    const warnClass = warn ? ' rev-outdated' : '';

    // Format display name
    let nameHtml;
    const isAck = f.section && f.section.toLowerCase() === 'acknowledgments';
    if (isAck) {
      const ackMatch = f.name.match(/^\d+-(\d{2})(\d{2})(\d{4})\s+(\d{2})-(\d{2})-\d{2}\.\w+$/);
      if (ackMatch) {
        const [, mm, dd, yyyy, hh, min] = ackMatch;
        nameHtml = `<span style="color:var(${nameColor})">${+mm}/${+dd}/${yyyy} (${+hh}:${min})</span>`;
      } else {
        nameHtml = `<span style="color:var(${nameColor})">${escHtml(f.name.replace(/\.[^.]+$/, ''))}</span>`;
      }
    } else if (f.displayName !== f.name && f.revDisplay) {
      nameHtml = `<span class="file-num" style="color:var(${nameColor})">${escHtml(f.displayName)}</span><span class="file-rev" style="color:var(${nameColor})"> ʀ${escHtml(f.revDisplay)}</span>`;
    } else if (f.displayName !== f.name) {
      nameHtml = `<span class="file-num" style="color:var(${nameColor})">${escHtml(f.displayName)}</span>`;
    } else {
      // Keep extension visible for obscure/technical file types
      const KEEP_EXT = ['U1','U2','U1A','U1P','U4','U5','UT','INI','FIL','DAT','DRS','BOM','BAT','LDF','LGA','HOL','CNT','QBP','NC','NT'];
      const showExt = KEEP_EXT.includes(rawExt);
      const displayStr = showExt ? f.name : f.name.replace(/\.[^.]+$/, '');
      nameHtml = `<span style="color:var(${nameColor})">${escHtml(displayStr)}</span>`;
    }

    const modStr = f.mtime ? timeAgo(new Date(f.mtime).getTime()) : '';
    const smallText = (is00 || f.section) && !isAck ? 'font-size:10.5px;' : '';

    return divider + `<div class="file-row${subClass}${warnClass} ${i === S.selected ? 'selected' : ''}" data-idx="${i}" data-name="${escHtml(f.name)}"
      style="${hidden}${smallText}animation-delay:${i * 0.02}s;--file-color:var(${badgeColor})">
      <span class="file-prefix" style="color:var(${nameColor})">${f.section ? '' : '\u00A0'}</span>
      <span class="file-name">${nameHtml}</span>
      ${rawExt ? `<span class="file-badge" style="color:var(${badgeColor});background:color-mix(in srgb,var(${badgeColor}) 12%,transparent);width:38px;text-align:center">${rawExt}</span>` : ''}
      ${modStr ? `<span style="font-size:9px;color:var(--text3);flex-shrink:0;width:38px;text-align:right">${modStr}</span>` : ''}
    </div>`;
  }).join('');

  // Event listeners
  list.querySelectorAll('.section-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const name = hdr.dataset.section;
      S.collapsedSections[name] = !S.collapsedSections[name];
      renderFiles();
    });
  });
  list.querySelectorAll('.file-row').forEach(row => {
    const idx = +row.dataset.idx;
    row.addEventListener('click', () => { if (S.files[idx]?.type !== 'section-header') selectFile(idx); });
    row.addEventListener('dblclick', () => { if (S.files[idx]?.type !== 'section-header') openFile(idx); });
    row.addEventListener('contextmenu', e => { if (S.files[idx]?.type !== 'section-header') showContextMenu(e, idx); });
  });
}

function toggleSection(name) {
  S.collapsedSections[name] = !S.collapsedSections[name];
  renderFiles();
}

function selectFile(idx) {
  S.selected = idx;
  $$('.file-row').forEach(r => r.classList.toggle('selected', +r.dataset.idx === idx));
  updateOpenBtn();
  // Recheck routeability when selecting files in drawing wildcard mode
  if (S.mode === 'drawings' && S.dwgResult && S.dwgResult.wildcard) checkRouteability();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(ts).toLocaleDateString();
}

// ═══════════════════════════════════════════════════════════════════════
//  Actions
// ═══════════════════════════════════════════════════════════════════════
async function doOrderSearch() {
  if (S.mode !== 'orders') return;  // Guard: don't run if mode changed
  S._lastSearchTs = Date.now();
  const raw = S.otpDigits.join('');
  if (raw.length < 8) return;
  const order = raw.slice(0, 6);
  const line = raw.slice(6, 8);
  const silent = S._silentRefresh;
  S._silentRefresh = false;
  if (!silent) {
    resetRouteState();
    S.revWarnings = {};
    S._checklistPath = null; S._checklistName = null;
    showRevBanner();
  }
  if (!silent) {
    setStatus('');
    showLoadingSkeleton();
    // Hide sibling lines during loading unless searching within same order
    if (order.padStart(6,'0') !== S.currentOrder) $('#sibling-lines').style.display = 'none';
  }
  let r;
  try {
    r = await window.api.searchOrder(order.padStart(6,'0'), line.padStart(2,'0'));
    if (S.mode !== 'orders') return;  // Mode changed during async search
    cancelShimmer(); setOffline(false);
  } catch (e) {
    if (S.mode !== 'orders') return;
    setOffline(true);
    S.files = []; renderFiles(); setStatus(''); setCount('');
    return;
  }
  if (!r.found) {
    S.files = []; S.cntFiles = []; S.currentFolder = null; S.currentOrder = null; S.currentLine = null;
    setStatus(''); setCount('');
    if (r.offline) {
      setOffline(true);
    } else {
      const orderPad = order.padStart(6,'0'), linePad = line.padStart(2,'0');
      let deepCancelled = false;
      // Show not-found message with deep search indicator
      const list = $('#file-list');
      if (list) list.innerHTML = `<div class="not-found-msg" style="text-align:center;gap:6px;padding:32px 16px">
        <div style="font:600 13px/1.4 'DM Sans',sans-serif;color:var(--danger);opacity:.8">Order not found</div>
        <div style="font:400 11px/1.3 'DM Sans',sans-serif;color:var(--text3)">${orderPad}-${linePad}</div>
        <div id="deep-search-status" style="font:400 10px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:12px;opacity:.7;display:flex;align-items:center;justify-content:center;gap:6px">
          <span class="deep-spinner"></span>Checking for misfiled archives\u2026
        </div>
      </div>`;
      // Show sibling line pills if other lines exist for this order
      const sibs = r.siblingLines || [];
      const container = $('#sibling-lines');
      const btns = $('#sibling-btns');
      if (sibs.length > 0) {
        container.style.display = 'block';
        $('#status-bar').style.display = 'none';
        btns.innerHTML = '<span style="font:600 9px/1 \'DM Sans\',sans-serif;color:var(--text2);letter-spacing:1px;margin-right:2px">LINES</span>' +
          sibs.map(l => {
            const label = l === '00' ? 'MAIN' : l;
            return `<button class="line-pill no-drag" data-line="${l}">${label}</button>`;
          }).join('');
        btns.querySelectorAll('.line-pill').forEach(btn => {
          btn.addEventListener('click', () => {
            deepCancelled = true;
            S._skipRecent = true;
            S.otpDigits = (orderPad + btn.dataset.line).split('');
            S.otpComplete = false;
            updateOtpDisplay();
            playClick();
            doOrderSearch();
          });
        });
      } else {
        container.style.display = 'none';
      }
      // Deep archive search in background
      (async () => {
        try {
          const deep = await window.api.deepSearchOrder(orderPad, linePad);
          if (deepCancelled || S.mode !== 'orders') return;
          if (deep.found) {
            // Found it! Re-run the full search (it'll now hit the fast path since resolveOrderFolder checks archive too)
            S.otpDigits = (orderPad + linePad).split('');
            S.otpComplete = false;
            updateOtpDisplay();
            doOrderSearch();
          } else {
            const ds = $('#deep-search-status');
            if (ds) ds.innerHTML = '<span style="opacity:.5">No misfiled copies found</span>';
          }
        } catch {
          const ds = $('#deep-search-status');
          if (ds) ds.innerHTML = '';
        }
      })();
    }
    updateCnt(); $('#section-label').textContent = ''; updateOpenBtn(); updateMarketing(order.padStart(6,'0'));
    // Highlight first digit to restart
    S.otpComplete = true; updateOtpDisplay();
    return;
  }
  const sameOrder = S.currentOrder === order.padStart(6,'0') && S.currentLine === line.padStart(2,'0');
  const prevSelectedName = sameOrder && S.selected >= 0 && S.files[S.selected] ? S.files[S.selected].name : null;
  const prevScroll = sameOrder ? ($('#file-list')?.scrollTop || 0) : 0;
  S.files = r.files; S.cntFiles = r.cntFiles; S.currentFolder = r.path; S.selected = -1;
  // Restore selection if refreshing the same order
  if (prevSelectedName) {
    const idx = r.files.findIndex(f => f.name === prevSelectedName);
    if (idx >= 0) S.selected = idx;
  }
  // Preload contingency database in background when a .cnt] file is present
  if (r.cntFiles.some(f => f.isCnt)) window.api.preloadContingency().catch(() => {});
  S.currentOrder = order.padStart(6,'0'); S.currentLine = line.padStart(2,'0');
  const prevCollapsed = sameOrder ? { ...S.collapsedSections } : {};
  S.collapsedSections = {};

  // Merge subfolders at the TOP of file list as collapsible sections
  const subs = r.subfolders || [];
  const subEntries = [];
  for (const sf of subs) {
    // Marketing expanded by default, others collapsed
    const defaultCollapsed = sf.nameLower === 'marketing' ? false : true;
    S.collapsedSections[sf.name] = sf.name in prevCollapsed ? prevCollapsed[sf.name] : defaultCollapsed;
    subEntries.push({ type: 'section-header', sectionName: sf.name, isEmpty: sf.isEmpty, isKnown: sf.isKnown, fileCount: sf.files.length });
    for (const f of sf.files) { f.section = sf.name; subEntries.push(f); }
  }
  S.files = [...subEntries, ...S.files];

  S.otpComplete = true; updateOtpDisplay();
  const realCount = S.files.filter(f => f.type !== 'section-header').length;
  S._fileCountText = `${realCount} file${realCount!==1?'s':''}`;
  setStatus(''); setCount(S._fileCountText);
  $('#section-label').textContent = '';
  updateCnt(); renderFiles(); updateOpenBtn();
  // Restore scroll position when refreshing the same order
  if (prevScroll) { const fl = $('#file-list'); if (fl) fl.scrollTop = prevScroll; }
  updateMarketing();

  // Load sibling lines
  updateSiblingLines();

  // Add to recent orders (skip if navigated via sibling pill)
  if (!S._skipRecent) {
    S.recentOrders = await window.api.addRecentOrder(order, line);
    renderSearchCard(); updateOtpDisplay();
  }
  S._skipRecent = false;

  // Async rev-checking
  const linkFiles = S.files.filter(f => f.isLink && f.isDrawing);
  if (linkFiles.length > 0) {
    const warnings = await window.api.checkRevisions(linkFiles);
    if (warnings.length > 0) {
      for (const w of warnings) S.revWarnings[w.filepath] = w;
      renderFiles();
    }
  }
  showRevBanner();
  // loadComments(); // Disabled for testing

  // Background check: is this order routeable?
  checkRouteability();
}

async function updateSiblingLines() {
  const container = $('#sibling-lines');
  const btns = $('#sibling-btns');
  if (!S.currentOrder || S.mode !== 'orders') {
    container.style.display = 'none'; return;
  }
  const lines = await window.api.getSiblingLines(S.currentOrder);
  if (lines.length <= 1) {
    container.style.display = 'none';
    $('#status-bar').style.display = '';
    return;
  }
  container.style.display = 'block';
  $('#status-bar').style.display = 'none';
  const countHtml = S._fileCountText ? `<span style="font:500 10px/1 'DM Sans',sans-serif;color:var(--text3);margin-left:auto">${S._fileCountText}</span>` : '';
  btns.innerHTML = '<span style="font:600 9px/1 \'DM Sans\',sans-serif;color:var(--text2);letter-spacing:1px;margin-right:2px">LINES</span>' +
    lines.map(l => {
      const isCurrent = l === S.currentLine;
      const label = l === '00' ? 'MAIN' : l;
      return `<button class="line-pill no-drag ${isCurrent ? 'current' : ''}" data-line="${l}">${label}</button>`;
    }).join('') + countHtml;
  btns.querySelectorAll('.line-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      S._skipRecent = true;
      S.otpDigits = (S.currentOrder + btn.dataset.line).split('');
      S.otpComplete = false;
      updateOtpDisplay();
      playClick();
      doOrderSearch();
    });
  });
}

function updateMarketing(orderOverride) {
  const btn = $('#btn-marketing');
  if (!btn) return;
  const order = orderOverride || S.currentOrder;
  if (!order || S.mode !== 'orders') {
    btn.disabled = true; btn.style.opacity = '.4'; S._checklistPath = null; return;
  }
  // If we already know the checklist state for this order, apply it
  if (S._checklistPath) { btn.disabled = false; btn.style.opacity = '1'; return; }
  // Otherwise keep grayed out and check in background
  btn.disabled = true; btn.style.opacity = '.4';
  window.api.findChecklist(order).then(r => {
    if (r.found) {
      S._checklistPath = r.filepath;
      S._checklistName = r.name;
      // Keep order available for checklist even if line not found
      if (!S.currentOrder) S._checklistOrder = order;
      btn.disabled = false; btn.style.opacity = '1';
    }
  }).catch(() => {});
}

async function doDrawingSearch() {
  const raw = $('#inp-dwg')?.value || '';
  let cleaned = raw.trim().replace(/[\s-]/g,'');
  const h = cleaned.indexOf('#'); if (h !== -1) cleaned = cleaned.slice(0, h);
  if (!cleaned) { setStatus('⚠  Enter a drawing number.'); return; }
  hideRecentDropdown();
  // Show searching state
  $('#main-area').style.display = 'flex';
  $('#status-bar').style.display = '';
  setStatus('');
  const isWildcard = /[*%_]/.test(cleaned);
  showLoadingSkeleton(!isWildcard);
  let r;
  try {
    r = await window.api.searchDrawing(cleaned);
    cancelShimmer(); setOffline(false);
  } catch (e) {
    setOffline(true);
    S.files = []; renderFiles(); setStatus(''); setCount('');
    $('#main-area').style.display = 'none';
    return;
  }
  if (!r.found) {
    S.dwgResult = null; S.currentFolder = null; S.files = []; S.selected = -1;
    setCount('');
    if (r.offline) {
      setOffline(true);
      $('#main-area').style.display = 'none';
    } else {
      // Show "no results" message inside the card instead of hiding everything
      $('#main-area').style.display = 'flex';
      $('#status-bar').style.display = 'none';
      const card = $('#file-list-card');
      if (card) { card.style.flex = '1'; card.style.alignSelf = 'flex-start'; card.style.minWidth = '0'; }
      const list = $('#file-list');
      if (list) {
        const dispNum = r.base || cleaned;
        const errMsg = r.error || `No files found for <b>${dispNum}</b>`;
        list.innerHTML = `<div style="padding:32px 24px;text-align:center;color:var(--text3)">
          <div style="font-size:28px;margin-bottom:10px;opacity:.5">&#128269;</div>
          <div style="font:600 13px/1.5 'DM Sans',sans-serif">${errMsg}</div>
          <div style="font:400 11px/1.6 'DM Sans',sans-serif;margin-top:6px;opacity:.65">Try a different number or use wildcards (* % _)</div>
        </div>`;
      }
    }
    updateOpenBtn(); return;
  }
  S.dwgResult = r;
  S.currentFolder = r.dir;
  S.cntFiles = [];
  if (r.wildcard) {
    // Wildcard mode: group by drawing number with collapsible older revisions
    S.collapsedSections = {};
    const groups = new Map();
    for (const f of r.files) {
      const key = f._baseNum || f.name;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(f);
    }
    const displayFiles = [];
    for (const [baseNum, files] of groups) {
      const newestRev = files[0]._rev;
      const newestFiles = files.filter(f => f._rev === newestRev);
      const olderFiles = files.filter(f => f._rev !== newestRev);
      displayFiles.push(...newestFiles);
      if (olderFiles.length) {
        const sectionName = `older-${baseNum}`;
        const uniqueRevs = [...new Set(olderFiles.map(f => f._rev))];
        displayFiles.push({
          type: 'section-header', sectionName,
          displayLabel: `${uniqueRevs.length} older rev${uniqueRevs.length !== 1 ? 's' : ''}`,
          fileCount: olderFiles.length, isEmpty: false,
        });
        olderFiles.forEach(f => { f.section = sectionName; });
        displayFiles.push(...olderFiles);
        S.collapsedSections[sectionName] = true;
      }
    }
    S.files = displayFiles; S.selected = -1;
    const realCount = displayFiles.filter(f => f.type !== 'section-header').length;
    setStatus(''); setCount(`${realCount} file${realCount!==1?'s':''}`);
    $('#section-label').textContent = '';
    renderFiles();
  } else {
    // Card mode: single drawing
    S.files = r.primary ? [r.primary] : [];
    S.selected = 0;
    setStatus(''); setCount('');
    $('#section-label').textContent = '';
    $('#status-bar').style.display = 'none';
    renderDrawingResult();
  }
  updateOpenBtn(); updateCnt();

  // Add to recent drawings
  S.recentDrawings = await window.api.addRecentDrawing(cleaned);
  checkRouteability();
}

function renderDrawingResult() {
  const card = $('#file-list');
  const cardParent = $('#file-list-card');
  if (!card) return;
  const r = S.dwgResult;
  if (!r) { card.innerHTML = ''; return; }
  // Auto-height for card mode (don't stretch vertically), keep full width for sidebar alignment
  if (cardParent) { cardParent.style.flex = '1'; cardParent.style.alignSelf = 'flex-start'; cardParent.style.minWidth = '0'; }

  const p = r.primary;
  const dispName = p.displayName || p.name;
  const rev = p.revDisplay || p._rev || '';
  const ext = p._ext || p.ext.replace(']','').toUpperCase();
  const loc = p.location || '';
  const owner = p.owner || '';
  const modified = p.mtime ? new Date(p.mtime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

  // Alt format button
  const altHtml = r.altFormat ? `<button class="dwg-alt-format no-drag" id="dwg-alt-btn" title="Open ${r.altFormat._ext} instead">${r.altFormat._ext}</button>` : '';

  // Other revs
  let revsHtml = '';
  if (r.otherRevs && r.otherRevs.length) {
    const ascending = [...r.otherRevs].reverse();
    revsHtml = `<div class="dwg-other-revs">
      <span class="dwg-result-label">OLDER REVS</span>
      ${ascending.map(rv => `<button class="rev-pill no-drag" data-fp="${escHtml(rv.filepath)}" title="${rv.name}">${rv.revDisplay || rv._rev}</button>`).join('')}
    </div>`;
  }

  // Warnings
  let alertHtml = '';
  if (r.crossWarning) alertHtml += `<div class="dwg-alert no-drag">⚠ ${escHtml(r.crossWarning)}</div>`;
  if (r.bakWarning) alertHtml += `<div class="dwg-alert no-drag">⚠ ${escHtml(r.bakWarning)}</div>`;

  card.innerHTML = `<div class="dwg-result">
    <div style="display:flex;align-items:baseline">
      <span class="dwg-result-num">${escHtml(dispName)}</span>
      <span class="dwg-result-rev">REV ${escHtml(rev)}</span>
      ${altHtml}
    </div>
    <div class="dwg-result-meta">
      <span><span class="dwg-result-label">FORMAT</span> ${ext}</span>
      <span><span class="dwg-result-label">LOCATION</span> ${loc}</span>
      ${owner ? `<span><span class="dwg-result-label">OWNER</span> ${escHtml(owner)}</span>` : ''}
      ${modified ? `<span><span class="dwg-result-label">MODIFIED</span> ${modified}</span>` : ''}
    </div>
    ${revsHtml}
    ${alertHtml}
    <div class="dwg-hint">Enter or double-click to open</div>
  </div>`;

  // Event: alt format
  const altBtn = $('#dwg-alt-btn');
  if (altBtn && r.altFormat) {
    altBtn.addEventListener('click', () => openFile(0, r.altFormat.filepath));
  }

  // Event: older rev pills
  card.querySelectorAll('.rev-pill').forEach(pill => {
    pill.addEventListener('click', () => openFile(0, pill.dataset.fp));
  });

  // Double-click card to open
  const resultDiv = card.querySelector('.dwg-result');
  if (resultDiv) {
    resultDiv.style.cursor = 'pointer';
    resultDiv.addEventListener('dblclick', () => openFile(0));
    resultDiv.addEventListener('contextmenu', e => showContextMenu(e, 0));
  }

  // Transfer glow from search input to card (card mode only)
  if (cardParent && !r.wildcard) {
    cardParent.classList.add('card-glow');
    const inp = $('#inp-dwg');
    if (inp) inp.classList.add('dimmed');
  }
}

function updateOpenBtn() {
  // (btn-open removed — no open button in sidebar)
  // Link button
  const f = S.files[S.selected];
  const canLink = f && (f.isDrawing || f.isLink);
  const linkBtn = $('#btn-link');
  if (linkBtn) { linkBtn.disabled = !canLink; linkBtn.style.opacity = canLink ? '1' : '.4'; }
  // DXF/PDF buttons — enable when a DWG is selected OR a drawing card is showing, AND AutoCAD is available
  const cardDwg = S.dwgResult && S.dwgResult.primary && S.dwgResult.primary.ext.replace(']','') === 'DWG';
  const hasDwg = (f && f.ext.replace(']','') === 'DWG') || cardDwg;
  const dxfBtn = $('#btn-dxf');
  if (dxfBtn) { dxfBtn.disabled = !hasDwg; dxfBtn.style.opacity = hasDwg ? '1' : '.4'; }
  const bomExtBtn = $('#btn-bom-extract');
  if (bomExtBtn && !bomExtBtn.querySelector('.deep-spinner')) {
    const bomOk = hasDwg && S._hasOda;
    bomExtBtn.disabled = !bomOk;
    bomExtBtn.style.opacity = bomOk ? '1' : '.4';
  }
  const pdfBtn = $('#btn-pdf');
  if (pdfBtn && !pdfBtn.querySelector('.deep-spinner')) {  // Skip if currently converting (spinner is showing)
    const pdfOk = hasDwg && S._hasAccore;
    pdfBtn.disabled = !pdfOk;
    pdfBtn.style.opacity = pdfOk ? '1' : '.3';
    if (!S._hasAccore) { pdfBtn.innerHTML = '<span style="font-size:9px;opacity:.7">&#128274;</span> PDF'; }
    else { pdfBtn.textContent = 'PDF'; }
  }
  // Folder button — enable when a folder is loaded
  const folderBtn = $('#btn-explorer');
  if (folderBtn) { folderBtn.disabled = !S.currentFolder; folderBtn.style.opacity = S.currentFolder ? '1' : '.4'; }
  const routeBtn = $('#btn-route');
  if (routeBtn && !routeBtn.classList.contains('route-ready') && !routeBtn.classList.contains('route-locked')) { routeBtn.disabled = true; routeBtn.style.opacity = '.4'; }
  // Resubmit button — enable for BOM or DRS files
  const resubBtn = $('#btn-resubmit');
  if (resubBtn) {
    const ext = f ? f.ext.replace(']','').toUpperCase() : '';
    const isBom = ext === 'BOM';
    const isDrs = ext === 'DRS';
    const canResubmit = isBom || isDrs;
    resubBtn.disabled = !canResubmit;
    resubBtn.style.opacity = canResubmit ? '1' : '.4';
    resubBtn.dataset.tip = isBom ? 'Upload BOM' : isDrs ? 'Resubmit DRS' : 'Resubmit';
  }
}

async function checkForUpdate() {
  if ($('.update-banner')) return;  // Already showing
  try {
    const latest = await window.api.checkUpdate();
    if (latest) {
      const bar = document.createElement('div');
      bar.className = 'update-banner no-drag';
      bar.innerHTML = `<span class="update-dot"></span><span style="padding-top:1px">v${escHtml(latest)} available</span><button class="no-drag update-btn-radar" id="btn-run-installer">Update</button>`;
      document.querySelector('.app').insertBefore(bar, $('#search-card-wrap'));
      $('#btn-run-installer').addEventListener('click', () => window.api.openInstaller());
    }
  } catch (e) {}
}

async function openFile(idx, explicitPath) {
  const fp = explicitPath || S.files[idx]?.filepath;
  if (!fp) return;
  // Show non-blocking spinner
  const spinner = document.createElement('div');
  spinner.className = 'open-spinner';
  spinner.textContent = 'Opening…';
  document.body.appendChild(spinner);
  // Fire and forget — don't await, so the UI stays responsive
  (async () => {
    try {
      const f = S.files[idx];
      if (f && f.isLink && !explicitPath) await window.api.openLink(f.filepath);
      else await window.api.openFile(fp);
      // Track recently opened drawings
      if (S.mode === 'drawings' && S.dwgResult && S.dwgResult.primary) {
        const p = S.dwgResult.primary;
        const dn = p.displayName || p.name;
        const q = $('#inp-dwg')?.value?.replace(/[\s-]/g, '') || dn;
        window.api.addRecentOpenedDrawing(dn, q);
      }
    } catch (e) {}
    spinner.remove();
  })();
}

function setStatus(t) {
  // Show status as a brief toast notification
  if (!t) return;
  let toast = $('#status-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'status-toast';
    toast.style.cssText = 'position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:var(--glass-strong);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:10px;padding:6px 16px;font:500 11px/1.4 \'DM Sans\',sans-serif;color:var(--text);z-index:40;pointer-events:none;opacity:0;transition:opacity .3s';
    document.body.appendChild(toast);
  }
  toast.textContent = t;
  toast.style.opacity = '1';
  toast.style.maxWidth = '340px';
  clearTimeout(toast._timer);
  // Longer messages get more time (base 4s + 1s per ~40 chars)
  const dur = Math.max(4000, Math.min(12000, 4000 + Math.floor(t.length / 40) * 1000));
  toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, dur);
}
function setOffline(show) {
  const el = $('#offline-banner');
  if (el) el.classList.toggle('show', show);
}
async function retryNetwork() {
  const btn = $('#retry-btn');
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  const ok = await window.api.checkNetwork();
  if (btn) { btn.textContent = 'Retry'; btn.disabled = false; }
  if (ok) {
    setOffline(false);
    // Re-run the last search
    if (S.mode === 'orders') doOrderSearch();
    else if (S.mode === 'drawings') doDrawingSearch();
  }
}
function setCount(t) { $('#status-count').textContent = t; }

function updateCnt() {
  const btn = $('#cnt-btn'), ident = $('#cnt-ident');
  if (S.cntFiles.length) {
    btn.className = 'side-btn cnt-btn active no-drag';
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.textContent = 'Contingency';
    ident.textContent = '';
  } else {
    btn.className = 'side-btn cnt-btn no-drag';
    btn.disabled = true;
    btn.style.opacity = '.4';
    btn.textContent = 'Contingency';
    ident.textContent = '';
  }
}

function showContextMenu(e, idx) {
  e.preventDefault(); selectFile(idx);
  const f = S.files[idx]; if (!f) return;
  const menu = $('#ctx-menu');
  const isDwg = ['DWG','DXF','PLT','BAK','MVW'].includes(f.ext.replace(']',''));
  let items = [];
  items.push({ label: 'Copy file', action: () => window.api.copyFileToClipboard(f.filepath) });
  if (S.currentFolder) items.push({ label: 'Paste file here', action: doPaste });
  items.push('sep');
  items.push({ label: 'Copy file path', action: async () => { const r = await window.api.copyText(f.filepath); setStatus(r.ok ? 'Path copied' : 'Copy failed'); } });
  if (f.isLink) items.push({ label: 'Copy source drawing', action: async () => {
    const target = await window.api.readLink(f.filepath);
    if (target) { window.api.copyFileToClipboard(target); setStatus('Source drawing copied'); }
    else setStatus('⚠  Could not read link target');
  }});
  if (f.displayName !== f.name) items.push({ label: 'Copy drawing number', action: async () => { const r = await window.api.copyText(f.displayName.replace(/-/g, '')); setStatus(r.ok ? 'Drawing number copied' : 'Copy failed'); } });
  if (isDwg) {
    items.push('sep');
    items.push({ label: 'Open in Viewer', action: () => window.api.openInViewer(f.filepath) });
    items.push({ label: 'Open in AutoCAD', action: async () => {
      const r = await window.api.openInAutocad(f.filepath);
      if (!r.ok) setStatus('⚠  ' + r.msg);
      else if (r.autoDetected) setStatus('AutoCAD found: ' + r.autoDetected);
    }});

  }
  menu.innerHTML = items.map(it => it === 'sep' ? '<div class="ctx-sep"></div>'
    : `<div class="ctx-item">${it.label}</div>`).join('');
  menu.querySelectorAll('.ctx-item').forEach((el, i) => {
    const it = items.filter(x => x !== 'sep')[i];
    el.addEventListener('click', () => { menu.style.display = 'none'; it.action(); });
  });
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 10) + 'px';
}
document.addEventListener('click', () => { $('#ctx-menu').style.display = 'none'; });

// Right-click on empty file list area
$('#file-list-card').addEventListener('contextmenu', e => {
  // Only trigger if not clicking on a file-row or section-header (those have their own handlers)
  if (e.target.closest('.file-row') || e.target.closest('.section-header')) return;
  if (S.mode !== 'orders') return;
  e.preventDefault();
  const menu = $('#ctx-menu');
  let items = [];
  const f = S.selected >= 0 ? S.files[S.selected] : null;
  items.push({ label: 'Copy file', action: () => { if (f) window.api.copyFileToClipboard(f.filepath); }, disabled: !f });
  if (S.currentFolder) items.push({ label: 'Paste file here', action: doPaste });
  menu.innerHTML = items.map(it =>
    `<div class="ctx-item${it.disabled ? ' disabled' : ''}">${it.label}</div>`
  ).join('');
  menu.querySelectorAll('.ctx-item').forEach((el, i) => {
    const it = items[i];
    if (!it.disabled) el.addEventListener('click', () => { menu.style.display = 'none'; it.action(); });
  });
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 10) + 'px';
});

async function doPaste() {
  if (!S.currentFolder) return;
  const r = await window.api.pasteFiles(S.currentFolder);
  if (r.ok) {
    setStatus(`Pasted ${r.copied} file${r.copied!==1?'s':''}${r.skipped ? `, skipped ${r.skipped}` : ''}`);
    if (S.mode === 'orders') doOrderSearch();
  } else { setStatus(`Warning: ${r.msg}`); }
}

async function applyTheme(t) {
  S.theme = t;
  let effective = t;
  if (t === 'auto') {
    const dark = await window.api.getSystemDark();
    effective = dark ? 'dark' : 'light';
  }
  if (effective === 'disco') {
    document.body.dataset.theme = 'disco';
    startDisco();
    const muteBtn = $('#btn-disco-mute');
    if (muteBtn) {
      muteBtn.style.display = '';
      muteBtn.classList.toggle('muted', !!S._discoMuted);
      muteBtn.textContent = '♫';
    }
  } else {
    document.body.dataset.theme = effective === 'tron' ? 'tron' : (effective === 'dark' ? 'dark' : 'light');
    stopDisco();
    const muteBtn = $('#btn-disco-mute');
    if (muteBtn) muteBtn.style.display = 'none';
  }
  window.api.saveConfig({ theme: t });
  // Re-render chat with new theme colors
  if (S.mode === 'chat') { lastChatCount = 0; pollChat(); }
}

//  🪩 DISCO ENGINE
// ═══════════════════════════════════════════════════════════════════════
let discoAudioCtx = null;
let discoAudioEl = null;  // Persists across theme switches for resume
let discoInterval = null;
let discoSparkleInterval = null;
let _discoAudioLoading = false;  // Prevent double loads

async function startDisco() {
  // Generate floor tiles
  const floor = document.getElementById('disco-floor');
  if (floor && !floor.children.length) {
    const colors = ['tileFlash1','tileFlash2','tileFlash3','tileFlash4','tileFlash5'];
    for (let i = 0; i < 80; i++) {
      const tile = document.createElement('div');
      tile.className = 'disco-tile';
      tile.style.left = (Math.random() * 100) + '%';
      tile.style.top = (Math.random() * 100) + '%';
      tile.style.animation = colors[i % 5] + ' ' + (0.5 + Math.random() * 1.5) + 's ease-in-out infinite';
      tile.style.animationDelay = (Math.random() * 2) + 's';
      floor.appendChild(tile);
    }
  }

  // Sparkles
  if (!discoSparkleInterval) {
    discoSparkleInterval = setInterval(() => {
      const overlay = document.getElementById('disco-overlay');
      if (!overlay) return;
      const sparkle = document.createElement('div');
      sparkle.className = 'disco-sparkle';
      sparkle.style.left = (Math.random() * 100) + '%';
      sparkle.style.top = (Math.random() * 70) + '%';
      sparkle.style.background = ['#ff1493','#00bfff','#ffd700','#00ff00','#8a2be2','#ff4500'][Math.floor(Math.random()*6)];
      sparkle.style.boxShadow = '0 0 6px ' + sparkle.style.background;
      overlay.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 2000);
    }, 100);
  }

  // 🎵 Resume or start audio (unless muted)
  if (!S._discoMuted) {
    const delay = S._hasPlayed ? 0 : 3800;
    setTimeout(() => { if (document.body.dataset.theme === 'disco' && !S._discoMuted) resumeOrStartDiscoAudio(); }, delay);
  }
}

function resumeOrStartDiscoAudio() {
  // If we have a paused audio element, just resume it
  if (discoAudioEl && discoAudioEl.paused) {
    discoAudioEl.play().catch(() => {});
    return;
  }
  // If already playing, don't start another
  if (discoAudioEl && !discoAudioEl.paused) return;
  if (discoAudioCtx) return;
  startDiscoAudio();
}

async function startDiscoAudio() {
  if (_discoAudioLoading) return;
  _discoAudioLoading = true;
  try {
    const song = await window.api.getDiscoSong();
    // Check we're still in disco mode (user might have switched away during load)
    if (document.body.dataset.theme !== 'disco' || S._discoMuted) { _discoAudioLoading = false; return; }
    if (song && song.dataUrl) {
      discoAudioEl = new Audio(song.dataUrl);
      discoAudioEl.loop = true;
      discoAudioEl.volume = 0.7;
      discoAudioEl.play().catch(() => {});
      _discoAudioLoading = false;
      return;
    }
  } catch (e) {}
  _discoAudioLoading = false;

  // Fall back to synthesized disco
  if (!discoAudioCtx) {
    try {
      discoAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      playDiscoMusic(discoAudioCtx);
    } catch(e) {}
  }
}

function stopDisco() {
  if (discoSparkleInterval) { clearInterval(discoSparkleInterval); discoSparkleInterval = null; }
  // Pause audio but keep the element alive so we can resume
  if (discoAudioCtx) { discoAudioCtx.close(); discoAudioCtx = null; }
  if (discoAudioEl) discoAudioEl.pause();  // Don't null it — keep for resume
  if (discoInterval) { clearInterval(discoInterval); discoInterval = null; }
  document.querySelectorAll('.disco-sparkle').forEach(s => s.remove());
}

function playDiscoMusic(ctx) {
  // Disco groove: 4-on-the-floor beat with funky bassline and hi-hats
  const bpm = 120;
  const beatLen = 60 / bpm;
  const barLen = beatLen * 4;
  let currentTime = ctx.currentTime + 0.1;

  function kick(time) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
    gain.gain.setValueAtTime(0.7, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
    osc.connect(gain).connect(ctx.destination);
    osc.start(time); osc.stop(time + 0.25);
  }

  function hihat(time, vol) {
    const bufSize = ctx.sampleRate * 0.05;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 7000;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol || 0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    src.connect(hp).connect(gain).connect(ctx.destination);
    src.start(time); src.stop(time + 0.06);
  }

  function bass(time, freq, dur) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, time);
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.setValueAtTime(600, time);
    lp.frequency.exponentialRampToValueAtTime(200, time + dur);
    gain.gain.setValueAtTime(0.25, time);
    gain.gain.setValueAtTime(0.25, time + dur - 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    osc.connect(lp).connect(gain).connect(ctx.destination);
    osc.start(time); osc.stop(time + dur);
  }

  function chord(time, freqs, dur) {
    freqs.forEach(f => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(f, time);
      gain.gain.setValueAtTime(0.06, time);
      gain.gain.setValueAtTime(0.06, time + dur - 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(time); osc.stop(time + dur);
    });
  }

  // Disco chord progression: Am - Dm - G - C (classic!)
  const chords = [
    [220, 261.63, 329.63],  // Am
    [293.66, 349.23, 440],  // Dm
    [196, 246.94, 293.66],  // G
    [261.63, 329.63, 392],  // C
  ];
  // Funky bass pattern per chord (root notes)
  const bassNotes = [110, 146.83, 98, 130.81];

  function scheduleBar(barStart, chordIdx) {
    const c = chords[chordIdx % 4];
    const bn = bassNotes[chordIdx % 4];

    // 4 on the floor kick
    for (let b = 0; b < 4; b++) {
      kick(barStart + b * beatLen);
    }
    // Offbeat hi-hats (classic disco!)
    for (let b = 0; b < 4; b++) {
      hihat(barStart + b * beatLen + beatLen/2, 0.12);
      // Ghost hi-hats on 16ths
      hihat(barStart + b * beatLen + beatLen/4, 0.05);
      hihat(barStart + b * beatLen + beatLen*3/4, 0.05);
    }
    // Funky bass: root octave pattern
    bass(barStart, bn, beatLen * 0.9);
    bass(barStart + beatLen, bn * 2, beatLen * 0.4);
    bass(barStart + beatLen * 1.5, bn, beatLen * 0.4);
    bass(barStart + beatLen * 2, bn * 2, beatLen * 0.9);
    bass(barStart + beatLen * 3, bn, beatLen * 0.4);
    bass(barStart + beatLen * 3.5, bn * 1.5, beatLen * 0.4);

    // Chord stabs on 2 and 4
    chord(barStart + beatLen, c, beatLen * 0.3);
    chord(barStart + beatLen * 3, c, beatLen * 0.3);
  }

  // Schedule 32 bars (about 64 seconds), then loop
  function scheduleLoop() {
    const loopBars = 32;
    const startT = ctx.currentTime + 0.1;
    for (let bar = 0; bar < loopBars; bar++) {
      scheduleBar(startT + bar * barLen, bar);
    }
    // Schedule next loop
    discoInterval = setTimeout(scheduleLoop, loopBars * barLen * 1000 - 500);
  }
  scheduleLoop();
}

// ═══════════════════════════════════════════════════════════════════════
//  💬 Chat Room
// ═══════════════════════════════════════════════════════════════════════
let chatPollTimer = null;
let lastChatCount = 0;

function fixName(raw) {
  if (!raw) return raw;
  // "Last, First - Company" → "First Last"
  const m = raw.match(/^([^,]+),\s*([^-]+?)(?:\s*-\s*.+)?$/);
  if (m) return m[2].trim() + ' ' + m[1].trim();
  // "First Last - Company" → "First Last"
  const m2 = raw.match(/^(.+?)\s*-\s*.+$/);
  if (m2) return m2[1].trim();
  return raw;
}

function getInitials(name) {
  const fixed = fixName(name);
  const parts = fixed.split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return (fixed[0] || '?').toUpperCase();
}

function isEmojiOnly(text) {
  const stripped = text.replace(/[\s\uFE0F\u200D]/g, '');
  if (!stripped) return false;
  const emojiRe = /(?:\p{Emoji_Presentation}|\p{Extended_Pictographic})/gu;
  const noEmoji = stripped.replace(emojiRe, '');
  return noEmoji.length === 0 && stripped.length <= 24;
}

// Chat colors — maximally spread across the hue wheel per theme
const CHAT_PALETTES = {
  dark:  ['#0a84ff','#ff6b6b','#00b894','#e17055','#a29bfe','#00cec9','#fdcb6e','#e84393','#2ecc71','#f39c12','#6c5ce7','#eb4d4b'],
  light: ['#0066cc','#d63031','#00856e','#c0392b','#6c5ce7','#00838f','#d4a017','#b83280','#1e8449','#ca6f1e','#4834d4','#c0392b'],
  tron:  ['#00dffc','#ff2070','#00ff90','#ff8c00','#bf40ff','#00ffe0','#ff4070','#40a0ff','#ccff00','#ff2098','#00ffa0','#ffc040'],
  disco: ['#ff1493','#00bfff','#ffd700','#00ff00','#ff4500','#8a2be2','#ff69b4','#00ffff','#ff6347','#7fff00','#da70d6','#40e0d0'],
};
function userColor(name) {
  const key = (name || '').toLowerCase().trim();
  let h = 0;
  for (let i = 0; i < key.length; i++) h = ((h << 5) - h + key.charCodeAt(i)) | 0;
  const palette = CHAT_PALETTES[S.theme] || CHAT_PALETTES.dark;
  return palette[Math.abs(h) % palette.length];
}

let _cachedUsername = null;
async function getCachedUsername() {
  if (!_cachedUsername) {
    const info = await window.api.getUserInfo();
    _cachedUsername = (info.username || '').toLowerCase();
  }
  return _cachedUsername;
}

function renderChatMessages(msgs) {
  const el = $('#chat-messages');
  const me = _cachedUsername || '';
  el.innerHTML = msgs.map(m => {
    const initials = getInitials(m.name || m.user || '?');
    const ago = timeAgo(m.ts);
    const color = userColor(m.name || m.user || '?');
    const bigEmoji = isEmojiOnly(m.text || '');
    const isMine = me && (m.user || '').toLowerCase() === me;
    return `<div class="chat-msg${isMine ? ' mine' : ''}">
      <div class="chat-avatar" style="background:${color};--user-color:${color}">${escHtml(initials)}</div>
      <div class="chat-bubble">
        <div class="chat-name" style="color:${color}">${escHtml(fixName(m.name || m.user))}</div>
        <div class="chat-text"${bigEmoji ? ' style="font-size:28px;line-height:1.2"' : ''}>${escHtml(m.text)}</div>
        <div class="chat-time">${ago}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

let _chatInitialized = false;

async function pollChat() {
  try {
    const msgs = await window.api.chatRead();
    if (msgs.length !== lastChatCount) {
      const hadMessages = lastChatCount > 0;
      const newMsgs = hadMessages ? msgs.slice(lastChatCount) : [];
      lastChatCount = msgs.length;
      renderChatMessages(msgs);

      // Notify for new messages from others (not on first load)
      if (_chatInitialized && newMsgs.length > 0) {
        const userInfo = await window.api.getUserInfo();
        const fromOthers = newMsgs.filter(m => (m.user || '').toLowerCase() !== (userInfo.username || '').toLowerCase());
        if (fromOthers.length > 0) {
          playChatBubble();
          const focused = await window.api.isWindowFocused();
          const onChatTab = S.mode === 'chat';
          if (!focused || !onChatTab) {
            const last = fromOthers[fromOthers.length - 1];
            const name = fixName(last.name || last.user);
            window.api.notifyChat('XylemView Pro', name + ': ' + last.text);
          }
        }
      }
      _chatInitialized = true;
    }
  } catch (e) {}
}

function startChatPoll(fast) {
  const interval = fast ? 2500 : 10000;  // 2.5s on chat tab, 10s background
  if (chatPollTimer) clearInterval(chatPollTimer);
  pollChat();
  chatPollTimer = setInterval(pollChat, interval);
}

function stopChatPoll() {
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
  lastChatCount = 0;
  _chatInitialized = false;
}

// ═══════════════════════════════════════════════════════════════════════
//  🔄 Rev Update
// ═══════════════════════════════════════════════════════════════════════
function showRevBanner() {
  const warns = Object.values(S.revWarnings);
  const banner = $('#rev-banner');
  if (warns.length > 0) {
    $('#rev-banner-text').textContent = `⚠ ${warns.length} drawing link${warns.length > 1 ? 's' : ''} outdated`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

async function doRevUpdate() {
  const warns = Object.values(S.revWarnings);
  if (!warns.length) return;
  const updates = warns.map(w => {
    // Build the new drawing filename with newest rev (use raw rev to preserve zero-padding)
    const oldName = w.name;
    const rev = w.rawNewestRev || w.newestRev;
    // Replace the revision in the filename
    let newName = oldName.replace(/r[0-9A-Za-z]+\.(dwg|dxf|plt|pdf)/i, `r${rev}.$1`);
    // Remove bracket wrapper for the actual filename
    if (newName.startsWith('[')) newName = newName.slice(1);
    if (newName.endsWith(']')) newName = newName.slice(0, -1);
    return { oldLinkPath: w.filepath, newDrawingName: newName };
  });
  setStatus('Updating links…');
  const results = await window.api.updateRevLinks(updates);
  const ok = results.filter(r => r.ok).length;
  const fail = results.filter(r => !r.ok).length;
  if (ok > 0) playChime();
  setStatus(`Updated ${ok} link${ok !== 1 ? 's' : ''}${fail ? `, ${fail} failed` : ''}`);
  // Track updated link names (with brackets) so we can highlight them after re-render
  const fixedNames = new Set(results.filter(r => r.ok).map(r => r.name));
  // Refresh
  S.revWarnings = {};
  showRevBanner();
  await doOrderSearch();
  // Apply green highlight to fixed rows, then fade out
  if (fixedNames.size) {
    $$('.file-row').forEach(row => {
      const fname = row.dataset.name;
      if (fname && fixedNames.has(fname)) {
        row.style.background = 'rgba(0,255,100,0.15)';
        row.style.transition = 'background 1.5s ease 1s';
        setTimeout(() => { row.style.background = ''; }, 50);
      }
    });
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  🔊 Sound Engine — synthesized audio via Web Audio API
// ═══════════════════════════════════════════════════════════════════════
let sfxCtx = null;
function getSfxCtx() {
  if (!sfxCtx) sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
  return sfxCtx;
}

function playStartupChime() {
  try {
    const ctx = getSfxCtx();
    const t = ctx.currentTime;
    const DUR = 5.5;

    // ── Sub-bass: C2 — felt more than heard, grounds the sound
    const subOsc = ctx.createOscillator();
    const subGain = ctx.createGain();
    subOsc.type = 'sine';
    subOsc.frequency.setValueAtTime(65.41, t);
    subGain.gain.setValueAtTime(0, t);
    subGain.gain.linearRampToValueAtTime(0.09, t + 0.8);
    subGain.gain.setValueAtTime(0.07, t + 3.0);
    subGain.gain.exponentialRampToValueAtTime(0.001, t + DUR);
    subOsc.connect(subGain).connect(ctx.destination);
    subOsc.start(t); subOsc.stop(t + DUR + 0.1);

    // ── Main chord: Cmaj9 (C3–E3–G3–B3–D4), each note blooms in sequence
    const notes = [130.81, 164.81, 196, 246.94, 293.66];
    notes.forEach((freq, i) => {
      const delay = i * 0.07;
      ['sine', 'triangle'].forEach((type, j) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq * (1 + j * 0.002), t + delay);
        osc.frequency.linearRampToValueAtTime(freq * (1 + j * 0.002) * 1.002, t + delay + 2.5);
        gain.gain.setValueAtTime(0, t + delay);
        gain.gain.linearRampToValueAtTime(type === 'sine' ? 0.11 : 0.04, t + delay + 0.5);
        gain.gain.setValueAtTime(type === 'sine' ? 0.09 : 0.035, t + delay + 2.5);
        gain.gain.exponentialRampToValueAtTime(0.001, t + DUR);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t + delay); osc.stop(t + DUR + 0.1);
      });
    });

    // ── High shimmer: C5–E5–G5–B5, drifting in — last notes overlap with splash fade

    document.head.appendChild(sheet);
  }

  // Rain faces (or emoji fallback) from the top of the screen!
  const duration = 6000;
  const endY = window.innerHeight + 80;
  const interval = setInterval(() => {
    const el = document.createElement('div');
    const size = 50 + Math.random() * 60;
    const rotation = -30 + Math.random() * 60;
    const fallTime = 2.5 + Math.random() * 2;
    if (preloaded.length) {
      const img = preloaded[Math.floor(Math.random() * preloaded.length)].cloneNode();
      img.style.cssText = `width:${size}px;height:auto;transform:rotate(${rotation}deg);`;

      el.textContent = '\uD83D\uDE0E';
      el.style.fontSize = size + 'px';
    }
    // Use JS animation instead of CSS transition to avoid pause-on-blur jump
    const startY = -(size + 20);
    const left = Math.random() * 90;
    el.style.cssText += `position:fixed;top:${startY}px;left:${left}%;z-index:9999;pointer-events:none;`;
    document.body.appendChild(el);
    const t0 = performance.now();
    function tick(now) {
      const p = Math.min((now - t0) / (fallTime * 1000), 1);
      el.style.top = (startY + (endY - startY) * p) + 'px';
      if (p >= 0.8) el.style.opacity = String(Math.max(0, 1 - (p - 0.8) / 0.2));
      if (p < 1) requestAnimationFrame(tick);
      else el.remove();
    }
    requestAnimationFrame(tick);
  }, 120);

      osc.connect(gain).connect(ctx.destination);
      osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.9);
    });
  } catch (e) {}
}

  const row = CONN_TABLE.find(r => r[0] >= size) || CONN_TABLE[CONN_TABLE.length - 1];
  return { setup: row[1], lo_bo: row[2], weld: row[3], grind: row[4], burn: row[5] };
}

function rtParseDXF(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const attribs = [];
  const texts = [];
  let i = 0;
  while (i < lines.length - 1) {
    const code = lines[i].trim();
    const val = lines[i + 1].trim();
    if (code === '0' && val === 'ATTRIB') {
      let attrValue = null, attrTag = null;
      let j = i + 2;
      while (j < lines.length - 1) {
        const c = lines[j].trim();
        const v = lines[j + 1].trim();
        if (c === '0') break;
        if (c === '1' && attrValue === null) attrValue = lines[j + 1].trimEnd();
        if (c === '2' && attrTag === null) {
          const lookback = lines.slice(Math.max(j - 4, 0), j + 1).join('\n');
          if (lookback.includes('AcDbAttribute')) attrTag = v;
        }
        j += 2;
      }
      if (attrTag) attribs.push({ tag: attrTag, value: (attrValue || '').trim() });
      i = j;
      continue;
    }
    if (code === '0' && val === 'TEXT') {
      let layer = '', textVal = '';
      let j = i + 2;
      while (j < lines.length - 1) {
        const c = lines[j].trim();
        const v = lines[j + 1].trim();
        if (c === '0') break;
        if (c === '1' && !textVal) textVal = lines[j + 1].trimEnd();
        if (c === '8') layer = v;
        j += 2;
      }
      if (textVal.trim()) texts.push({ layer, value: textVal.trim() });
      i = j;
      continue;
    }
    i += 2;
  }
  return { attribs, texts };
}

function rtExtractVariables(parsed) {
  const { attribs, texts } = parsed;
  const vars = {};
  const titleAttr = attribs.find(a => a.tag === 'TITLE');
  const mxpnAttr = attribs.find(a => a.tag === 'MXPN');
  const contractAttr = attribs.find(a => a.tag === 'CONTRACT');
  vars.title = titleAttr?.value || '';
  vars.mxpn = mxpnAttr?.value || '';
  vars.contract = contractAttr?.value || '';

  const titleUpper = vars.title.toUpperCase();
  if (titleUpper.includes('SHELL ASSY')) vars.type = 'shell';
  else if (titleUpper.includes('BUNDLE ASSY')) vars.type = 'bundle';
  else if (titleUpper.includes('EXCHANGER')) vars.type = 'setting';
  else vars.type = 'unknown';

  const mxpn = vars.mxpn;
  if (mxpn.length >= 13) {
    vars.nom_dia = parseInt(mxpn.substring(6, 8), 10);
    vars.nom_length = parseInt(mxpn.substring(9, 12), 10);
  }
  if (titleUpper.includes('QSU') || titleUpper.includes('QSUS') || titleUpper.includes('B300S')) {
    vars.unit_type = 'SU';
  } else if (titleUpper.includes('QWU') || titleUpper.includes('QWUS') || titleUpper.includes('B300W')) {
    vars.unit_type = 'WU';
  }
  if (vars.type === 'setting') {
    const passMatch = vars.title.match(/[-\u2013](\d)\s*['\u2018\u2019"]?\s*EXCHANGER/i);
    if (passMatch) vars.passes = parseInt(passMatch[1]);
  }
  if (!vars.passes) vars.passes = 2;

  const bomItems = [];
  let current = {};
  for (const a of attribs) {
    if (a.tag === 'ITEM') {
      if (current.ITEM) bomItems.push(current);
      current = { ITEM: a.value };
    } else if (['QTY', 'DESC', 'MATL', 'SPEC', 'PATT', 'PN'].includes(a.tag)) {
      current[a.tag] = a.value;
    }
  }
  if (current.ITEM) bomItems.push(current);
  vars.bom = bomItems;

  if (vars.type === 'shell') {
    vars.connections = [];
    vars.shell_material = 'STEEL';
    for (const item of bomItems) {
      const desc = (item.DESC || '').toUpperCase();
      const patt = item.PATT || '';
      const matl = (item.MATL || '').toUpperCase();
      const spec = (item.SPEC || '').toUpperCase();
      if (desc.includes('COUPLING') || desc.includes('NOZZLE')) {
        const sizeMatch = patt.match(/^([\d.]+)"/);
        if (sizeMatch) {
          const size = parseFloat(sizeMatch[1]);
          const qty = parseInt(item.QTY, 10) || 1;
          for (let q = 0; q < qty; q++) vars.connections.push(size);
        }
      }
      if (desc.includes('PIPE') && desc.includes('SHELL')) {
        if (spec.includes('316') || matl.includes('STAINLESS')) vars.shell_material = 'STAINLESS';
        const tkMatch = patt.match(/([\d.]+)\s*TK/i);
        if (tkMatch) vars.shell_wall = parseFloat(tkMatch[1]);
      }
    }
    vars.connections.sort((a, b) => b - a);
  }
  if (vars.type === 'bundle') {
    for (const item of bomItems) {
      const desc = (item.DESC || '').toUpperCase();
      const patt = item.PATT || '';
      const matl = (item.MATL || '').toUpperCase();
      if (desc.includes('U-TUBE') || desc.includes('SET OF')) {
        const odMatch = patt.match(/([\d.]+)\s*O\.?D/i);
        if (odMatch) vars.tube_od = parseFloat(odMatch[1]);
        const wallMatch = patt.match(/[xX\u00d7]\s*([\d.]+)\s*WALL/i);
        if (wallMatch) vars.tube_wall = parseFloat(wallMatch[1]);
        if (matl.includes('COPPER')) vars.tube_material = 'COPPER';
        else if (matl.includes('90/10') || matl.includes('CUNI')) vars.tube_material = '90/10';
        else if (matl.includes('STAINLESS') || matl.includes('316')) vars.tube_material = 'STAINLESS';
        else vars.tube_material = matl;
      }
    }
    vars.banding = false;
    vars.seal_weld = false;
    for (const t of texts) {
      if (t.value.toUpperCase().includes('BAND')) vars.banding = true;
      if (t.value.toUpperCase().includes('SEAL WELD') || t.value.toUpperCase().includes('SEAL-WELD')) vars.seal_weld = true;
    }
  }
  if (vars.type === 'setting') {
    vars.shell_pn = '';
    vars.bundle_pn = '';
    for (const item of bomItems) {
      const desc = (item.DESC || '').toUpperCase();
      if (desc.includes('SHELL')) vars.shell_pn = item.PN || '';
      if (desc.includes('BUNDLE')) vars.bundle_pn = item.PN || '';
    }
    for (const t of texts) {
      const wm = t.value.match(/WEIGHT\s*WET:\s*(\d+)\s*DRY:\s*(\d+)\s*BDL:\s*(\d+)/i);
      if (wm) {
        vars.weight_wet = parseInt(wm[1]);
        vars.weight_dry = parseInt(wm[2]);
        vars.weight_bdl = parseInt(wm[3]);
      }
    }
  }
  return vars;
}

function rtCalculateRouting(vars) {
  const dia = vars.nom_dia;
  const len = vars.nom_length;
  if (!dia || !len) return [];
  const lenFt = len / 12;
  const ops = [];

  if (vars.type === 'shell') {
    const conns = vars.connections || [];
    const numConns = conns.length;

    // Sum contributions from ALL connections
    let burnConns = 0, setupConns = 0, weldConns = 0, grindConns = 0;
    for (const size of conns) {
      const c = rtLookupConn(size);
      burnConns += c.burn;
      setupConns += c.setup;
      weldConns += c.weld;
      grindConns += c.grind;
    }

    const pipeEnds = rtLookupUnit(dia, 12) * 2;
    const lengthAddRate = numConns === 0 ? 0.0065 : numConns === 1 ? 0.0135 : 0.018;
    const burnTotal = pipeEnds + burnConns + lengthAddRate * lenFt + 0.175;
    ops.push({ wc: 116, op: 'BURN PIPE & HOLES PER DWG', run: burnTotal, setup: 0.16 });

    ops.push({ wc: 117, op: 'SETUP HEAD & FLANGE', run: rtLookupUnit(dia, 6), setup: 0 });
    ops.push({ wc: 104, op: 'WELD HEAD & FLANGE', run: rtLookupUnit(dia, 7), setup: 0.19 });

    const suPHT = rtLookupUnit(dia, 8);
    ops.push({ wc: 100, op: 'SETUP CONNECTIONS', run: setupConns + suPHT + 0.009 * numConns, setup: 0 });

    ops.push({ wc: 101, op: 'WELD CONNECTIONS', run: weldConns + rtLookupUnit(dia, 9), setup: 0 });

    ops.push({ wc: 102, op: 'GRIND COMPLETE', run: grindConns + rtLookupUnit(dia, 10) + rtLookupUnit(dia, 11), setup: 0 });

  } else if (vars.type === 'bundle') {
    const tubeOD = vars.tube_od || 0.75;
    const is38 = tubeOD < 0.5;
    const isSU = (vars.unit_type || 'SU') === 'SU';
    const passes = vars.passes || 2;
    const passCol = Math.min(Math.max(Math.floor(passes / 2), 1), 3);

    if (!is38 && tubeOD === 0.75 && (vars.tube_wall === 0.035 || !vars.tube_wall) && dia <= 20) {
      let colIdx = 0;
      for (let c = CUT_BEND_LENGTHS.length - 1; c >= 0; c--) {
        if (len <= CUT_BEND_LENGTHS[c]) colIdx = c;
      }
      const row = CUT_BEND_TABLE.find(r => r[0] >= dia) || CUT_BEND_TABLE[CUT_BEND_TABLE.length - 1];
      ops.push({ wc: 120, op: 'CUT & BEND TUBES', run: row[colIdx + 1], setup: 0 });
    }

    if (is38) {
      const tubeRow = TUBE_38_TABLE.find(r => r[0] >= dia) || TUBE_38_TABLE[TUBE_38_TABLE.length - 1];
      const tubes = tubeRow[passCol];
      const perTube = (vars.tube_material === 'STAINLESS') ? 0.0065 : 0.0054;
      const perTbLg = isSU ? 0.0023 : 0.0024;
      const perFtRate = isSU ? (dia < 10 ? 0.0318 : 0.0467) : (dia < 10 ? 0.0349 : 0.0514);
      const rate = 0.0816 + (perTube * tubes) + (0.0383 * 4) + (tubes * lenFt * perTbLg) + (perFtRate * lenFt);
      ops.push({ wc: 150, op: 'BUNDLE ASSEMBLY', run: rate, setup: 0 });
    } else {
      const tubes = rtLookupUnit(dia, passCol);
      const tierods = rtLookupUnit(dia, 4);
      const pht = rtLookupUnit(dia, 5) * lenFt;
      const perMatl = (vars.tube_material === 'STAINLESS') ? 0.0096 * tubes : 0.008 * tubes;
      const tbXft = isSU ? tubes * lenFt * 0.0023 : tubes * lenFt * 0.0025;
      ops.push({ wc: 150, op: 'BUNDLE ASSEMBLY', run: tierods * 0.0383 + pht + perMatl + tbXft + 0.0816, setup: 0 });
    }

  } else if (vars.type === 'setting') {
    let installBundle;
    if (dia <= 6) installBundle = 0.0107 * lenFt + 0.0674;
    else if (dia <= 18) installBundle = 0.0241 * lenFt + 0.0674;
    else installBundle = 0.0482 * lenFt + 0.1346;
    ops.push({ wc: 150, op: 'INSTALL BUNDLE', run: installBundle, setup: 0 });

    const testBase = rtLookupUnit(dia, 13);
    const testAdd = rtLookupUnit(dia, 14) * lenFt;
    ops.push({ wc: 160, op: 'HYDRO TEST', run: testBase + testAdd, setup: 0 });

    const actDia = rtLookupUnit(dia, 15);
    const paintBase = actDia * Math.PI * len * 0.0000343;
    const paintAdder = dia <= 10 ? 0.0701 : 0.0787;
    ops.push({ wc: 170, op: 'PAINT & SKID', run: paintBase + paintAdder + 0.30, setup: 0 });
  }
  return ops;
}

function gpheBaseDigits(input) {
  // Strip brackets, file extension, and revision suffix (rNN/RNN) to get just the drawing number
  let clean = input.replace(/^\[|\]$/g, '').replace(/\.\w+$/i, '').replace(/[rR]\d+$/, '');
  return clean.replace(/[^0-9]/g, '');
}

function isGpheDrawing(drawingNum) {
  const digits = gpheBaseDigits(drawingNum);
  if (digits.length < 12 || digits.length > 13) return false;
  const first2 = parseInt(digits.substring(0, 2));
  if (first2 < 54 || first2 > 55) return false;
  if (digits[4] !== '2') return false;
  // Verify model code exists in the GPHE calculator
  const nonConfig = parseInt(digits.substring(1, 4));
  if (GPHE_MODELS.find(r => r[1] === nonConfig)) return true;
  const asNonConfig = Math.floor(nonConfig/100)*100 + ((Math.floor(nonConfig/10)%10)+5)*10 + nonConfig%10;
  if (GPHE_MODELS.find(r => r[1] === asNonConfig)) return true;
  return false;
}

function gpheCalculateRouting(drawingNum) {
  const digits = gpheBaseDigits(drawingNum);
  if (!isGpheDrawing(drawingNum)) return null;

  const nonConfig = parseInt(digits.substring(1, 4));
  const pressureDigit = parseInt(digits[5]);
  const plates = digits.length >= 13 ? parseInt(digits.substring(6, 10)) : parseInt(digits.substring(6, 9));

  // Try non-config code first, then convert config→non-config (add 5 to tens digit)
  let modelRow = GPHE_MODELS.find(r => r[1] === nonConfig);
  if (!modelRow) {
    const asNonConfig = Math.floor(nonConfig/100)*100 + ((Math.floor(nonConfig/10)%10)+5)*10 + nonConfig%10;
    modelRow = GPHE_MODELS.find(r => r[1] === asNonConfig);
  }
  if (!modelRow) return null;

  const [model, , port, b150, b300, mawp150, mawp300,
    gskMin, paintMin, assyR, assyS, expLin,
    hangC, peenC, tigSC, namep, splash, drain, skid, flat] = modelRow;

  const pEntry = GPHE_PRESSURE.find(p => p[0] === pressureDigit) || [0, 0, 0];
  const psigHigh = pEntry[2];
  const bolts = (psigHigh > (mawp150 || 999) && b300 > 0) ? b300 : (b150 || b300);

  const m2h = v => v / 60;
  const ops = [];

  // Assemble frame
  if (assyR > 0) ops.push({ wc: 707, op: 'ASSEMBLE FRAME', run: m2h(assyR), setup: m2h(assyS) });

  // Hang plates
  if (hangC > 0 && plates > 0) {
    let hangSetup = 12.5;
    if (port >= 4 && port < 8) hangSetup = 1.25 * Math.max(10, 10 * plates / 100);
    else if (port >= 8) hangSetup = 1.25 * Math.max(15, 15 * plates / 100);
    if (port <= 3) hangSetup = 12.5;
    ops.push({ wc: 707, op: 'HANG PLATES', run: m2h(hangC * plates / 60), setup: m2h(hangSetup) });
  }

  // Peen bolts
  if (peenC > 0 && bolts > 0)
    ops.push({ wc: 707, op: 'PEEN BOLTS', run: m2h(1.25 * peenC * bolts), setup: 0 });

  // Tighten plate pack
  if (plates > 0 && bolts > 0) {
    let tigRun = 18.75;
    if (port >= 4 && port < 6) tigRun = 50;
    else if (port === 6) tigRun = 1.25 * (plates <= 200 ? 40 : 30 * plates / 100);
    else if (port >= 8 && port < 12) tigRun = 1.25 * (plates <= 150 ? 60 : 50 * plates / 100);
    else if (port >= 12) tigRun = 1.25 * (plates <= 150 ? 120 : 120 * plates / 100);

    let tigSetup = 1.25 * tigSC * bolts;
    if (port >= 6 && port < 8) tigSetup = 1.25 * (plates <= 200 ? 2 * bolts : 30);
    else if (port >= 8 && port <= 10) tigSetup = 1.25 * (plates <= 150 ? 30 : 50);
    else if (port === 12 && (model === 'P81' || model === 'P121')) tigSetup = 1.25 * (plates <= 150 ? 20 : 40);
    else if (port >= 12) tigSetup = 1.25 * (plates <= 150 ? 25 : 40);

    ops.push({ wc: 707, op: 'TIGHTEN PLATE PACK', run: m2h(tigRun), setup: m2h(tigSetup) });
  }

  // Hydro test
  if (plates > 0) {
    let testMins;
    if (port <= 3) testMins = 1.25 * ((0.3 * plates) + 40);
    else if (port === 4) testMins = 1.25 * (psigHigh <= 200 ? (0.36 * plates) + 36 : (0.36 * plates) + 60);
    else if (port >= 6 && port <= 10 && model !== 'P43') testMins = 1.25 * (psigHigh <= 200 ? (0.42 * plates) + 52 : (0.42 * plates) + 99);
    else if (model === 'P43') testMins = 1.25 * (psigHigh <= 200 ? (0.42 * plates) + 32 : (0.42 * plates) + 45);
    else testMins = 1.25 * (psigHigh <= 200 ? (0.45 * plates) + 70 : (0.42 * plates) + 90);
    ops.push({ wc: 707, op: 'HYDRO TEST', run: m2h(testMins), setup: 0 });
  }

  // Attach nameplate
  if (namep > 0) ops.push({ wc: 707, op: 'ATTACH NAMEPLATE', run: m2h(namep), setup: 0 });

  // Create splash shield
  if (splash > 0) ops.push({ wc: 707, op: 'CREATE SPLASH SHIELD', run: m2h(splash), setup: 0 });

  // Drain & prep
  if (drain > 0) ops.push({ wc: 707, op: 'DRAIN & PREP', run: m2h(drain), setup: 0 });

  // Package (skid for < 500 plates, flatbed otherwise)
  const pkgMins = plates < 500 ? skid : flat;
  if (pkgMins > 0) ops.push({ wc: 707, op: 'PACKAGE', run: m2h(pkgMins), setup: 0 });

  // Extra operations
  const extras = [];
  // Expand liners (certain models with large port sizes)
  if (expLin > 0) extras.push({ op: 'EXPAND LINERS', run: m2h(expLin) });
  // Machine carry bar (port 2.5, 3, or 4)
  if (port === 2.5 || port === 3 || port === 4) extras.push({ op: 'MACHINE CARRY BAR', run: 0.4 });
  // Machine guide bar (port 2.5, 3, or 4)
  if (port === 2.5 || port === 3 || port === 4) extras.push({ op: 'MACHINE GUIDE BAR', run: 0.25 });
  // Machine support column (P21, P22, P47)
  if (model === 'P21' || model === 'P22' || model === 'P47') extras.push({ op: 'MACHINE SUPPORT COLUMN', run: 0.25 });

  const platesPerHr = gskMin > 0 ? 60 / gskMin : 0;
  const platesPerHrStr = platesPerHr > 0 ? (platesPerHr % 1 === 0 ? String(platesPerHr) : platesPerHr.toFixed(1)) : '';

  return {
    model, plates, psigHigh, bolts, port,
    gasketing: gskMin > 0 ? { platesPerHr: platesPerHrStr, starterPlate: m2h(Math.min(gskMin * 4, 15)) } : null,
    extras,
    ops,
  };
}

function bpMatchModel(modNo, key) {
  if (key === 'ALL') return true;
  if (key === 'Large port') return modNo > 430;
  if (typeof key === 'number') return modNo === key;
  if (typeof key === 'string' && /^\d+X$/.test(key)) return Math.floor(modNo / 10) === parseInt(key.slice(0, -1));
  return false;
}

function bpLookupFlat(table, modNo) {
  for (const [model, val] of table) if (bpMatchModel(modNo, model)) return val;
  return null;
}

function bpLookupRange(table, modNo, plates) {
  for (const [model, min, max, total] of table) if (bpMatchModel(modNo, model) && plates >= min && plates <= max) return total;
  return null;
}

function bpLookupCompressRange(table, modType, modNo, plates) {
  for (const [type, model, min, max, total] of table) if (type === modType && bpMatchModel(modNo, model) && plates >= min && plates <= max) return total;
  return null;
}
