      }
      _modeState.orders = { files: S.files, cntFiles: S.cntFiles, selected: S.selected, currentFolder: S.currentFolder, currentOrder: S.currentOrder, currentLine: S.currentLine, otpDigits: [...S.otpDigits], otpComplete: S.otpComplete, revWarnings: { ...S.revWarnings }, collapsedSections: { ...S.collapsedSections }, _checklistPath: S._checklistPath, _checklistName: S._checklistName };
    } else if (S.mode === 'drawings') {
      _modeState.drawings = { files: S.files, selected: S.selected, currentFolder: S.currentFolder, dwgResult: S.dwgResult, collapsedSections: { ...S.collapsedSections } };
    } else if (S.mode === 'marketing') {
      _modeState.marketing = { mktDigits: [...S.mktDigits], mktComplete: S.mktComplete, mktResult: S.mktResult, mktOrder: S.mktOrder };

  }
  function restoreModeState(m) {
    const saved = _modeState[m];
    if (saved && m === 'orders') {
      Object.assign(S, { files: saved.files, cntFiles: saved.cntFiles, selected: saved.selected, currentFolder: saved.currentFolder, currentOrder: saved.currentOrder, currentLine: saved.currentLine, otpDigits: saved.otpDigits, otpComplete: saved.otpComplete, revWarnings: saved.revWarnings, collapsedSections: saved.collapsedSections, _checklistPath: saved._checklistPath, _checklistName: saved._checklistName });
      return true;
    } else if (saved && m === 'drawings') {
      Object.assign(S, { files: saved.files, selected: saved.selected, currentFolder: saved.currentFolder, dwgResult: saved.dwgResult, collapsedSections: saved.collapsedSections || {} });
      return true;
    } else if (saved && m === 'marketing') {
      Object.assign(S, { mktDigits: saved.mktDigits, mktComplete: saved.mktComplete, mktResult: saved.mktResult, mktOrder: saved.mktOrder });
      return true;
    }
    return false;
  }

              <span style="font-weight:600;color:var(--text2)">Parent item number</span>
              <input id="bom-parent" class="bom-input" value="" maxlength="15" style="font:500 13px/1.4 'IBM Plex Mono',monospace;padding:5px 8px;border-radius:8px;border:1px solid var(--glass-border);background:var(--bg2);color:var(--text);width:100%;box-sizing:border-box;text-transform:uppercase">
            </label>

                <th style="padding:4px 6px;width:35px">QTY</th>

                <th style="padding:4px 6px">MATL</th>

            <tbody>
              ${items.map((item, i) => {
                const isErr = errorSet.has(i);

                  <td style="padding:3px 6px;text-align:right">${item.qty}</td>
                  <td style="padding:3px 6px;white-space:nowrap">${item.pn}</td>
                  <td style="padding:3px 6px;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.desc}</td>

        <div style="padding:14px 24px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--glass-border);flex-shrink:0">
          <button class="btn-glass no-drag" id="bom-cancel" style="padding:7px 18px;font-size:11px">Cancel</button>
          <button class="btn-glass no-drag" id="bom-save" style="padding:7px 18px;font-size:11px">Save</button>
          <button class="btn-glass no-drag" id="bom-upload" style="padding:7px 18px;font-size:11px;font-weight:700;background:var(--accent);color:#fff;border-color:var(--accent)">Upload to BPCS</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#bom-cancel').addEventListener('click', () => overlay.remove());
    modalDismiss(overlay);

    // Auto-uppercase parent PN on input
    const parentInput = overlay.querySelector('#bom-parent');
    parentInput.addEventListener('input', () => { parentInput.value = parentInput.value.toUpperCase(); });

    // Auto-fill parent item number
    const dwgBase = (header.dwgno || drawingName).replace(/r\w+$/i, '').replace(/\.\w+$/i, '').replace(/[-\s]/g, '');
    if (dwgBase.startsWith('5') && S.mode === 'orders' && S.currentOrder && S.currentLine) {
      // Drawing starts with 5 + Orders tab → fetch %P/N from BPCS
      parentInput.value = 'Loading\u2026';
      parentInput.disabled = true;
      const saveBtn = overlay.querySelector('#bom-save');
      const uploadBtn = overlay.querySelector('#bom-upload');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.style.opacity = '.4'; }
      if (uploadBtn) { uploadBtn.disabled = true; uploadBtn.style.opacity = '.4'; }
      (async () => {
        try {
          const r = await window.api.bpcsGetItemNumber('LIVE', S.currentOrder, S.currentLine);
          parentInput.value = (r.ok && r.result) ? r.result.trim() : '';
        } catch { parentInput.value = ''; }
        parentInput.disabled = false;
        if (saveBtn) { saveBtn.disabled = false; saveBtn.style.opacity = ''; }
        if (uploadBtn) { uploadBtn.disabled = false; uploadBtn.style.opacity = ''; }
        if (!parentInput.value) parentInput.focus();
      })();
    } else if (!dwgBase.startsWith('5')) {
      // Non-5 drawing → parent is the drawing number itself
      parentInput.value = dwgBase.toUpperCase();
    } else {
      // Drawing starts with 5 but in Drawings tab → leave blank
      parentInput.value = '';
      parentInput.focus();
    }

    // Validate BOM fields — returns { order, lineItem, parentPn } or null
    function validateBomFields() {
      const parentEl = overlay.querySelector('#bom-parent');
      const parentPn = parentEl.value.trim().toUpperCase();
      const order = S.currentOrder || '';
      const lineItem = S.currentLine || '';
      if (!parentPn || parentPn.length < 5 || parentEl.disabled || /^LOADING/i.test(parentPn)) {
        parentEl.style.borderColor = 'var(--err,#f44)';
        if (!parentEl.disabled) parentEl.focus();
        return null;
      }
      return { order, lineItem, parentPn };
    }

    // Save handler — saves to Downloads only
    overlay.querySelector('#bom-save').addEventListener('click', async () => {
      const fields = validateBomFields();
      if (!fields) return;
      const saveBtn = overlay.querySelector('#bom-save');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving\u2026';
      const result = await window.api.saveBom({ ...fields, items, upload: false, model: header.model || '' });
      if (result.ok) {
        playChime();
        setStatus('\u2713 Saved to Downloads');
        overlay.remove();
      } else {
        playError();
        saveBtn.disabled = false; saveBtn.textContent = 'Save';
        setStatus(result.msg);
      }
    });

    // Upload handler — saves to Downloads then copies to BPCSupload
    overlay.querySelector('#bom-upload').addEventListener('click', async () => {
      const fields = validateBomFields();
      if (!fields) return;
      const uploadBtn = overlay.querySelector('#bom-upload');
      uploadBtn.disabled = true; uploadBtn.textContent = 'Checking\u2026';
      try {
        const pnChk = await window.api.bpcsCheckPnExists('LIVE', fields.parentPn);
        if (pnChk.ok && !pnChk.result) {
          playError();
          uploadBtn.disabled = false; uploadBtn.textContent = 'Upload to BPCS';
          setStatus(`Part number ${fields.parentPn} not found in BPCS`);
          return;
        }
        const bomChk = await window.api.bpcsCheckExistingBom('LIVE', fields.parentPn);
        if (bomChk.ok && bomChk.result > 0) {
          playError();
          uploadBtn.disabled = false; uploadBtn.textContent = 'Upload to BPCS';
          setStatus(`BOM already exists for ${fields.parentPn}`);
          return;
        }
      } catch (e) {}
      uploadBtn.textContent = 'Uploading\u2026';
      const result = await window.api.saveBom({ ...fields, items, upload: true, model: header.model || '' });
      if (result.ok) {
        playChime();
        setStatus('\u2713 ' + result.msg);
        overlay.remove();
      } else {
        playError();
        uploadBtn.disabled = false; uploadBtn.textContent = 'Upload to BPCS';
        setStatus(result.msg);
      }
    });
  }

  // Resubmit button
  $('#btn-resubmit').addEventListener('click', async () => {
    const f = S.files[S.selected];
    if (!f) return;
    const btn = $('#btn-resubmit');
    const origHtml = btn.innerHTML;
    btn.innerHTML = ''; btn.classList.add('converting'); btn.disabled = true;
    setStatus('Submitting…');
    const r = await window.api.resubmitFile(f.filepath);
    btn.classList.remove('converting'); btn.disabled = false;
    btn.innerHTML = origHtml;
    if (r.ok) {
      playChime();
      setStatus('✓ ' + r.msg);
    } else {
      playError();
      setStatus(r.msg);
    }
  });

  // Route button
  $('#btn-route').addEventListener('click', () => {
    if (S.mode === 'drawings') { runRoutingFlow(); return; }
    if (!S.currentFolder || S.mode !== 'orders') return;
    runRoutingFlow();
  });
  $('#btn-route').addEventListener('mouseenter', () => {
    const btn = $('#btn-route');
    if (!btn.classList.contains('route-ready')) return;
    startRouteHum();
    // Add the charging glow ring
    if (!btn.querySelector('.route-charge-ring')) {
      const ring = document.createElement('div');
      ring.className = 'route-charge-ring';
      btn.appendChild(ring);
      requestAnimationFrame(() => ring.classList.add('active'));
      // When the fill animation finishes, switch to the charged pulse
      ring.addEventListener('animationend', () => {
        if (ring.parentNode) ring.classList.add('charged');
      });

  });
  $('#btn-route').addEventListener('mouseleave', () => {
    stopRouteHum();
    const ring = $('#btn-route').querySelector('.route-charge-ring');
    if (ring) { ring.classList.remove('active'); setTimeout(() => ring.remove(), 250); }
  });
  $('#btn-route').addEventListener('click', () => {
    stopRouteHum();
    const ring = $('#btn-route').querySelector('.route-charge-ring');
    if (ring) ring.remove();
  });

  // Auto-update check — on launch and every 30 minutes
  checkForUpdate();
  setInterval(checkForUpdate, 30 * 60 * 1000);

  // Weather (non-blocking, cosmetic only)
  const WX_ICONS = {0:'\u2600\uFE0F',1:'\uD83C\uDF24\uFE0F',2:'\u26C5',3:'\u2601\uFE0F',45:'\uD83C\uDF2B\uFE0F',48:'\uD83C\uDF2B\uFE0F',51:'\uD83C\uDF26\uFE0F',53:'\uD83C\uDF27\uFE0F',55:'\uD83C\uDF27\uFE0F',56:'\uD83C\uDF28\uFE0F',57:'\uD83C\uDF28\uFE0F',61:'\uD83C\uDF26\uFE0F',63:'\uD83C\uDF27\uFE0F',65:'\uD83C\uDF27\uFE0F',66:'\uD83C\uDF28\uFE0F',67:'\uD83C\uDF28\uFE0F',71:'\uD83C\uDF28\uFE0F',73:'\u2744\uFE0F',75:'\u2744\uFE0F',77:'\u2744\uFE0F',80:'\uD83C\uDF26\uFE0F',81:'\uD83C\uDF27\uFE0F',82:'\uD83C\uDF27\uFE0F',85:'\uD83C\uDF28\uFE0F',86:'\uD83C\uDF28\uFE0F',95:'\u26C8\uFE0F',96:'\u26C8\uFE0F',99:'\u26C8\uFE0F'};
  const WX_NIGHT = {0:'\uD83C\uDF19',1:'\uD83C\uDF19',2:'\u2601\uFE0F'};
  const WX_DEFAULT = { lat: 42.9225, lon: -78.7517, name: 'Cheektowaga' };
  let _wxLoc = S.config.weather_location || WX_DEFAULT;

  async function fetchWeather() {
    try {
      const loc = _wxLoc;
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weather_code,is_day&hourly=precipitation_probability,weather_code&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`);
      const d = await r.json();
      const temp = Math.round(d.current.temperature_2m);
      const code = d.current.weather_code;
      const isNight = !d.current.is_day;
      const icon = (isNight && WX_NIGHT[code]) || WX_ICONS[code] || '\uD83C\uDF24\uFE0F';
      let rainTip = '';
      if (d.hourly && d.hourly.time) {
        const nowH = new Date().getHours();
        const times = d.hourly.time;
        const probs = d.hourly.precipitation_probability;
        const codes = d.hourly.weather_code;
        for (let i = 0; i < times.length; i++) {
          const hr = parseInt(times[i].split('T')[1]);
          if (hr <= nowH) continue;
          const isRainCode = (codes[i] >= 51 && codes[i] <= 67) || (codes[i] >= 80 && codes[i] <= 82) || (codes[i] >= 95);
          const isSnowCode = (codes[i] >= 71 && codes[i] <= 86);
          if (probs[i] >= 40 || isRainCode || isSnowCode) {
            const precType = isSnowCode ? 'snow' : 'rain';
            const suffix = hr >= 12 ? 'pm' : 'am';
            const hr12 = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
            rainTip = ` \u2022 ${probs[i]}% chance of ${precType} by ${hr12}${suffix}`;
            break;
          }
        }
        if (!rainTip) rainTip = ' \u2022 No rain today';
      }
      const el = $('#weather');
      if (el) {
        $('#weather-icon').textContent = icon;
        $('#weather-temp').textContent = temp + '\u00B0';
        el.style.display = 'flex';
        requestAnimationFrame(() => { el.style.opacity = '1'; });
        el.setAttribute('data-tip', temp + '\u00B0F in ' + loc.name + rainTip);
      }
    } catch {}
  }

  function showWeatherModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal glass-strong" style="color:var(--text);width:300px;padding:20px"></div>`;
    const modal = overlay.querySelector('.modal');
    modal.innerHTML = `
      <div style="font:700 14px/1.3 'DM Sans',sans-serif;margin-bottom:12px">Weather location</div>
      <div style="font:500 10px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-bottom:12px">Current: ${escHtml(_wxLoc.name)}</div>
      <input id="wx-search" class="field-input no-drag" placeholder="City name..." style="width:100%;padding:8px 12px;font-size:12px;margin-bottom:8px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-family:'DM Sans',sans-serif">
      <div id="wx-results" style="max-height:120px;overflow-y:auto;margin-bottom:10px"></div>
      <div style="display:flex;gap:6px">
        <button class="btn-glass no-drag" id="wx-detect" style="flex:1;font-size:10px;padding:7px 0">Detect my location</button>
        <button class="btn-glass no-drag" id="wx-reset" style="font-size:10px;padding:7px 10px;color:var(--text3)">Reset</button>
      </div>
      <div id="wx-status" style="font:500 9px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:8px;min-height:14px;text-align:center"></div>`;
    document.body.appendChild(overlay);
    modalDismiss(overlay);

    const inp = modal.querySelector('#wx-search');
    const resultsEl = modal.querySelector('#wx-results');
    const statusEl = modal.querySelector('#wx-status');
    let searchTimer = null;

    function selectLocation(lat, lon, name) {
      _wxLoc = { lat, lon, name };
      S.config.weather_location = _wxLoc;
      window.api.saveConfig(S.config);
      fetchWeather();
      overlay.remove();
    }

    inp.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = inp.value.trim();
      if (q.length < 2) { resultsEl.innerHTML = ''; return; }
      searchTimer = setTimeout(async () => {
        try {
          const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
          const d = await r.json();
          if (!d.results || !d.results.length) { resultsEl.innerHTML = '<div style="font:500 10px/1.4 \'DM Sans\',sans-serif;color:var(--text3);padding:4px">No results</div>'; return; }
          resultsEl.innerHTML = d.results.map(r => {
            const parts = [r.name];
            if (r.admin1) parts.push(r.admin1);
            if (r.country && r.country !== 'United States') parts.push(r.country);
            return `<div class="wx-result no-drag" data-lat="${r.latitude}" data-lon="${r.longitude}" data-name="${escHtml(r.name)}" style="padding:6px 8px;font:500 11px/1.3 'DM Sans',sans-serif;color:var(--text);cursor:pointer;border-radius:6px;transition:background .15s;-webkit-app-region:no-drag">${escHtml(parts.join(', '))}</div>`;
          }).join('');
          resultsEl.querySelectorAll('.wx-result').forEach(el => {
            el.addEventListener('mouseenter', () => { el.style.background = 'var(--row-hover)'; });
            el.addEventListener('mouseleave', () => { el.style.background = ''; });
            el.addEventListener('click', () => {
              selectLocation(parseFloat(el.dataset.lat), parseFloat(el.dataset.lon), el.dataset.name);
            });
          });
        } catch { resultsEl.innerHTML = '<div style="font:500 10px/1.4 \'DM Sans\',sans-serif;color:var(--text3);padding:4px">Search failed</div>'; }
      }, 400);
    });

    modal.querySelector('#wx-detect').addEventListener('click', () => {
      statusEl.textContent = 'Detecting...';
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=&count=1&language=en&format=json`);
            // Reverse geocode isn't available in open-meteo, so use a nearby city search
            // Instead, just use the coords and label them
            const lat = pos.coords.latitude.toFixed(4);
            const lon = pos.coords.longitude.toFixed(4);
            // Try reverse lookup via nominatim
            const nr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`);
            const nd = await nr.json();
            const name = nd.address?.city || nd.address?.town || nd.address?.village || nd.address?.county || 'My location';
            selectLocation(parseFloat(lat), parseFloat(lon), name);
          } catch {
            selectLocation(pos.coords.latitude, pos.coords.longitude, 'My location');
          }
        },
        () => { statusEl.textContent = 'Location access denied'; },
        { timeout: 10000 }
      );
    });

    modal.querySelector('#wx-reset').addEventListener('click', () => {
      selectLocation(WX_DEFAULT.lat, WX_DEFAULT.lon, WX_DEFAULT.name);
    });

    requestAnimationFrame(() => inp.focus());
  }

  $('#weather').addEventListener('click', showWeatherModal);
  fetchWeather();
  setInterval(fetchWeather, 20 * 60 * 1000);

  // Theme popover
  // Theme popover — click to open, auto-fade on leave
  let _themeHideTimer = null;
  function showThemePop() {
    clearTimeout(_themeHideTimer);
    const pop = $('#theme-popover');
    const btn = $('#btn-theme');
    const rect = btn.getBoundingClientRect();
    btn.removeAttribute('data-tip');
    pop.style.display = 'block';
    pop.style.top = (rect.bottom + 8) + 'px';
    pop.style.right = (window.innerWidth - rect.right) + 'px';
    pop.style.bottom = 'auto';
    pop.style.left = 'auto';
    requestAnimationFrame(() => { pop.classList.add('open'); themeSeg.activate(S.theme); });
  }
  function hideThemePop(delay) {
    clearTimeout(_themeHideTimer);
    _themeHideTimer = setTimeout(() => {
      const pop = $('#theme-popover');
      pop.classList.remove('open');
      $('#btn-theme').setAttribute('data-tip', 'Theme');
      setTimeout(() => { if (!pop.classList.contains('open')) pop.style.display = 'none'; }, 200);
    }, delay || 0);
  }
  $('#btn-theme').addEventListener('click', (e) => {
    e.stopPropagation();
    const pop = $('#theme-popover');
    if (pop.classList.contains('open')) hideThemePop(0);
    else showThemePop();
  });
  // Keep open while cursor is on either the button or the popover
  $('#btn-theme').addEventListener('mouseenter', () => clearTimeout(_themeHideTimer));
  $('#btn-theme').addEventListener('mouseleave', () => { if ($('#theme-popover').classList.contains('open')) hideThemePop(1000); });
  $('#theme-popover').addEventListener('mouseenter', () => clearTimeout(_themeHideTimer));
  $('#theme-popover').addEventListener('mouseleave', () => hideThemePop(1000));
  // Suppress system context menu everywhere
  window.addEventListener('contextmenu', (e) => { e.preventDefault(); }, true);

  // Close popover on outside click
  document.addEventListener('click', (e) => {
    const pop = $('#theme-popover');
    if (pop && pop.classList.contains('open') && !pop.contains(e.target) && !e.target.closest('#btn-theme')) {
      hideThemePop(0);
    }
  });

  // Contingency
  $('#cnt-btn').addEventListener('click', async () => {
    // If there's a PDF contingency in the folder, preview it in-app
    const pdfCnt = S.cntFiles.find(cf => cf.ext !== 'CNT]');
    if (pdfCnt) {
      await window.api.previewPdf(pdfCnt.filepath, `Contingency — ${S.currentOrder || ''}`);
      return;
    }
    // Otherwise use the built-in database viewer — show spinner on button
    if (S.currentOrder && S.currentLine) {
      const btn = $('#cnt-btn');
      const origText = btn.textContent;
      btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
      btn.disabled = true;
      try {
        await showContingencyViewer(S.currentOrder + S.currentLine);
      } finally {
        btn.textContent = origText;
        btn.disabled = false;
      }
    }
  });

  // Open button (if present)
  const openBtn = $('#btn-open');
  if (openBtn) openBtn.addEventListener('click', () => {
    if (S.selected >= 0 && S.files[S.selected]) openFile(S.selected);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    // Block F11 fullscreen
    if (e.key === 'F11') { e.preventDefault(); return; }
    // Dev: Ctrl+Shift+B → BPCS connection test
    if (e.ctrlKey && e.shiftKey && e.key === 'B' && S._isDev) { e.preventDefault(); showBpcsTest(); return; }
    // Dev: Ctrl+Shift+W → Win10 preview toggle
    if (e.ctrlKey && e.shiftKey && e.key === 'W' && S._isDev) { e.preventDefault(); S._win10Preview = !S._win10Preview; document.body.classList.toggle('win10', S._win10Preview || S._isWin10); window.api.setGlassMode(!S._win10Preview); setStatus(S._win10Preview ? '\u{1F5A5}  Win10 preview ON' : '\u{1F5A5}  Win10 preview OFF'); return; }
    // Konami code check
    const konamiConsumed = checkKonami(e.key);
    if (e.key === 'Escape') { $('#ctx-menu').style.display = 'none'; }
    // Close theme popover on any key press
    if ($('#theme-popover')?.classList.contains('open')) hideThemePop(0);
    // Ctrl+C: copy selected file (skip if user has text selected in an input)
    const activeEl = document.activeElement;
    const hasTextSelection = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA') && activeEl.selectionStart !== activeEl.selectionEnd;
    if (e.ctrlKey && e.key === 'c' && !e.shiftKey && !e.altKey && !hasTextSelection && S.selected >= 0 && S.files[S.selected]?.filepath) {
      e.preventDefault();
      window.api.copyFileToClipboard(S.files[S.selected].filepath);
      return;
    }
    // Ctrl+V: paste files into current folder
    if (e.ctrlKey && e.key === 'v' && !e.shiftKey && !e.altKey && S.mode === 'orders' && S.currentFolder && !_onInput) {
      e.preventDefault();
      doPaste();
      return;
    }
    // O/D/M/C to switch modes (when not typing in a field — except the drawing search field — and not holding Shift)
    const _hasModal = !!$('.modal-overlay');
    const _activeEl = document.activeElement;
    const _onInput = (_activeEl?.tagName === 'INPUT' || _activeEl?.tagName === 'TEXTAREA') && _activeEl?.id !== 'inp-dwg';
    if (!e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey && !_hasModal && !_onInput) {
      const modeKey = { h: 'dashboard', o: 'orders', d: 'drawings', c: 'marketing', m: 'chat' }[e.key.toLowerCase()];
      if (modeKey && modeKey !== S.mode) {
        e.preventDefault();
        modeSeg.activate(modeKey);
        $('#mode-seg button[data-val="' + modeKey + '"]').click();
        return;
      }
    }
    // Tab / Shift+Tab to cycle tabs
    if (e.key === 'Tab') {
      e.preventDefault();
      const modes = ['orders','drawings','marketing','chat','dashboard'];
      const cur = modes.indexOf(S.mode);
      const next = modes[(cur + (e.shiftKey ? modes.length - 1 : 1)) % modes.length];
      modeSeg.activate(next);
      $('#mode-seg button[data-val="' + next + '"]').click();
      return;
    }
    // Ctrl+Q: quit app (bypasses minimize-to-tray)
    if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'q') {
      e.preventDefault();
      window.api.quitApp();
      return;
    }
    // Esc or Ctrl+Backspace: clear everything in current search mode
    // (Esc only if not in a text field and no context menu open)
    const escClear = e.key === 'Escape' && $('#ctx-menu').style.display === 'none' && (!_onInput || _activeEl?.id === 'inp-dwg');
    if (escClear || (e.ctrlKey && e.key === 'Backspace')) {
      e.preventDefault();
      if (S.mode === 'orders') {
        S.otpDigits = []; S.otpComplete = false; S.files = []; S.selected = -1;
        renderFiles(); setStatus(''); setCount(''); updateOtpDisplay();
      } else if (S.mode === 'drawings') {
        const inp = $('#inp-dwg');
        if (inp) { inp.value = ''; inp.dispatchEvent(new Event('input')); inp.blur(); }
        S.dwgResult = null; S.files = []; S.selected = -1;
        renderDrawingResult(); hideBpcsHistory(); resetRouteState();
      } else if (S.mode === 'marketing') {
        S.mktDigits = []; S.mktComplete = false; S.mktResult = null; S.mktOrder = null;
        renderMarketingContainer();
      }
      return;
    }
    // Enter key: open selected file if a search is loaded and not typing in an input
    if (e.key === 'Enter' && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
      if (S.mode === 'orders' && S.otpComplete && S.selected >= 0 && S.files[S.selected]) {
        e.preventDefault();
        openFile(S.selected);
      } else if (S.mode === 'drawings' && S.dwgResult && S.dwgResult.primary) {
        e.preventDefault();
        openFile(0);
      }
    }
    // Arrow keys navigate file list (orders mode only)
    if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && S.mode === 'orders' && S.files.length && document.activeElement?.tagName !== 'INPUT') {
      e.preventDefault();
      const dir = e.key === 'ArrowDown' ? 1 : -1;
      let next = S.selected;
      do { next += dir; } while (
        next >= 0 && next < S.files.length &&
        (S.files[next].type === 'section-header' || (S.files[next].section && S.collapsedSections[S.files[next].section]))
      );
      if (next >= 0 && next < S.files.length && S.files[next].type !== 'section-header') {
        selectFile(next);
        const el = document.querySelector(`[data-idx="${next}"]`);
        if (el) el.scrollIntoView({ block: 'nearest' });
      }
    }
    // Global typing → OTP (orders) or auto-focus (drawings)
    const hasModal = !!$('.modal-overlay');
    const onInput = document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA';
    if (!e.ctrlKey && !e.metaKey && !e.altKey && !hasModal && !onInput) {
      if (S.mode === 'orders') {
        if (/^[0-9]$/.test(e.key)) {
          e.preventDefault();
          if (S.otpComplete || S.otpDigits.length >= 8) { S.otpDigits = []; S.otpComplete = false; }
          S.otpDigits.push(e.key);
          updateOtpDisplay();
          if (S.otpDigits.length === 8) setTimeout(doOrderSearch, 50);
        } else if (e.key === 'Backspace') {
          e.preventDefault();
          if (e.ctrlKey || S.otpComplete) { S.otpDigits = []; S.otpComplete = false; S.files = []; S.selected = -1; renderFiles(); setStatus(''); setCount(''); }
          else S.otpDigits.pop();
          updateOtpDisplay();
        } else if (e.key === 'Enter' && S.otpDigits.length > 0 && !S.otpComplete) {
          if (S.otpDigits.length < 6) {
            // Not enough digits — flash the next empty box red
            const boxes = $$('#otp-order .otp-box');
            const nextBox = boxes[S.otpDigits.length];
            if (nextBox) {
              nextBox.style.borderColor = 'var(--danger)';
              nextBox.style.boxShadow = '0 0 0 3px rgba(255,69,58,0.3)';
              setTimeout(() => { nextBox.style.borderColor = ''; nextBox.style.boxShadow = ''; }, 800);
            }
          } else if (S.otpDigits.length === 6) {
            // 6 digits → search for 00 line
            S.otpDigits.push('0', '0');
            updateOtpDisplay();
            setTimeout(doOrderSearch, 50);
          } else if (S.otpDigits.length === 7) {
            // 7 digits → assume leading zero on line (e.g. 1234560 → 12345600)
            S.otpDigits.splice(6, 0, '0');
            updateOtpDisplay();
            setTimeout(doOrderSearch, 50);
          } else {
            doOrderSearch();
          }
        }
      } else if (S.mode === 'marketing') {
        if (/^[0-9]$/.test(e.key)) {
          e.preventDefault();
          if (S.mktComplete || S.mktDigits.length >= 6) {
            S.mktDigits = []; S.mktComplete = false; S.mktResult = null;
            const area = $('#mkt-results'); if (area) area.innerHTML = '';
          }
          S.mktDigits.push(e.key);
          updateMktOtpDisplay();
          if (S.mktDigits.length === 6) setTimeout(doMarketingSearch, 50);
        } else if (e.key === 'Backspace') {
          e.preventDefault();
          if (S.mktComplete) {
            S.mktDigits = []; S.mktComplete = false; S.mktResult = null;
            const area = $('#mkt-results'); if (area) area.innerHTML = '';
          } else {
            S.mktDigits.pop();
          }
          updateMktOtpDisplay();
        } else if (e.key === 'Enter' && S.mktDigits.length === 6 && !S.mktComplete) {
          doMarketingSearch();
        }
      } else if (S.mode === 'drawings' && e.key.length === 1 && /[0-9a-zA-Z*%_]/.test(e.key) && !konamiConsumed) {
        const inp = $('#inp-dwg');
        if (inp) { inp.focus(); inp.value = ''; }
      }
    }
  });

  bootLog('init complete');
  flushBootLog();
}

//  Contingency Viewer
// ═══════════════════════════════════════════════════════════════════════
let _cntHideBp = true; // Hide boilerplate toggle — on by default each session

const CNT_BP = {
  Construction: ['asme code (section viii, div. i)', 'construction based on standard design calculations.', 'commercial (non-code)'],
  Inspection: ['asme code inspection', 'a - standard procedure administered internally by qa.'],
  Testing: ['testing per qw-01-01-36 (hydro/code) where applicable.'],
  Cleaning: ['clean per e-06-01-001,...level a.'],
  Painting: ['use standard painting procedure.'],
  NamePlateNotes: ['pressures & temperatures,...per assembly drawing.', 'no ug-116 (x-ray) stamping required.'],
  Packaging: ['see order acknowledgement (shipping) notes.'],
};
function cntBpMatch(htmlLine, key) {
  const pats = CNT_BP[key];
  if (!pats || !htmlLine) return false;
  const t = htmlLine.replace(/<[^>]*>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/\u2026/g, '...').replace(/\s+/g, ' ').trim().toLowerCase();
  return pats.some(p => t === p);
}

let _nicknames = {}; // Loaded from shared nicknames.json on startup

function displayName(username) {
  if (!username) return '';
  const lower = username.toLowerCase().trim();
  return _nicknames[lower] || username;
}

async function showContingencyViewer(orderLine) {
  const order = orderLine.slice(0, 6), line = orderLine.slice(6);

  // Fetch data first (button shows spinner), then create the modal
  const r = await window.api.getContingency(orderLine);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal glass-strong cnt-viewer"></div>`;
  document.body.appendChild(overlay);
  modalDismiss(overlay);

  if (!r.found) {
    overlay.querySelector('.modal').innerHTML = `<div style="text-align:center;padding:32px">
      <div style="font:600 13px/1.4 'DM Sans',sans-serif;color:var(--danger);margin-bottom:6px">No contingency found</div>
      <div style="font:400 11px/1.3 'DM Sans',sans-serif;color:var(--text3);margin-bottom:16px">${order}-${line}</div>
      <button class="btn-glass" id="cnt-open-legacy" style="font-size:11px">Open Contingency App</button>
    </div>`;
    overlay.querySelector('#cnt-open-legacy')?.addEventListener('click', () => { overlay.remove(); window.api.openContingencyStandalone(); });
    return;
  }

  const d = r.data;
  const oi = d.OrderInfo || {};
  const con = d.ConstructionData || {};
  const insp = d.InspectionData || {};
  const test = d.TestingData || {};
  const clean = d.CleaningData || {};
  const paint = d.PaintingData || {};
  const np = d.NamePlateData || {};
  const pkg = d.PackagingData || {};
  const purch = d.PurchasingData || {};
  const qc = d.QCdata || {};

  function notes(obj, prefix, max) {
    const out = [];
    for (let i = 1; i <= max; i++) {
      const v = obj[prefix + i];
      if (v && v.trim()) out.push(escHtml(v.trim()));
    }
    return out;
  }
  function section(title, lines) {
    const body = lines.filter(Boolean);
    if (!body.length) return '';
    return `<div class="cnt-section">
      <div class="cnt-section-title">${title}</div>
      <div class="cnt-section-body">${body.join('<br>')}</div>
    </div>`;
  }

  // Build inspection levels
  const inspLevels = [];
  for (let i = 1; i <= 6; i++) { const v = insp['InspLevel' + i]; if (v && v.trim()) inspLevels.push(escHtml(v.trim())); }

  // Build name plates
  const namePlates = [];
  for (let i = 1; i <= 6; i++) { const v = np['NamePlate' + i]; if (v && v.trim()) namePlates.push(escHtml(v.trim())); }

  // QC docs
  const qcNotes = notes(qc, 'Note', 6);
  const sendTo = [qc.SendToLine1, qc.SendToLine2, qc.SendToLine3, qc.SendToLine4].filter(Boolean).map(s => s.trim()).filter(Boolean);
  const sendAttn = qc.SendToAttn ? qc.SendToAttn.trim() : '';

  // Build filtered sections (shared by screen viewer and print)
  function buildSections(hideBp, secFn, lblCls) {
    const lbl = lblCls || 'cnt-label';
    function bpf(list, key) { return hideBp ? list.filter(l => l && !cntBpMatch(l, key)) : list; }

    const conLines = bpf([
      con.ConstrCode ? escHtml(con.ConstrCode.trim()) : null,
      ...notes(con, 'Note', 12),
    ], 'Construction');

    const fLevels = hideBp ? inspLevels.filter(l => !cntBpMatch(l, 'Inspection')) : inspLevels;
    const inspLines = [
      hideBp ? null : (con.ConstrCode && con.ConstrCode.includes('ASME') ? 'ASME Code (Section VIII, Div. I) \u2026(ref Q-01-01-11)' : null),
      fLevels.length ? `<span class="${lbl}">Level(s):</span> ` + fLevels.join('; ') : null,
      ...bpf(notes(insp, 'Note', 6), 'Inspection'),
    ];

    // Testing: if both fluids are Water (tap) at <500 psi with no extra notes, omit entirely
    const ssLine = test.Fluid_SS ? `<span class="${lbl}">Shell Side Fluid:</span> ` + escHtml(test.Fluid_SS.trim()) + (test.psi_SS ? ' \u2026.. at ' + escHtml(test.psi_SS.trim()) : '') : null;
    const tsLine = test.Fluid_TS ? `<span class="${lbl}">Tube Side Fluid:</span> ` + escHtml(test.Fluid_TS.trim()) + (test.psi_TS ? ' \u2026.. at ' + escHtml(test.psi_TS.trim()) : '') : null;
    const testNotesF = bpf(notes(test, 'Note', 6), 'Testing');
    let testLines;
    if (hideBp) {
      const ssF = (test.Fluid_SS || '').trim().toLowerCase();
      const tsF = (test.Fluid_TS || '').trim().toLowerCase();
      const ssPsi = parseFloat(String(test.psi_SS || '').replace(/[^\d.]/g, '')) || 0;
      const tsPsi = parseFloat(String(test.psi_TS || '').replace(/[^\d.]/g, '')) || 0;
      const isRoutine = ssF === 'water (tap)' && tsF === 'water (tap)' && ssPsi < 500 && tsPsi < 500 && testNotesF.length === 0;
      const isBlank = (ssF === 'n/a' || !ssF) && (tsF === 'n/a' || !tsF) && ssPsi === 0 && tsPsi === 0;
      if (isRoutine) {
        testLines = [];
      } else if (isBlank) {
        // Fluids/psi are default — omit them, but keep any special testing notes
        testLines = testNotesF.length ? [...testNotesF] : [];
      } else {
        testLines = [ssLine, tsLine, ...testNotesF];
      }
    } else {
      testLines = [ssLine, tsLine, ...testNotesF];
    }

    const cleanLines = bpf(notes(clean, 'Note', 6), 'Cleaning');
    let paintLines = bpf(notes(paint, 'Note', 6), 'Painting');
    if (hideBp && paintLines.length) {
      const allPaint = paintLines.map(l => l.replace(/<[^>]*>/g, '').trim().toLowerCase()).join(' ').trim();
      if (allPaint === 'no paint' || allPaint === 'do not paint') {
        const dwg = (oi.DwgNo || '').trim();
        // Keep "no paint" for drawings starting with 4 or 5, except replacement bundles (41/42)
        const isBundle = /^4[12]/.test(dwg);
        const is4or5 = /^[45]/.test(dwg);
        if (isBundle || !is4or5) paintLines = [];
      }
    }

    // Nameplates: Note1 is always the model name in the legacy app — skip it.
    // Also filter known bp phrases. Only show section if non-bp notes remain.
    let npLines;
    const npNotesAll = notes(np, 'Note', 6);
    if (hideBp) {
      const modelVal = np.Note1 ? escHtml(np.Note1.trim()) : '';
      npLines = npNotesAll.filter(n => {
        if (cntBpMatch(n, 'NamePlateNotes')) return false;
        if (modelVal && n === modelVal) return false;
        return true;
      });
    } else {
      npLines = [...namePlates, ...npNotesAll];
    }

    const pkgLines = bpf(notes(pkg, 'Note', 6), 'Packaging');
    const purchLines = notes(purch, 'Note', 6);

    // Required Documents: only show "Documentation required" when Y; "not required" is noise
    const reqDocLines = [
      qc.QCdocs === 'Y' ? `<span class="${lbl}">Documentation required</span>` : null,
      ...qcNotes,
      hideBp ? null : (sendTo.length ? `<span class="${lbl}">Send Docs to:</span> ` + sendTo.map(escHtml).join(', ') : null),
      hideBp ? null : (sendAttn ? `<span class="${lbl}">Attn:</span> ` + escHtml(sendAttn) : null),
    ];

    const result = secFn('Construction', conLines)
      + secFn('Inspection', inspLines)
      + secFn('Testing', testLines)
      + secFn('Cleaning', cleanLines)
      + secFn('Painting', paintLines)
      + secFn('Nameplates', npLines)
      + secFn('Packaging', pkgLines)
      + secFn('Purchased Material', purchLines)
      + secFn('Required Documents', reqDocLines);

    if (hideBp && !result.trim()) {
      return '<div class="cnt-std-proc"><div class="cnt-std-proc-title">Standard procedures</div><div class="cnt-std-proc-sub">No contingency required</div></div>';
    }
    return result;
  }

  // Staleness check — warn only if DB files changed since our last load
  const isStale = !r.loadedAt || !!r.dbChanged;

  const isAsme = !!(con.ConstrCode && con.ConstrCode.toUpperCase().includes('ASME'));
  const isNuclear = !!(oi.BPCSpn && oi.BPCSpn.trim().toUpperCase().startsWith('%NS'));
  const badgeClass = isNuclear ? 'cnt-badge-nuclear' : isAsme ? 'cnt-badge-code' : 'cnt-badge-noncode';
  const badgeLabel = isNuclear ? 'Nuclear' : isAsme ? 'ASME Code' : 'Non-Code';
  const infoParts = [];
  if (oi.CustomerName) infoParts.push('<b>' + escHtml(oi.CustomerName.trim()) + '</b>');
  const itemStr = [oi.ItemDesc ? escHtml(oi.ItemDesc.trim()) : '', oi.BPCSpn ? '(' + escHtml(oi.BPCSpn.trim()) + ')' : ''].filter(Boolean).join(' ');
  if (itemStr) infoParts.push(itemStr);
  const infoLine = infoParts.join(' &middot; ');

  const html = `
    <div class="cnt-head">
      <div class="cnt-head-top">
        <h2>Contingency Instructions</h2>
        <label class="cnt-bp-toggle">
          <input type="checkbox" id="cnt-bp-toggle" ${_cntHideBp ? 'checked' : ''}>
          <span class="cnt-bp-switch"></span>
          <span>Hide boilerplate</span>
        </label>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div class="cnt-order" style="margin:0">${order}-${line}</div>
        <span class="cnt-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      ${infoLine ? '<div class="cnt-info">' + infoLine + '</div>' : ''}
      <div class="cnt-detail">
        ${oi.DwgNo ? `<span>Dwg <b>${escHtml(oi.DwgNo)}</b></span>` : ''}
        ${oi.Qty ? `<span>Qty <b>${escHtml(String(oi.Qty))}</b></span>` : ''}
        <span class="cnt-nowrap">Doc Rev <b>${escHtml(String(oi.RevNo || '0'))}</b></span>
        <span>By <b>${escHtml(displayName(oi.MadeBy))}</b></span>
      </div>
      ${isStale ? `<div id="cnt-stale-banner" style="margin-top:8px;padding:5px 10px;border-radius:8px;background:rgba(255,180,0,.12);border:1px solid rgba(255,180,0,.25);font:500 10px/1.4 'DM Sans',sans-serif;color:var(--amber,#f0a030);display:flex;align-items:center;gap:8px">
        <span>\u26A0 Database changed since last load</span>
        <button id="cnt-retry" class="btn-glass" style="font-size:9px;padding:2px 10px;margin-left:auto">Retry</button>
      </div>` : ''}
    </div>

    <div class="cnt-scroll" id="cnt-scroll">
    ${buildSections(_cntHideBp, section, 'cnt-label')}
    <div class="cnt-footer">
      ${oi.CustomerName ? escHtml(oi.CustomerName.trim()) : ''}${oi.CustomerLoc ? ' \u2014 ' + escHtml(oi.CustomerLoc.trim()) : ''}
    </div>
    </div>

    <div class="cnt-actions">
      <button id="cnt-print">Print</button>
      <button id="cnt-save">Save</button>
      <button id="cnt-legacy">Open</button>
      <button id="cnt-close">Close</button>
    </div>
  `;

  const modal = overlay.querySelector('.modal');
  modal.style.textAlign = 'left';
  modal.style.padding = '';
  modal.innerHTML = html;
  overlay.querySelector('#cnt-close').addEventListener('click', () => overlay.remove());
  // Boilerplate toggle — re-render sections when toggled
  overlay.querySelector('#cnt-bp-toggle').addEventListener('change', (e) => {
    _cntHideBp = e.target.checked;
    const scroll = overlay.querySelector('#cnt-scroll');
    const footer = scroll.querySelector('.cnt-footer');
    scroll.innerHTML = buildSections(_cntHideBp, section, 'cnt-label') + footer.outerHTML;
  });
  // Retry button — force-reload contingency DB and reopen viewer
  overlay.querySelector('#cnt-retry')?.addEventListener('click', async () => {
    overlay.remove();
    setStatus('Refreshing contingency\u2026');
    await window.api.preloadContingency(true);
    showContingencyViewer(orderLine);
  });
  // Build print-friendly HTML (respects boilerplate toggle at time of print)
  function pSection(title, lines) {
    const body = lines.filter(Boolean);
    if (!body.length) return '';
    return `<div class="section"><div class="section-title">${title}</div><div class="section-body">${body.join('<br>')}</div></div>`;
  }
  function getPrintHtml() {
    return `
    <h2>CONTINGENCY INSTRUCTIONS</h2>
    <div class="cnt-print-sub">${infoLine ? '<span class="cnt-print-info">' + infoLine + '</span>' : '<span></span>'}<span class="cnt-badge ${badgeClass}">${badgeLabel.toUpperCase()}</span></div>
    <div class="meta">ORDER: <b>${order}-${line}</b>&nbsp;&nbsp;&nbsp;${oi.DwgNo ? `Dwg: <b>${escHtml(oi.DwgNo)}</b>&nbsp;&nbsp;&nbsp;` : ''}${oi.Qty ? `Qty: <b>${escHtml(String(oi.Qty))}</b>&nbsp;&nbsp;&nbsp;` : ''}Doc Rev: <b>${escHtml(String(oi.RevNo || '0'))}</b>&nbsp;&nbsp;&nbsp;By: <b>${escHtml(displayName(oi.MadeBy))}</b></div>
    ${buildSections(_cntHideBp, pSection, 'label')}
    <div class="footer">${oi.CustomerName ? escHtml(oi.CustomerName.trim()) : ''}${oi.CustomerLoc ? ' \u2014 ' + escHtml(oi.CustomerLoc.trim()) : ''}</div>
  `;
  }

  // Print — sends directly to printer (OS print dialog, no Adobe)
  overlay.querySelector('#cnt-print').addEventListener('click', async () => {
    const btn = overlay.querySelector('#cnt-print');
    btn.disabled = true;
    btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
    const r = await window.api.printContingency(getPrintHtml());
    btn.disabled = false;
    btn.textContent = 'Print';
    if (!r.ok) showToast('Print failed: ' + r.msg, 'danger');
  });

  // Save PDF to Downloads
  overlay.querySelector('#cnt-save').addEventListener('click', async () => {
    const btn = overlay.querySelector('#cnt-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px"></span>';
    const r = await window.api.saveContingencyPdf(orderLine, getPrintHtml());
    btn.disabled = false;
    btn.textContent = 'Save';
    if (r.ok) showToast('Saved to Downloads', 'success');
    else showToast('Save failed: ' + r.msg, 'danger');
  });
  overlay.querySelector('#cnt-legacy').addEventListener('click', () => {
    overlay.remove();
    window.api.openContingencyOrder(order + '-' + line);
  });
}

function showInstallPrompt(name, desc, url, wingetId) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal glass-strong" style="color:var(--text);width:360px;padding:24px;text-align:center">
    <div style="font-size:28px;margin-bottom:8px">\u2B07\uFE0F</div>
    <div style="font:700 15px/1.3 'DM Sans',sans-serif;margin-bottom:6px">${escHtml(name)}</div>
    <div style="font:400 11px/1.5 'DM Sans',sans-serif;color:var(--text2);margin-bottom:16px">${escHtml(desc)}<br>Free download \u2014 install once, then restart XylemView Pro.</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-accent" id="install-download" style="height:34px;font-size:13px;padding:0 24px">${wingetId ? 'Install' : 'Download'}</button>
      <button class="btn-glass" id="install-cancel" style="height:34px;padding:0 16px;font-size:12px">Cancel</button>
    </div>
    <div id="install-status" style="font:500 10px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:12px;display:none"></div>
  </div>`;
  document.body.appendChild(overlay);
  modalDismiss(overlay);
  overlay.querySelector('#install-cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#install-download').addEventListener('click', async () => {
    if (wingetId) {
      const btn = overlay.querySelector('#install-download');
      const status = overlay.querySelector('#install-status');
      btn.disabled = true; btn.innerHTML = '<span class="deep-spinner" style="width:12px;height:12px;vertical-align:-2px"></span>&ensp;Installing\u2026';
      status.style.display = ''; status.textContent = 'This may take a minute.';
      const r = await window.api.wingetInstall(wingetId);
      if (r.ok) {
        status.textContent = '\u2713 Installed successfully!';
        status.style.color = 'var(--accent)';
        btn.innerHTML = 'Restart'; btn.disabled = false;
        btn.onclick = () => window.api.restartApp();
      } else {
        status.textContent = '\u26A0 ' + (r.msg || 'Install failed. Opening download page\u2026');
        status.style.color = 'var(--danger)';
        btn.textContent = 'Download'; btn.disabled = false;
        btn.onclick = () => { window.api.openExternal(url); overlay.remove(); };
      }
    } else {
      window.api.openExternal(url);
      overlay.remove();
    }
  });
}

//  Marketing Mode
// Simple markdown → HTML for Claude's Analysis
function renderMd(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return raw.split('\n').map(line => {
    let l = esc(line);
    // Headings
    l = l.replace(/^#{1,3}\s+(.+)/, '<b>$1</b>');
    // Bold
    l = l.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    // Italic
    l = l.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, '<i>$1</i>');
    // Bullet lists
    l = l.replace(/^(\s*)[\u2013\u2014\-]\s+/, '$1\u2022 ');
    return l;
  }).join('<br>');
}

function updateMktOtpDisplay() {
  const boxes = $$('#mkt-otp .otp-box');
  if (!boxes.length) return;
  boxes.forEach((box, i) => {
    const digit = S.mktDigits[i] || '';
    const wasEmpty = !box.textContent && digit;
    box.textContent = digit;
    box.classList.toggle('filled', !!digit);
    box.classList.toggle('active', S.mktComplete ? i === 0 : i === S.mktDigits.length);
    if (wasEmpty) { box.classList.add('pop'); setTimeout(() => box.classList.remove('pop'), 100); }
  });
}

async function doMarketingSearch() {
  if (S.mode !== 'marketing') return;
  const raw = S.mktDigits.join('');
  if (raw.length < 6) return;
  const orderPad = raw.padStart(6, '0');
  S.mktOrder = orderPad;
  S.mktComplete = true;
  updateMktOtpDisplay();

  const results = $('#mkt-results');
  results.innerHTML = `
    <div id="mkt-eom-area"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <div style="font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px">ENGINEERING STATUS</div>
      <div class="deep-spinner" style="width:10px;height:10px"></div>
    </div></div>
    <div id="mkt-checklist-area" style="margin-top:12px"><div style="text-align:center;padding:30px">
      <div class="deep-spinner" style="width:14px;height:14px;margin:0 auto 8px"></div>
      <div style="font:500 10px/1.4 'DM Sans',sans-serif;color:var(--text3)">Parsing checklist\u2026</div>
    </div></div>`;

  // EOM loads fast — render it as soon as it resolves
  S._mktEomPromise = window.api.bpcsOrderEom(orderPad).catch(() => null);
  S._mktEomPromise.then(eomData => {
    if (S.mode !== 'marketing' || S.mktOrder !== orderPad) return;
    S._mktEomData = eomData;
    const eomArea = $('#mkt-eom-area');
    if (eomArea) loadEomPanel(eomArea, orderPad);
  });

  // Checklist loads slower — render below when ready
  try {
    const r = await window.api.scanChecklists(orderPad);
    if (S.mode !== 'marketing' || S.mktOrder !== orderPad) return;
    S.mktResult = r;
    if (r.found) S.recentMktOrders = await window.api.addRecentMktOrder(orderPad);
    renderMarketingChecklist();
  } catch (e) {
    S.mktResult = { found: false, error: e.message };
    renderMarketingChecklist();
  }
}

async function loadEomPanel(eomDiv, orderPad) {
    const eomData = S._mktEomData || await window.api.bpcsOrderEom(orderPad);
    if (!eomData.ok || !eomData.rows || !eomData.rows.length) {
      eomDiv.innerHTML = `<div style="font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:6px">ENGINEERING STATUS</div>
        <div style="font:400 10px/1.3 'DM Sans',sans-serif;color:var(--text3);padding:6px 0">${eomData.error ? escHtml(eomData.error) : 'Not in engineering backlog'}</div>`;
      return;
    }

    // Workday calculator: add N workdays to a date
    function addWorkdays(date, days) {
      const d = new Date(date);
      let added = 0;
      const dir = days >= 0 ? 1 : -1;
      const abs = Math.abs(days);
      while (added < abs) {
        d.setDate(d.getDate() + dir);
        const dow = d.getDay();
        if (dow !== 0 && dow !== 6) added++;
      }
      return d;
    }

    // Convert BPCS YYMMDD (28yr offset) to Date
    function bpcsDate(val) {
      const n = parseInt(val, 10);
      if (!n || n < 10000) return null;
      const yy = Math.floor(n / 10000);
      const mm = Math.floor((n % 10000) / 100) - 1;
      const dd = n % 100;
      const realYear = yy + 28 > 100 ? (yy + 28 - 100) + 2000 : (yy + 28) + 1900;
      return new Date(realYear, mm, dd);
    }

    // Count workdays between two dates
    function workdaysBetween(a, b) {
      let count = 0;
      const d = new Date(a);
      while (d < b) {
        d.setDate(d.getDate() + 1);
        const dow = d.getDay();
        if (dow !== 0 && dow !== 6) count++;
      }
      return count;
    }

    function fmtShort(d) {
      if (!d) return '\u2014';
      return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;
    }

    const svcParts = ['CRNREQ','CODECALCS','SEISMIC CALCS','CRTDWG','CROSSSECTDRAW','SPECIALMANUAL','WELDPROC'];
    const linesHtml = eomData.rows.filter(row => {
      // Include lines on engineering holds OR service/engineering line items
      const eoStatus = (row.status || '').trim();
      const prod = (row.prod || '').trim();
      const isHold = eoStatus === 'OR' || eoStatus === 'UB' || eoStatus === 'CF' || eoStatus === 'LO';
      const isSvcPart = svcParts.includes(prod) || prod.startsWith('%') && prod.includes('ENGSER');
      return isHold || isSvcPart;
    }).sort((a, b) => {
      // Active holds (EO status matches current hold) first
      const aActive = (a.status || '').trim() === (a.hold || '').trim() ? 0 : 1;
      const bActive = (b.status || '').trim() === (b.hold || '').trim() ? 0 : 1;
      return aActive - bActive;
    }).map(row => {
      const contract = (row.contract || '').trim();
      const orderNum = contract.slice(0, 6);
      const lineNum = contract.length > 6 ? contract.slice(6).replace(/^0+/, '') || '0' : '0';
      const fmtContract = orderNum + '-' + lineNum.padStart(lineNum.length > 2 ? 3 : 2, '0');
      const desc = (row.desc || '').trim();
      const eoStatus = (row.status || '').trim();  // EO hold code (backlog entry)
      const curHold = (row.hold || '').trim();      // current L2LRSN
      const hold = eoStatus;                        // always display the EO hold code
      const isFakeHold = /\d/.test(eoStatus);        // digit-containing codes (9N, 2A) = no real hold
      const isActiveHold = isFakeHold || eoStatus === curHold;  // fake holds always show as active
      const prod = (row.prod || '').trim();

      // Calculate suggested ME/BOM date (20% of lead time)
      const startDate = row.startDate && row.startDate !== '0001-01-01' ? new Date(row.startDate.slice(0, 10) + 'T00:00:00') : null;
      const reqDate = bpcsDate(row.ludte1);
      let suggestedMeDate = null;

      if (prod === 'CRNREQ' || prod.startsWith('%') && prod.includes('CRNREQ')) {
        // CRN: due date = customer-requested date
        suggestedMeDate = reqDate;
      } else if (hold === 'UB') {
        // UB: due date = 2 weeks (10 workdays) after start date
        suggestedMeDate = startDate ? addWorkdays(startDate, 10) : null;
      } else if (startDate && reqDate && reqDate > startDate) {
        // Standard: 20% of lead time in workdays
        const totalWorkdays = workdaysBetween(startDate, reqDate);
        const targetWorkdays = Math.round(totalWorkdays * 0.20);
        suggestedMeDate = addWorkdays(startDate, targetWorkdays);
      }

      // PE/DFT offset from ME date depends on item class and hold
      const cls = (row.icclas || '').trim();
      let peOffset = -3; // default: 3 workdays before ME
      if (prod === 'CRNREQ' || prod.includes('CRNREQ') || hold === 'UB') peOffset = 0; // same date as ME
      else if (cls === '8H' || cls === '8J' || cls === '7B') peOffset = -5;
      else if (cls === '8P') peOffset = -2;
      const suggestedPeDate = suggestedMeDate ? addWorkdays(suggestedMeDate, peOffset) : null;

      // Current dates from EOM
      const curPe = row.pesidte && !row.pesidte.startsWith('0001') ? new Date(row.pesidte.slice(0, 10) + 'T00:00:00') : null;
      const curMe = row.mesidte && !row.mesidte.startsWith('0001') ? new Date(row.mesidte.slice(0, 10) + 'T00:00:00') : null;

      // Progress indicators
      const peIcon = row.peckout === '1' ? '\u2705' : row.peckin === '1' ? '\u23F3' : '';
      const dfIcon = row.dfckout === '1' ? '\u2705' : row.dfckin === '1' ? '\u23F3' : '';
      const bmIcon = row.bmckout === '1' ? '\u2705' : row.bmckin === '1' ? '\u23F3' : '';
      const activeHoldColor = eoStatus === 'OR' ? 'var(--accent)' : eoStatus === 'UB' ? 'var(--amber)' : eoStatus === 'CF' ? 'var(--danger)' : eoStatus === 'LO' ? 'var(--text2)' : 'var(--text3)';
      const holdColor = isActiveHold ? activeHoldColor : 'var(--text3)';
      const holdOpacity = isActiveHold ? '1' : '.45';

      const needsCheckin = row.peckin !== '1';
      const peAssigned = displayName((row.pename || '').trim());
      // ISO date strings for the update
      const peIso = suggestedPeDate ? suggestedPeDate.toISOString().slice(0, 10) : '';
      const dfIso = suggestedPeDate ? suggestedPeDate.toISOString().slice(0, 10) : '';
      const bmIso = suggestedMeDate ? suggestedMeDate.toISOString().slice(0, 10) : '';
      const meIso = suggestedMeDate ? suggestedMeDate.toISOString().slice(0, 10) : '';

      return `<div class="mkt-eom-line" data-contract="${escHtml(contract)}" data-status="${escHtml(row.status)}" data-pe-iso="${escHtml(peIso)}" data-df-iso="${escHtml(dfIso)}" data-bm-iso="${escHtml(bmIso)}" data-me-iso="${escHtml(meIso)}" style="padding:8px 12px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);margin-bottom:4px;opacity:${holdOpacity}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font:700 13px/1 'IBM Plex Mono',monospace;color:${holdColor}">${escHtml(hold)}</span>
          <span style="font:600 11px/1 'IBM Plex Mono',monospace">${escHtml(fmtContract)}</span>
          <span style="font:400 10px/1 'DM Sans',sans-serif;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(desc)}</span>
          <span style="font:400 9px/1 'DM Sans',sans-serif;color:var(--text3)">${escHtml(row.icclas || '')}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font:400 10px/1.4 'DM Sans',sans-serif;color:var(--text2)">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:4px">PE/DFT ${peIcon} <input type="date" class="eom-date-pe" value="${escHtml(peIso)}" style="height:20px;padding:0 4px;border-radius:5px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font:400 10px/1 'DM Sans',sans-serif;width:110px"></div>
            <div style="display:flex;align-items:center;gap:4px">ME/BOM ${bmIcon} <input type="date" class="eom-date-me" value="${escHtml(meIso)}" style="height:20px;padding:0 4px;border-radius:5px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font:400 10px/1 'DM Sans',sans-serif;width:110px"></div>
          </div>
          ${needsCheckin ? (() => {
            // Determine repeat status from checklist line items (dwgNorm = has drawing = repeat)
            const lineNum = contract.length > 6 ? contract.slice(6).replace(/^0+/, '') || '0' : '0';
            const clLineItems = S.mktResult?.checklists?.[0]?.lineItems || [];
            const isRepeat = clLineItems.some(li => parseInt(li.line, 10) === parseInt(lineNum, 10) && li.dwgNorm);
            let defaultPe = 'wboisso';
            if (['6L','8L','8H','8P'].includes(cls)) defaultPe = 'pequeue';
            else if (['8J','7T','7L'].includes(cls)) defaultPe = 'mzoyhofski';
            else if (['8B','8F','8T'].includes(cls) && !isRepeat) defaultPe = 'tshershn';
            return `<select class="eom-pe-user" style="height:26px;padding:0 4px;border-radius:6px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font:400 10px/1 'DM Sans',sans-serif;width:90px">
            <option value="wboisso"${defaultPe === 'wboisso' ? ' selected' : ''}>Will</option>
            <option value="pequeue"${defaultPe === 'pequeue' ? ' selected' : ''}>PE Queue</option>
            <option value="tshershn"${defaultPe === 'tshershn' ? ' selected' : ''}>Tatiana</option>
            <option value="mzoyhofski"${defaultPe === 'mzoyhofski' ? ' selected' : ''}>Mark</option>
          </select>
          <button class="btn-accent eom-checkin-btn" style="font-size:10px;height:26px;padding:0 12px;white-space:nowrap">Check In</button>`;
          })() : `<span style="font:600 10px/1 'DM Sans',sans-serif;color:var(--success)">\u2713 ${escHtml(peAssigned)}</span>`}
        </div>
      </div>`;
    }).join('');

    eomDiv.innerHTML = `<div style="font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:6px">ENGINEERING STATUS</div>${linesHtml}`;

    // Wire up check-in buttons
    eomDiv.querySelectorAll('.eom-checkin-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const lineDiv = btn.closest('.mkt-eom-line');
        const contract = lineDiv.dataset.contract;
        const status = lineDiv.dataset.status;
        const userSelect = lineDiv.querySelector('.eom-pe-user');
        const pename = userSelect ? userSelect.value : 'wboisso';
        const peInput = lineDiv.querySelector('.eom-date-pe');
        const meInput = lineDiv.querySelector('.eom-date-me');
        const peIso = peInput ? peInput.value : '';
        const dfIso = peIso; // DFT same as PE
        const meIso = meInput ? meInput.value : '';
        const bmIso = meIso; // BOM same as ME

        btn.disabled = true;
        btn.textContent = 'Checking in\u2026';

        // Set dates first (if we have suggested dates)
        if (peIso && bmIso) {
          const dr = await window.api.eomSetDates(contract, status, peIso, dfIso, bmIso, meIso);
          if (!dr.ok) {
            btn.textContent = dr.error || 'Date error';
            btn.style.color = 'var(--danger)';
            setTimeout(() => { btn.textContent = 'Check In'; btn.style.color = ''; btn.disabled = false; }, 2000);
            return;
          }
        }

        // Then check in PE
        const cr = await window.api.eomCheckin(contract, status, pename);
        if (cr.ok) {
          btn.textContent = '\u2713 Done';
          btn.style.background = 'var(--success)';
          if (userSelect) userSelect.style.display = 'none';
          playChime();
        } else {
          btn.textContent = cr.error || 'Failed';
          btn.style.color = 'var(--danger)';
          setTimeout(() => { btn.textContent = 'Check In'; btn.style.color = ''; btn.disabled = false; }, 2000);
        }
      });
    });
}

// ── Engineering Backlog Panel (for future Backlog tab) — reads via SOAP ──
let _backlogCache = null;

async function renderSaturnBacklog() {
  const el = $('#saturn-backlog');
  if (!el) return;

  // Show loading
  el.innerHTML = `
    <div class="glass no-drag" style="padding:14px 20px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font:700 12px/1 'DM Sans',sans-serif">Orders to Check In</div>
        <div class="deep-spinner" style="width:12px;height:12px"></div>
      </div>
    </div>`;

  const data = _backlogCache || await window.api.bpcsBacklogCheckin();
  if (!data.ok) {
    el.innerHTML = `<div class="glass no-drag" style="padding:14px 20px">
      <div style="font:700 12px/1 'DM Sans',sans-serif;margin-bottom:6px">Orders to Check In</div>
      <div style="font:400 10px/1.3 'DM Sans',sans-serif;color:var(--danger)">${escHtml(data.error || 'Query failed')}</div>
    </div>`;
    return;
  }

  const rows = data.rows || [];
  _backlogCache = data;

  if (!rows.length) {
    el.innerHTML = `<div class="glass no-drag" style="padding:14px 20px">
      <div style="font:700 12px/1 'DM Sans',sans-serif">Orders to Check In</div>
      <div style="font:400 10px/1.3 'DM Sans',sans-serif;color:var(--text3);margin-top:6px">All caught up!</div>
    </div>`;
    return;
  }

  const rowsHtml = rows.map(o => {
    const contract = (o.contract || '').trim();
    const order = contract.slice(0, 6);
    const line = contract.slice(6, 9);
    const desc = (o.desc || '').trim();
    const customer = (o.customer || '').trim();
    const hold = (o.hold || o.status || '').trim();
    const pe = (o.pename || '').trim();
    // Progress: which stage is it at?
    let stage = 'New';
    if (o.peckin === '1' && o.dfckin !== '1') stage = 'PE done';
    else if (o.dfckin === '1' && o.bmckin !== '1') stage = 'DFT done';
    else if (pe) stage = displayName(pe);
    const holdColor = hold === 'OR' ? 'var(--accent)' : hold === 'UB' ? 'var(--amber)' : 'var(--text3)';
    return `<div class="backlog-row" data-contract="${escHtml(contract)}" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;cursor:pointer;transition:background .12s;font:400 11px/1.3 'DM Sans',sans-serif" onmouseover="this.style.background='var(--accent-soft)'" onmouseout="this.style.background=''">
      <span style="font:700 9px/1 'IBM Plex Mono',monospace;color:${holdColor};min-width:20px">${escHtml(hold)}</span>
      <span style="font:600 10px/1 'IBM Plex Mono',monospace;min-width:70px;color:var(--text)">${escHtml(order)}-${escHtml(line)}</span>
      <span style="flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(desc)}</span>
      <span style="color:var(--text3);font-size:9px;min-width:40px;text-align:right">${escHtml(stage)}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="glass no-drag" style="padding:14px 20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font:700 12px/1 'DM Sans',sans-serif">Orders to Check In</div>
        <span style="font:400 10px/1 'DM Sans',sans-serif;color:var(--text3)">${rows.length}</span>
        <button class="btn-glass" id="backlog-refresh" style="margin-left:auto;font-size:9px;height:22px;padding:0 10px">Refresh</button>
      </div>
      <div style="max-height:280px;overflow-y:auto;margin:0 -10px;padding:0 10px">${rowsHtml}</div>
    </div>`;

  el.querySelector('#backlog-refresh')?.addEventListener('click', async () => {
    _backlogCache = null;
    renderSaturnBacklog();
  });

  // Click a row → load that order number in the OTP boxes
  el.querySelectorAll('.backlog-row').forEach(row => {
    row.addEventListener('click', () => {
      const contract = row.dataset.contract;
      if (!contract || contract.length < 6) return;
      const orderDigits = contract.slice(0, 6);
      S.mktDigits = orderDigits.split('');
      S.mktComplete = false;
      updateMktOtpDisplay();
      doMarketingSearch();
    });
  });
}

async function showChecklistReview(orderPad) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal glass-strong" style="color:var(--text);width:440px;max-height:85vh;overflow-y:auto;scrollbar-gutter:stable;padding:24px">
    <div style="text-align:center"><div class="deep-spinner" style="width:16px;height:16px;margin:0 auto 8px"></div>
    <div style="font:500 11px/1.4 'DM Sans',sans-serif;color:var(--text2)">Parsing checklist\u2026</div></div>
  </div>`;
  document.body.appendChild(overlay);
  modalDismiss(overlay);

  const r = await window.api.scanChecklists(orderPad);
  const modal = overlay.querySelector('.modal');

  if (!r.found || !r.checklists.length) {
    modal.innerHTML = `<div style="text-align:center;padding:24px">
      <div style="font:600 13px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-bottom:6px">No checklist found</div>
      <div style="font:400 11px/1.3 'DM Sans',sans-serif;color:var(--text3)">${orderPad}-00</div>
      <button class="btn-accent" style="margin-top:16px;height:32px;font-size:12px;padding:0 20px" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`;
    return;
  }

  const cl = r.checklists[0];
  if (cl.error) {
    modal.innerHTML = `<div style="text-align:center;padding:24px">
      <div style="font:600 12px/1.4 'DM Sans',sans-serif;color:var(--danger)">Error parsing checklist</div>
      <div style="font:400 11px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:6px">${escHtml(cl.error)}</div>
      <button class="btn-accent" style="margin-top:16px;height:32px;font-size:12px;padding:0 20px" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`;
    return;
  }

  const hasDrawings = cl.lineItems.some(li => li.dwgNorm);
  const repeatBadge = hasDrawings
    ? '<span style="background:var(--success);color:#000;font:700 9px/1 \'DM Sans\',sans-serif;padding:3px 8px;border-radius:6px;letter-spacing:0.5px">REPEAT ORDER</span>'
    : '<span style="background:var(--amber);color:#000;font:700 9px/1 \'DM Sans\',sans-serif;padding:3px 8px;border-radius:6px;letter-spacing:0.5px">NEW UNIT</span>';

  const lineItemsHtml = cl.lineItems.map(li => `
    <div class="clr-line-item" data-dwg="${escHtml(li.dwgNorm)}" data-line="${escHtml(li.line)}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);margin-bottom:4px;cursor:pointer;transition:background .15s" title="Click to copy ${escHtml(li.dwgNorm)}">
      <div style="font:700 13px/1 'IBM Plex Mono',monospace;color:var(--accent);min-width:24px">${li.line}</div>
      <div style="flex:1">
        <div style="font:600 12px/1.3 'IBM Plex Mono',monospace;color:var(--dwg)">${escHtml(li.dwgRaw)}</div>
        <div style="font:400 10px/1.3 'DM Sans',sans-serif;color:var(--text3);margin-top:2px">${escHtml(li.template)} \u2022 Qty: ${li.qty}${li.price ? ' \u2022 $' + escHtml(li.price) : ''}</div>
      </div>
      <button class="clr-link-btn btn-glass" data-dwg="${escHtml(li.dwgNorm)}" data-line="${escHtml(li.line)}" style="font-size:9px;height:24px;padding:0 8px;flex-shrink:0" title="Link drawing to order folder" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5l-1 1"/><path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5l1-1"/></svg></button>
      <div style="font:700 9px/1 'DM Sans',sans-serif;padding:3px 8px;border-radius:6px;background:${li.dwgNorm ? 'rgba(0,255,144,0.12);color:var(--success)' : 'rgba(255,152,32,0.12);color:var(--amber)'}">
        ${li.dwgNorm ? 'REPEAT' : 'NEW'}
      </div>
    </div>
  `).join('');

  modal.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <h3 style="font:700 16px/1 'DM Sans',sans-serif;margin:0">Order ${orderPad}</h3>
      ${repeatBadge}
    </div>
    <div style="font:400 11px/1.5 'DM Sans',sans-serif;color:var(--text2);margin-bottom:14px">
      PO: <b>${escHtml(cl.poNumber || '?')}</b> \u2022 AE: <b>${escHtml(cl.ae || '?')}</b> \u2022 ${escHtml(cl.date || '')}${cl.fileDate ? ' \u2022 Filed: <b>' + new Date(cl.fileDate).toLocaleDateString() + '</b>' : ''}
    </div>
    <div style="font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:6px">LINE ITEMS${cl.lineNumberSource === 'estimated' ? ' <span style="opacity:.6;font-weight:400">(line #s estimated)</span>' : ''}</div>
    ${lineItemsHtml || '<div style="font:400 11px/1.4 \'DM Sans\',sans-serif;color:var(--text3);font-style:italic;padding:8px 12px">No line items found in checklist</div>'}
    ${cl.comments ? `<div style="margin-top:12px;font:600 9px/1 'DM Sans',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:4px">COMMENTS</div><div style="font:400 11px/1.5 'DM Sans',sans-serif;color:var(--text2);padding:8px 12px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border)">${escHtml(cl.comments)}</div>` : ''}
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
      <button class="btn-glass" id="clr-view-pdf" style="font-size:11px;height:32px;padding:0 16px">View PDF</button>
      <button class="btn-accent" style="height:32px;font-size:12px;padding:0 20px" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>
  `;

  overlay.querySelector('#clr-view-pdf')?.addEventListener('click', () => {
    window.api.openFile(cl.filepath);
  });
  overlay.querySelectorAll('.clr-line-item').forEach(el => {
    el.addEventListener('click', () => {
      const dwg = el.dataset.dwg;
      if (dwg) {
        window.api.copyText(dwg);
        const badge = el.querySelector('div:last-child');
        const orig = badge.textContent;
        badge.textContent = 'COPIED';
        setTimeout(() => { badge.textContent = orig; }, 1200);
      }
    });
  });
  // Link buttons — search for drawing and link to order-line folder
  overlay.querySelectorAll('.clr-link-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const dwg = btn.dataset.dwg;
      const line = btn.dataset.line;
      if (!dwg || !orderPad) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="deep-spinner" style="width:9px;height:9px"></span>';
      // Search for the drawing
      const r = await window.api.searchDrawing(dwg);
      if (!r.found || !r.primary) {
        btn.innerHTML = '\u2717';
        btn.title = 'Drawing not found in ACADDWGS';
        setTimeout(() => { btn.innerHTML = '\u{1F517}'; btn.disabled = false; }, 2000);
        return;
      }
      // Create link in the order-line folder
      const orderFolder = S.config.order_path + (S.platform === 'win32' ? '\\' : '/') + orderPad + line;
      const linkResult = await window.api.createLink(r.primary.filepath, orderFolder, true);
      if (linkResult.ok) {
        btn.innerHTML = '\u2713';
        btn.style.color = 'var(--success)';
        btn.title = 'Linked!';
        playChime();
      } else {
        btn.innerHTML = '\u26A0';
        btn.title = linkResult.msg || 'Link failed';
        setTimeout(() => { btn.innerHTML = '\u{1F517}'; btn.disabled = false; btn.style.color = ''; }, 2000);
      }
    });
  });
}

//  Link to Order dialog
// ═══════════════════════════════════════════════════════════════════════
function showLinkDialog() {
  const f = S.files[S.selected]; if (!f) return;
  const linkDigits = [];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-strong" style="color:var(--text);width:320px;padding:20px;text-align:center">
      <div style="font:700 14px/1 'DM Sans',sans-serif;margin-bottom:12px">Link to Order</div>
      <div class="otp-container no-drag" id="link-otp" style="justify-content:center">
        ${[0,1,2,3,4,5].map(i => `<div class="otp-box" data-idx="${i}" style="width:32px;height:38px;font-size:18px;line-height:38px"></div>`).join('')}
        <span class="otp-dash">&ndash;</span>
        ${[6,7].map(i => `<div class="otp-box" data-idx="${i}" style="width:32px;height:38px;font-size:18px;line-height:38px"></div>`).join('')}
      </div>
      <div id="link-status" style="font:500 11px/1.4 'DM Sans',sans-serif;color:var(--text3);margin-top:10px;min-height:16px">Type order number, Enter to link</div>
    </div>`;
  document.body.appendChild(overlay);
  modalDismiss(overlay);
  // Focus the modal so it captures keyboard events
  const modalDiv = overlay.querySelector('.modal');
  modalDiv.setAttribute('tabindex', '-1');
  modalDiv.focus();

  function updateLinkOtp() {
    const boxes = overlay.querySelectorAll('#link-otp .otp-box');
    boxes.forEach((box, i) => {
      box.textContent = linkDigits[i] || '';
      box.classList.toggle('filled', !!linkDigits[i]);
      box.classList.toggle('active', i === linkDigits.length);
    });
  }
  updateLinkOtp();

  async function doLink() {
    if (linkDigits.length < 8) return;
    const order = linkDigits.slice(0, 6).join('');
    const line = linkDigits.slice(6, 8).join('');
    const folder = S.config.order_path + (S.platform === 'win32' ? '\\' : '/') + order + line;
    $('#link-status').textContent = 'Creating…';
    $('#link-status').style.color = 'var(--text3)';
    const r = await window.api.createLink(f.filepath, folder, true);
    if (r.ok) {
      $('#link-status').textContent = '✓ Linked!';
      $('#link-status').style.color = 'var(--success)';
      playChime();
      setTimeout(() => {
        overlay.style.opacity = '0';
        overlay.style.transition = 'opacity .3s';
        setTimeout(() => overlay.remove(), 300);
      }, 600);
    } else {
      $('#link-status').textContent = '⚠  ' + r.msg.split('\n')[0];
      $('#link-status').style.color = 'var(--danger)';
    }
  }

  function linkKeyHandler(e) {
    if (!document.body.contains(overlay)) { document.removeEventListener('keydown', linkKeyHandler, true); return; }
    e.stopImmediatePropagation();
    e.preventDefault();
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', linkKeyHandler, true); return; }
    if (/^[0-9]$/.test(e.key) && linkDigits.length < 8) {
      linkDigits.push(e.key);
      updateLinkOtp();
      if (linkDigits.length === 8) setTimeout(doLink, 100);
    } else if (e.key === 'Backspace') {
      linkDigits.pop();
      updateLinkOtp();
      $('#link-status').textContent = 'Type order number, Enter to link';
      $('#link-status').style.color = 'var(--text3)';
    } else if (e.key === 'Enter') {
      doLink();
    }
  }
  document.addEventListener('keydown', linkKeyHandler, true);  // capture phase — fires before global handler
}

function showWhatsNew() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const badgeLabel = { feat: 'New', fix: 'Fix', ui: 'UI', soon: 'Soon' };
  const entries = CHANGELOG.map((v, i) => `
    <div class="wn-release ${i === 0 ? 'wn-latest' : ''}" style="animation-delay:${i * 0.06}s">
      <div class="wn-release-header">
        <span class="wn-ver">v${escHtml(v.ver)}</span>
        <span class="wn-date">${escHtml(v.date)}</span>
      </div>
      ${v.items.map(it => `
        <div class="wn-item ${it.type}">
          <span class="wn-badge">${badgeLabel[it.type] || it.type}</span>
          <span class="wn-text">${it.html || escHtml(it.text)}</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  overlay.innerHTML = `<div class="modal glass-strong wn-modal">
    <button class="wn-close-x" id="wn-close">\u00D7</button>
    <div class="wn-hero">
      <h3>What\u2019s New</h3>
      <div class="wn-hero-sub">Latest updates &amp; improvements</div>
    </div>

  </div>`;

  document.body.appendChild(overlay);

  overlay.querySelector('#wn-close').addEventListener('click', () => overlay.remove());

  // Stop ringing and dismiss dot, persist across restarts

  });

    } else {
      out.textContent = `ERROR: ${r.error}`;
      out.style.color = 'var(--danger)';
    }
  });
}

function formatXml(xml) {
  // Basic XML prettifier for display
  let indent = 0;
  return xml.replace(/>\s*</g, '>\n<').split('\n').map(line => {
    line = line.trim();
    if (!line) return '';
    if (line.startsWith('</')) indent = Math.max(0, indent - 1);
    const out = '  '.repeat(indent) + line;
    if (line.startsWith('<') && !line.startsWith('</') && !line.startsWith('<?') && !line.endsWith('/>') && !/<\/[^>]+>$/.test(line)) indent++;
    return out;
  }).join('\n');
}
